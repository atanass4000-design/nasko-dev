<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Nasko Dev — Developer & Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#000;--fg:#fff;--muted:#888;
  --discord:hsl(235,86%,65%);--discord-glow:hsla(235,86%,65%,.45);
  --title-glow1:hsla(0,0%,100%,.15);--title-glow2:hsla(0,0%,100%,.05);
  --btn-bg:hsla(0,0%,100%,.07);--btn-hover:hsla(0,0%,100%,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;touch-action:none;}
body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:background .5s,color .5s;}

#bg-canvas,#fx-canvas{position:fixed;inset:0;pointer-events:none;}
#bg-canvas{z-index:0;}#fx-canvas{z-index:5;}

/* ── Wormhole canvas ── */
#wh-canvas{position:fixed;inset:0;z-index:8000;pointer-events:none;opacity:0;transition:opacity .15s;}
#wh-canvas.active{opacity:1;}

/* ── Toolbar ── */
.toolbar{position:fixed;top:1.2rem;left:1.2rem;display:flex;gap:.5rem;z-index:50;opacity:0;animation:fadeIn .5s ease 1s forwards;}
.tool-btn{width:2.6rem;height:2.6rem;border-radius:.5rem;border:1px solid hsla(0,0%,50%,.2);background:var(--btn-bg);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:background .2s,color .2s,transform .2s cubic-bezier(.22,1,.36,1);-webkit-tap-highlight-color:transparent;}
.tool-btn:hover{background:var(--btn-hover);color:var(--fg);transform:scale(1.08);}
.tool-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Space Weather HUD ── */
#sw-hud{
  position:fixed;top:1.2rem;right:1.2rem;z-index:50;
  background:hsla(0,0%,4%,.85);border:1px solid hsla(0,0%,100%,.1);
  border-radius:.55rem;padding:.45rem .8rem;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:center;gap:.55rem;
  opacity:0;animation:fadeIn .5s ease 1.8s forwards;
  font-size:.62rem;letter-spacing:.05em;color:hsla(0,0%,100%,.5);
}
#sw-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;flex-shrink:0;animation:dotpulse 2.5s ease-in-out infinite;}
#sw-label{white-space:nowrap;}
@keyframes dotpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}

/* ── Voice HUD ── */
#voice-hud{
  position:fixed;bottom:1.4rem;right:1.2rem;z-index:50;
  display:flex;align-items:center;gap:.5rem;
  background:hsla(0,0%,4%,.9);border:1px solid hsla(0,0%,100%,.1);
  border-radius:.55rem;padding:.4rem .75rem;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  opacity:0;animation:fadeIn .5s ease 1.6s forwards;
  cursor:pointer;transition:border-color .2s;-webkit-tap-highlight-color:transparent;
}
#voice-hud:hover{border-color:hsla(0,0%,100%,.25);}
#voice-hud.listening{border-color:hsla(0,100%,60%,.6);animation:none;opacity:1;}
#voice-mic{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
#voice-hud.listening #voice-mic{stroke:#f87171;filter:drop-shadow(0 0 4px #f87171);}
#voice-label{font-size:.62rem;color:hsla(0,0%,100%,.4);letter-spacing:.05em;white-space:nowrap;}
#voice-hud.listening #voice-label{color:#f87171;}

/* ── UI hidden ── */
body.ui-hidden .stage,body.ui-hidden #cmd-bar,body.ui-hidden #cmd-suggestions,body.ui-hidden .code-panel{opacity:0!important;pointer-events:none!important;}
body.ui-hidden .toolbar{opacity:.22;}
body.ui-hidden #sw-hud,body.ui-hidden #voice-hud{opacity:0!important;pointer-events:none!important;}

/* ── Code panel ── */
.code-panel{position:fixed;top:4.4rem;left:1.2rem;z-index:60;background:hsla(0,0%,4%,.97);border:1px solid hsla(0,0%,100%,.12);border-radius:.6rem;padding:.85rem;width:215px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:none;flex-direction:column;gap:.5rem;box-shadow:0 8px 32px rgba(0,0,0,.7);}
.code-panel.open{display:flex;}
.code-panel label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:hsla(0,0%,100%,.38);}
.code-panel input{background:hsla(0,0%,100%,.06);border:1px solid hsla(0,0%,100%,.12);border-radius:.35rem;padding:.4rem .6rem;color:#fff;font-family:'Inter',monospace;font-size:.82rem;outline:none;width:100%;transition:border-color .2s;}
.code-panel input:focus{border-color:hsla(235,86%,65%,.6);}
.code-hint{font-size:.6rem;color:hsla(0,0%,100%,.25);}
.code-hint span{color:hsl(220,80%,65%);}

/* ── Command bar ── */
#cmd-bar{position:fixed;bottom:1.4rem;left:1.2rem;z-index:60;display:flex;align-items:center;background:hsla(0,0%,4%,.96);border:1px solid hsla(0,0%,100%,.12);border-radius:.55rem;overflow:hidden;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 6px 28px rgba(0,0,0,.7);width:52px;transition:width .3s cubic-bezier(.22,1,.36,1);opacity:0;animation:fadeIn .5s ease 1.1s forwards;}
#cmd-bar.open{width:min(360px,90vw);}
#cmd-toggle{width:52px;height:42px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;border:none;color:var(--muted);transition:color .2s;-webkit-tap-highlight-color:transparent;}
#cmd-toggle:hover{color:#fff;}
#cmd-input-wrap{flex:1;display:flex;align-items:center;overflow:hidden;padding:0 .6rem 0 0;}
#cmd-input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:'Inter',monospace;font-size:.8rem;white-space:nowrap;min-width:0;}
#cmd-input::placeholder{color:hsla(0,0%,100%,.3);}
#cmd-suggestions{position:fixed;bottom:4.4rem;left:1.2rem;width:min(360px,90vw);z-index:61;background:hsla(0,0%,5%,.98);border:1px solid hsla(0,0%,100%,.12);border-radius:.55rem;overflow:hidden;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 -4px 24px rgba(0,0,0,.7);display:none;}
#cmd-suggestions.open{display:block;}
.cs{display:flex;align-items:center;gap:.6rem;padding:.48rem .9rem;cursor:pointer;transition:background .1s;font-size:.78rem;color:hsla(0,0%,100%,.7);}
.cs:hover,.cs.sel{background:hsla(0,0%,100%,.07);color:#fff;}
.cs-key{font-family:monospace;color:hsl(220,80%,68%);font-size:.76rem;flex-shrink:0;}
.cs-desc{font-size:.66rem;color:hsla(0,0%,100%,.3);margin-left:auto;}

/* ── Stage ── */
.stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:1.5rem;text-align:center;padding:2rem;transform-style:preserve-3d;will-change:transform;transition:transform .1s linear,opacity .4s ease;}
.stage.fading{opacity:0!important;pointer-events:none;}
.greeting{font-size:.78rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:hsl(220,90%,70%);opacity:0;animation:fadeIn .6s ease .05s forwards;}
.avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid hsla(0,0%,100%,.15);box-shadow:0 0 30px hsla(0,0%,100%,.08);opacity:0;transform:translateY(30px);cursor:pointer;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) 0s forwards;transition:box-shadow .2s;-webkit-tap-highlight-color:transparent;}
.avatar:hover{box-shadow:0 0 40px hsla(235,86%,65%,.4);}
@keyframes wobble{0%{transform:rotate(0)scale(1)}15%{transform:rotate(-8deg)scale(1.08)}30%{transform:rotate(7deg)scale(1.08)}45%{transform:rotate(-5deg)scale(1.04)}60%{transform:rotate(4deg)scale(1.04)}75%{transform:rotate(-2deg)scale(1.01)}100%{transform:rotate(0)scale(1)}}
.avatar.wobbling{animation:wobble .6s cubic-bezier(.22,1,.36,1) forwards!important;}
.title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3rem,10vw,6rem);letter-spacing:-.03em;line-height:1;color:var(--fg);text-shadow:0 0 40px var(--title-glow1),0 0 80px var(--title-glow2);opacity:0;transform:translateY(30px);animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .1s forwards;}
.tagline{font-size:clamp(.9rem,2.5vw,1.15rem);letter-spacing:.18em;text-transform:uppercase;color:var(--muted);opacity:0;transform:translateY(30px);animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .3s forwards;min-height:1.5em;}
.cursor-blink{display:inline-block;width:2px;height:1em;background:var(--muted);margin-left:2px;vertical-align:middle;animation:blink .7s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.discord-btn{display:inline-flex;align-items:center;gap:.6rem;margin-top:.5rem;padding:.75rem 2rem;background:var(--discord);color:#fff;font-weight:600;font-size:.95rem;border-radius:.5rem;text-decoration:none;cursor:pointer;transition:transform .2s cubic-bezier(.22,1,.36,1),box-shadow .2s;opacity:0;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .5s forwards;-webkit-tap-highlight-color:transparent;}
.discord-btn:hover{transform:scale(1.08);box-shadow:0 0 30px var(--discord-glow),0 0 60px var(--discord-glow);}
.discord-btn:active{transform:scale(.96);}
.discord-btn svg{width:18px;height:18px;fill:currentColor;}
.socials{display:flex;align-items:center;gap:1.25rem;opacity:0;animation:fadeIn .7s ease .7s forwards;}
.social-link{display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:.4rem;color:var(--muted);text-decoration:none;transition:color .2s,background .2s,transform .2s cubic-bezier(.22,1,.36,1);-webkit-tap-highlight-color:transparent;}
.social-link:hover{color:var(--fg);background:hsla(0,0%,100%,.08);transform:scale(1.1);}
.social-link svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.visitor-counter{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:hsla(0,0%,100%,.3);letter-spacing:.08em;opacity:0;animation:fadeIn .7s ease .9s forwards;}
.visitor-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;flex-shrink:0;animation:dotpulse 2s ease-in-out infinite;}
.deploy-note{font-size:.72rem;color:hsla(0,0%,100%,.22);letter-spacing:.18em;opacity:0;animation:fadeIn .7s ease .9s forwards;}

#flash{position:fixed;inset:0;z-index:9999;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s;}
#flash.go{opacity:.45;}

@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{to{opacity:1;}}

@media(max-width:480px){
  .stage{gap:1.1rem;padding:1.2rem;}
  .title{font-size:clamp(2.4rem,13vw,4rem);}
  .avatar{width:80px;height:80px;}
  .discord-btn{padding:.65rem 1.4rem;font-size:.88rem;}
  .toolbar{top:.8rem;left:.8rem;}
  #cmd-bar{bottom:.8rem;left:.8rem;}
  #cmd-suggestions{bottom:4rem;left:.8rem;}
  #sw-hud{top:.8rem;right:.8rem;font-size:.55rem;}
  #voice-hud{bottom:.8rem;right:.8rem;}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<canvas id="wh-canvas"></canvas>
<div id="flash"></div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="tool-btn" id="uiToggleBtn" aria-label="Toggle UI" title="Hide/show UI">
    <svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
  </button>
</div>

<!-- Space Weather HUD -->
<div id="sw-hud">
  <div id="sw-dot"></div>
  <span id="sw-label">Space weather loading…</span>
</div>

<!-- Voice HUD -->
<div id="voice-hud" title="Click to use voice commands">
  <svg id="voice-mic" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  <span id="voice-label">voice commands</span>
</div>

<!-- Code Panel -->
<div class="code-panel" id="codePanel">
  <label>Secret Code</label>
  <input id="codeInput" type="text" placeholder="Enter code…" maxlength="20" autocomplete="off" spellcheck="false"/>
  <div class="code-hint">Try: <span>ASTEROID</span></div>
</div>

<!-- Command Bar -->
<div id="cmd-bar">
  <button id="cmd-toggle" aria-label="Command bar" title="Open command bar (L)">
    <svg viewBox="0 0 24 24" width="15" height="15" style="stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </button>
  <div id="cmd-input-wrap">
    <input id="cmd-input" placeholder="/spawn comet · /rain · /storm · /supernova · /clear" autocomplete="off" spellcheck="false"/>
  </div>
</div>
<div id="cmd-suggestions"></div>

<!-- Stage -->
<main class="stage" id="stage">
  <p class="greeting" id="greeting"></p>
  <img class="avatar" src="images.jpg" alt="Nasko Dev" id="avatar"/>
  <h1 class="title">Nasko Dev</h1>
  <p class="tagline" id="tagline"></p>
  <a class="discord-btn" href="https://discord.gg/rSbJmG9CnY" target="_blank" rel="noopener" data-trans>
    <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
    Join Discord
  </a>
  <div class="socials">
    <a class="social-link" href="https://github.com/atanass4000-design" target="_blank" rel="noopener" data-trans aria-label="GitHub">
      <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
    </a>
    <a class="social-link" href="https://x.com/NaskoBul" target="_blank" rel="noopener" data-trans aria-label="X">
      <svg viewBox="0 0 24 24"><path d="M4 4l16 16M4 20 20 4" stroke="currentColor"/></svg>
    </a>
    <a class="social-link" href="https://www.youtube.com/@NaskoDev" target="_blank" rel="noopener" data-trans aria-label="YouTube">
      <svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/></svg>
    </a>
  </div>
  <div class="visitor-counter"><span class="visitor-dot"></span><span id="visit-text">Loading…</span></div>
  <p class="deploy-note">Welcome</p>
</main>

<script>
/* ════ UTILS ════ */
const rand=(a,b)=>a+Math.random()*(b-a);
const randI=(a,b)=>Math.floor(rand(a,b));
const TAU=Math.PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const mxr=v=>Math.max(0,v);

/* ════ CANVASES ════ */
const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
const fxC=document.getElementById('fx-canvas'),fxX=fxC.getContext('2d');
const whC=document.getElementById('wh-canvas'),whX=whC.getContext('2d');
let W=0,H=0;

/* ════ STATE ════ */
let starsNear=[],starsMid=[],starsFar=[];
let milkyWayCache=null; // offscreen canvas
let satellites=[];
let satelliteTimer=rand(20,45);
let shooters=[],shootSec=rand(1,3);
let cosmics=[],cometTimer=0,cometInterval=15;
let ripples=[];
let fxAnim=null,whAnim=null;
let bgT=0,bgLast=performance.now();
let mx=0,my=0;
const cometTrail=[],CMAX=36;
let parMx=0,parMy=0;

// Space weather state
let swData={kp:0,level:'calm',shooterMult:1,auroraAlpha:0,tint:null};

/* ════ INPUT ════ */
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
document.addEventListener('touchmove',e=>{const t=e.touches[0];mx=t.clientX;my=t.clientY;e.preventDefault();},{passive:false});
document.addEventListener('touchstart',e=>{const t=e.touches[0];mx=t.clientX;my=t.clientY;},{passive:true});

/* ════ RESIZE ════ */
function resizeAll(){
  W=bgC.width=fxC.width=whC.width=window.innerWidth;
  H=bgC.height=fxC.height=whC.height=window.innerHeight;
  makeStarLayers();
  milkyWayCache=null; // regenerate on next frame
}
resizeAll();
window.addEventListener('resize',resizeAll);
document.addEventListener('fullscreenchange',()=>setTimeout(resizeAll,80));
document.addEventListener('webkitfullscreenchange',()=>setTimeout(resizeAll,80));
new ResizeObserver(()=>resizeAll()).observe(document.documentElement);

/* ════ UI TOGGLE ════ */
let uiVisible=true;
document.getElementById('uiToggleBtn').addEventListener('click',()=>{
  uiVisible=!uiVisible;
  document.body.classList.toggle('ui-hidden',!uiVisible);
  document.getElementById('uiToggleBtn').style.opacity=uiVisible?'1':'.35';
});

/* ════ CODE PANEL ════ */
const codePanel=document.getElementById('codePanel');
const codeInp=document.getElementById('codeInput');
document.addEventListener('click',e=>{if(!codePanel.contains(e.target))codePanel.classList.remove('open');});
codeInp.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const c=codeInp.value.trim().toUpperCase();codeInp.value='';codePanel.classList.remove('open');
  if(c==='ASTEROID')triggerAsteroid();
});

/* ════ COMMAND BAR ════ */
const cmdBar=document.getElementById('cmd-bar');
const cmdInput=document.getElementById('cmd-input');
const cmdSugg=document.getElementById('cmd-suggestions');
const CMD_LIST=[
  {cmd:'/spawn comet',desc:'Send a comet across the sky',fn:()=>spawnComet()},
  {cmd:'/spawn satellite',desc:'ISS-style satellite pass',fn:()=>spawnSatellite(true)},
  {cmd:'/rain',desc:'10 shooting stars',fn:()=>spawnMeteorRain(10)},
  {cmd:'/storm',desc:'50 shooting stars',fn:()=>spawnMeteorRain(50)},
  {cmd:'/impact',desc:'Asteroid cinematic',fn:()=>triggerAsteroid()},
  {cmd:'/supernova',desc:'Star explosion',fn:()=>triggerSupernova()},
  {cmd:'/wormhole',desc:'Wormhole transition demo',fn:()=>triggerWormhole(null)},
  {cmd:'/clear',desc:'Clear all objects',fn:()=>{cosmics=[];satellites=[];}},
];
let cmdSelIdx=0;
function openCmdBar(){cmdBar.classList.add('open');cmdInput.focus();renderSugg('');}
function closeCmdBar(){cmdBar.classList.remove('open');cmdSugg.classList.remove('open');cmdInput.value='';}
function renderSugg(q){
  const f=q?CMD_LIST.filter(c=>c.cmd.includes(q.toLowerCase())):CMD_LIST;
  if(!f.length){cmdSugg.classList.remove('open');return;}
  cmdSugg.classList.add('open');

function triggerWormhole(destUrl){
  if(whAnim) return;
  const start=performance.now();
  const dur=2200;
  const cx2=W/2,cy2=H/2;

  // Pre-generate warp streak positions
  const streaks=Array.from({length:160},()=>({
    angle:rand(0,TAU),
    r0:rand(5,60),
    len:rand(80,400),
    w:rand(.5,2.5),
    col:`hsl(${randI(200,260)},${randI(60,100)}%,${randI(55,90)}%)`,
    speed:rand(.6,1.4),
  }));

  whC.classList.add('active');
  whAnim=true;

  function tick(now){
    const t=clamp((now-start)/dur,0,1);
    whX.clearRect(0,0,W,H);

    // Black tunnel vignette
    const vig=whX.createRadialGradient(cx2,cy2,0,cx2,cy2,Math.max(W,H)*.7);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(.55,'rgba(0,0,0,.25)');
    vig.addColorStop(1,'rgba(0,0,0,.97)');
    whX.fillStyle=vig;whX.fillRect(0,0,W,H);

    // Warp ring
    const ringR=mxr(t*(Math.max(W,H)*0.65));
    const rg=whX.createRadialGradient(cx2,cy2,mxr(ringR*.55),cx2,cy2,ringR);
    rg.addColorStop(0,'rgba(0,0,0,0)');
    rg.addColorStop(.7,`rgba(120,180,255,${.18*Math.sin(t*Math.PI)})`);
    rg.addColorStop(1,'rgba(0,0,0,0)');
    whX.beginPath();whX.arc(cx2,cy2,ringR,0,TAU);whX.fillStyle=rg;whX.fill();

    // Light-speed star streaks
    const stretchT=Math.pow(t,1.4);
    for(const s of streaks){
      const r1=s.r0+stretchT*s.len*s.speed;
      const r2=r1+mxr(stretchT*s.len*.8*s.speed);
      const x1=cx2+Math.cos(s.angle)*r1,y1=cy2+Math.sin(s.angle)*r1;
      const x2=cx2+Math.cos(s.angle)*r2,y2=cy2+Math.sin(s.angle)*r2;
      const sg=whX.createLinearGradient(x1,y1,x2,y2);
      const alpha=clamp(t*3*(1-t*.5),.0,1)*Math.min(1,r2/80);
      sg.addColorStop(0,'rgba(255,255,255,0)');
      sg.addColorStop(.5,`rgba(200,225,255,${alpha*.6})`);
      sg.addColorStop(1,`rgba(255,255,255,${alpha})`);
      whX.beginPath();whX.moveTo(x1,y1);whX.lineTo(x2,y2);
      whX.strokeStyle=sg;whX.lineWidth=mxr(s.w*(1+stretchT*.5));whX.stroke();
    }

    // Tunnel horizon circle
    if(t>.3){
      const tp=(t-.3)/.7;
      const holeR=mxr(tp*tp*Math.max(W,H)*.5);
      whX.beginPath();whX.arc(cx2,cy2,holeR,0,TAU);
      whX.fillStyle=`rgba(0,0,0,${tp*.95})`;whX.fill();
      // bright rim
      whX.beginPath();whX.arc(cx2,cy2,holeR,0,TAU);
      whX.strokeStyle=`rgba(160,210,255,${.55*(1-tp)})`;whX.lineWidth=3;whX.stroke();
    }

    // Final white flash
    if(t>.85){
      const fp=(t-.85)/.15;
      whX.fillStyle=`rgba(255,255,255,${fp*.9})`;whX.fillRect(0,0,W,H);
    }

    if(t<1){requestAnimationFrame(tick);}
    else{
      whC.classList.remove('active');whX.clearRect(0,0,W,H);whAnim=null;
      if(destUrl)window.open(destUrl,'_blank');
    }
  }
  requestAnimationFrame(tick);
}

/* ════ MILKY WAY (offscreen, rebuilt when null) ════ */
function buildMilkyWay(){
  const oc=document.createElement('canvas');oc.width=W;oc.height=H;
  const ox=oc.getContext('2d');

  // Galactic core — offset to upper-right quadrant
  const gcx=W*.62,gcy=H*.32;
  const armAngle=-.35; // tilt of the band across screen

  // Draw band as overlapping soft ellipses at different rotations
  ox.save();ox.translate(gcx,gcy);ox.rotate(armAngle);

  // Outer haze
  for(let pass=0;pass<3;pass++){
    const bw=W*(1.2-pass*.15),bh=H*(.22-pass*.04);
    const bg=ox.createRadialGradient(0,0,0,0,0,Math.max(bw,bh)*.5);
    bg.addColorStop(0,`rgba(${155+pass*20},${170+pass*15},${220+pass*10},${.04-pass*.008})`);
    bg.addColorStop(.4,`rgba(130,148,200,${.025-pass*.005})`);
    bg.addColorStop(1,'rgba(0,0,0,0)');
    ox.save();ox.scale(bw/Math.max(bw,bh),bh/Math.max(bw,bh));
    ox.beginPath();ox.arc(0,0,Math.max(bw,bh)*.5,0,TAU);ox.fillStyle=bg;ox.fill();
    ox.restore();
  }

  // Core bright bulge
  const cg=ox.createRadialGradient(0,0,0,0,0,H*.18);
  cg.addColorStop(0,`rgba(255,240,200,.18)`);
  cg.addColorStop(.25,`rgba(220,190,160,.12)`);
  cg.addColorStop(.6,`rgba(180,160,200,.06)`);
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ox.beginPath();ox.arc(0,0,H*.18,0,TAU);ox.fillStyle=cg;ox.fill();
  ox.restore();

  // Populate with dense micro-stars along the band
  const count=Math.floor(W*H/120);
  for(let i=0;i<count;i++){
    // gaussian distribution around the galactic band
    const u1=1-Math.random(),u2=1-Math.random();
    const gauss=Math.sqrt(-2*Math.log(u1))*Math.cos(TAU*u2);
    const along=rand(-W*.7,W*.7);
    const perp=gauss*(H*.055);
    // rotate by band angle
    const sx=gcx+along*Math.cos(armAngle)-perp*Math.sin(armAngle);
    const sy=gcy+along*Math.sin(armAngle)+perp*Math.cos(armAngle);
    if(sx<0||sx>W||sy<0||sy>H)continue;
    const dist=Math.sqrt((sx-gcx)**2+(sy-gcy)**2);
    const coreFade=Math.exp(-dist/(W*.35));
    const r=rand(.25,1.1)*(.5+coreFade*.5);
    const op=rand(.12,.45)*(.4+coreFade*.6);
    const hue=randI(200,280);
    ox.beginPath();ox.arc(sx,sy,r,0,TAU);
    ox.fillStyle=`hsla(${hue},${randI(20,60)}%,88%,${op})`;
    ox.fill();
  }

  // Dust lanes — dark streaks cutting through the bright band
  ox.save();ox.translate(gcx,gcy);ox.rotate(armAngle);
  ox.globalCompositeOperation='multiply';
  for(let d=0;d<8;d++){
    const dx=rand(-W*.4,W*.4),dy=rand(-H*.06,H*.06);
    const dl=rand(W*.08,W*.25);
    const dw=rand(H*.008,H*.025);
    const dg2=ox.createLinearGradient(dx-dl,0,dx+dl,0);
    dg2.addColorStop(0,'rgba(0,0,0,0)');dg2.addColorStop(.5,`rgba(0,0,0,${rand(.06,.15)})`);dg2.addColorStop(1,'rgba(0,0,0,0)');
    ox.beginPath();ox.ellipse(dx,dy,dl,dw,rand(-.2,.2),0,TAU);ox.fillStyle=dg2;ox.fill();
  }
  ox.restore();

  milkyWayCache=oc;
}

function drawSatellite(s,dt){
  // Add to trail
  s.trail.push({x:s.x,y:s.y,t:Date.now()});
  if(s.trail.length>22)s.trail.shift();

  const al=clamp(s.life*8,0,1);
  s.blinkPhase+=s.blinkRate*dt;
  const blink=.5+.5*Math.sin(s.blinkPhase);

  // Trail
  bgX.save();bgX.globalCompositeOperation='screen';
  for(let i=1;i<s.trail.length;i++){
    const p=i/s.trail.length;
    bgX.beginPath();bgX.moveTo(s.trail[i-1].x,s.trail[i-1].y);bgX.lineTo(s.trail[i].x,s.trail[i].y);
    bgX.strokeStyle=`rgba(200,230,255,${p*.25*al*s.brightness})`;bgX.lineWidth=mxr(p*1.4);bgX.stroke();
  }
  bgX.restore();

  // Body
  bgX.save();bgX.translate(s.x,s.y);bgX.rotate(s.rot);bgX.globalAlpha=al;

  // Solar panels (two rectangles)
  bgX.fillStyle=`rgba(100,160,255,${.7*s.brightness})`;
  bgX.fillRect(-s.panelSpan/2,-s.panelW/2,s.panelSpan/2-s.bodyLen/2,s.panelW);
  bgX.fillRect(s.bodyLen/2,  -s.panelW/2,s.panelSpan/2-s.bodyLen/2,s.panelW);

  // Main truss/body
  bgX.fillStyle=`rgba(220,230,240,${.9*s.brightness})`;
  bgX.fillRect(-s.bodyLen/2,-2.5,s.bodyLen,5);

  // Blinking signal light
  bgX.beginPath();bgX.arc(0,0,2,0,TAU);
  bgX.fillStyle=`rgba(255,${100+blink*155},${100+blink*80},${blink*al*.9})`;
  bgX.fill();

  bgX.restore();
}

/* ════ DRAW COMET ════ */
function drawComet(o){
  const al=clamp(o.life*6,0,1);
  const ang=Math.atan2(o.vy,o.vx);
  const tailAng=ang+Math.PI;
  bgX.save();bgX.globalCompositeOperation='screen';
  const dTX=o.x+Math.cos(tailAng)*o.tailLen,dTY=o.y+Math.sin(tailAng)*o.tailLen;
  const dg=bgX.createLinearGradient(o.x,o.y,dTX,dTY);
  dg.addColorStop(0,`rgba(255,248,200,${.55*al*o.brightness})`);dg.addColorStop(.2,`rgba(255,238,170,${.38*al*o.brightness})`);dg.addColorStop(.55,`rgba(240,220,140,${.18*al*o.brightness})`);dg.addColorStop(1,'rgba(200,180,100,0)');
  bgX.beginPath();bgX.moveTo(o.x,o.y);bgX.lineTo(dTX,dTY);bgX.strokeStyle=dg;bgX.lineWidth=mxr(o.dustWidth*o.life);bgX.lineCap='round';bgX.stroke();
  const ionAng=tailAng+o.tailSpread,ionLen=o.tailLen*1.55;
  const iTX=o.x+Math.cos(ionAng)*ionLen,iTY=o.y+Math.sin(ionAng)*ionLen;
  const ig=bgX.createLinearGradient(o.x,o.y,iTX,iTY);
  ig.addColorStop(0,`rgba(200,230,255,${.75*al*o.brightness})`);ig.addColorStop(.3,`rgba(170,210,255,${.45*al*o.brightness})`);ig.addColorStop(.65,`rgba(140,190,255,${.2*al*o.brightness})`);ig.addColorStop(1,'rgba(100,160,255,0)');
  bgX.beginPath();bgX.moveTo(o.x,o.y);bgX.lineTo(iTX,iTY);bgX.strokeStyle=ig;bgX.lineWidth=mxr(o.ionWidth*o.life);bgX.lineCap='round';bgX.stroke();
  bgX.restore();
  const comaR=o.nucleus*5.5;
  const cg=bgX.createRadialGradient(o.x,o.y,0,o.x,o.y,mxr(comaR));
  cg.addColorStop(0,`rgba(255,255,255,${.95*al})`);cg.addColorStop(.2,`rgba(210,255,210,${.55*al*o.brightness})`);cg.addColorStop(.5,`rgba(160,230,160,${.22*al*o.brightness})`);cg.addColorStop(.8,`rgba(100,200,120,${.07*al*o.brightness})`);cg.addColorStop(1,'rgba(0,0,0,0)');
  bgX.beginPath();bgX.arc(o.x,o.y,mxr(comaR),0,TAU);bgX.fillStyle=cg;bgX.fill();
  const ng=bgX.createRadialGradient(o.x,o.y,0,o.x,o.y,mxr(o.nucleus));
  ng.addColorStop(0,`rgba(255,255,255,${al})`);ng.addColorStop(.6,`rgba(230,248,255,${.8*al})`);ng.addColorStop(1,`rgba(180,220,255,0)`);
  bgX.beginPath();bgX.arc(o.x,o.y,mxr(o.nucleus),0,TAU);bgX.fillStyle=ng;bgX.fill();
}

/* ════ AURORA (space weather effect) ════ */
function drawAurora(alpha,tint){
  if(alpha<.005)return;
  bgX.save();bgX.globalCompositeOperation='screen';
  // Aurora bands across top of screen
  for(let b=0;b<4;b++){
    const by=H*(-.05+b*.08+Math.sin(bgT*.18+b*1.2)*.04);
    const bh=H*(.12+b*.03);
    const ag=bgX.createLinearGradient(0,by,0,by+bh);
    const col=tint==='red'?`120,20,20`:tint==='orange'?`180,80,20`:`20,180,80`;
    ag.addColorStop(0,'rgba(0,0,0,0)');
    ag.addColorStop(.3,`rgba(${col},${alpha*(b===1?.7:.4)})`);
    ag.addColorStop(.7,`rgba(${col},${alpha*(b===1?.5:.25)})`);
    ag.addColorStop(1,'rgba(0,0,0,0)');
    bgX.fillStyle=ag;bgX.fillRect(0,by,W,bh);
    // Curtain rays
    for(let r=0;r<8;r++){
      const rx=W*(r/8)+W*.06*Math.sin(bgT*.2+r+b);
      const rg=bgX.createLinearGradient(rx,by,rx+W*.02,by+bh);
      rg.addColorStop(0,'rgba(0,0,0,0)');
      rg.addColorStop(.5,`rgba(${col},${alpha*.3})`);
      rg.addColorStop(1,'rgba(0,0,0,0)');
      bgX.beginPath();bgX.rect(rx,by,W*.018,bh);bgX.fillStyle=rg;bgX.fill();
    }
  }
  bgX.restore();
}

/* ════ SPACE WEATHER ════ */
function fetchSpaceWeather(){
  // NASA DONKI Geomagnetic Storm API (CORS-friendly endpoint)
  fetch('https://api.nasa.gov/DONKI/GST?api_key=DEMO_KEY&startDate='+new Date(Date.now()-3*86400000).toISOString().slice(0,10))
    .then(r=>r.json())
    .then(data=>{
      let kp=0;
      if(Array.isArray(data)&&data.length>0){
        // Get max Kp from recent storms
        data.forEach(ev=>{
          if(ev.allKpIndex) ev.allKpIndex.forEach(k=>{if(k.kpIndex>kp)kp=k.kpIndex;});
        });
      }
      applySpaceWeather(kp);
    })
    .catch(()=>{
      // Fallback: use random mild activity to show feature
      applySpaceWeather(Math.random()*4);
    });
}

function applySpaceWeather(kp){
  swData.kp=kp;
  const el=document.getElementById('sw-label');
  const dot=document.getElementById('sw-dot');

  if(kp>=8){
    swData.level='extreme';swData.shooterMult=4;swData.auroraAlpha=.55;swData.tint='red';
    dot.style.background='#f87171';dot.style.boxShadow='0 0 8px #f87171';
    el.textContent=`Kp ${kp.toFixed(1)} — Extreme storm`;
    // burst of shooting stars
    spawnMeteorRain(20);
  }else if(kp>=6){
    swData.level='severe';swData.shooterMult=3;swData.auroraAlpha=.38;swData.tint='orange';
    dot.style.background='#fb923c';dot.style.boxShadow='0 0 8px #fb923c';
    el.textContent=`Kp ${kp.toFixed(1)} — Severe storm`;
    spawnMeteorRain(10);
  }else if(kp>=4){
    swData.level='active';swData.shooterMult=2;swData.auroraAlpha=.18;swData.tint='green';
    dot.style.background='#facc15';dot.style.boxShadow='0 0 8px #facc15';
    el.textContent=`Kp ${kp.toFixed(1)} — Active conditions`;
  }else if(kp>=2){
    swData.level='unsettled';swData.shooterMult=1.3;swData.auroraAlpha=.06;swData.tint='green';
    dot.style.background='#4ade80';dot.style.boxShadow='0 0 6px #4ade80';
    el.textContent=`Kp ${kp.toFixed(1)} — Unsettled`;
  }else{
    swData.level='calm';swData.shooterMult=1;swData.auroraAlpha=0;swData.tint=null;
    dot.style.background='#4ade80';dot.style.boxShadow='0 0 6px #4ade80';
    el.textContent=`Kp ${kp.toFixed(1)} — Calm conditions`;
  }
}

/* ════ SUPERNOVA ════ */
function triggerSupernova(){
  if(fxAnim)return;
  const sx=rand(W*.15,W*.85),sy=rand(H*.15,H*.75);
  const start=performance.now(),dur=3500;
  const parts=[];let blasted=false;
  fxAnim={lastT:start,draw(now){
    const t=clamp((now-start)/dur,0,1);
    const dt=clamp((now-this.lastT)/1000,0,.08);this.lastT=now;
    fxX.save();
    if(t<.3){const p=t/.3,r=mxr(10+p*55);const sg=fxX.createRadialGradient(sx,sy,0,sx,sy,r);sg.addColorStop(0,`rgba(255,255,200,${p*.95})`);sg.addColorStop(.5,`rgba(255,180,50,${p*.65})`);sg.addColorStop(1,'rgba(255,100,0,0)');fxX.beginPath();fxX.arc(sx,sy,r,0,TAU);fxX.fillStyle=sg;fxX.fill();}
    if(t>=.3&&!blasted){blasted=true;for(let i=0;i<90;i++){const a=rand(0,TAU),sp=rand(70,450),h=rand(18,65);parts.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(2,9),life:1,decay:rand(.25,.7),h});}}
    if(t>=.3){const p=(t-.3)/.7;for(let r=0;r<4;r++){const rp=clamp((p-.06*r)/.75,0,1);const rr=mxr(rp*(W*.32+r*55));fxX.beginPath();fxX.arc(sx,sy,rr,0,TAU);fxX.strokeStyle=`rgba(255,${175-r*35},${45+r*18},${.38*(1-rp)})`;fxX.lineWidth=3.5-r*.5;fxX.stroke();}
      for(const p2 of parts){p2.x+=p2.vx*dt;p2.y+=p2.vy*dt;p2.life-=p2.decay*dt;const r2=mxr(p2.r*p2.life);if(!r2)continue;fxX.globalAlpha=mxr(p2.life);const pg=fxX.createRadialGradient(p2.x,p2.y,0,p2.x,p2.y,r2);pg.addColorStop(0,`hsl(${p2.h},100%,82%)`);pg.addColorStop(1,'rgba(0,0,0,0)');fxX.beginPath();fxX.arc(p2.x,p2.y,r2,0,TAU);fxX.fillStyle=pg;fxX.fill();fxX.globalAlpha=1;}}
    fxX.restore();if(t>=1)fxAnim=null;
  }};
}

/* ════ ASTEROID IMPACT ════ */
function triggerAsteroid(){
  if(fxAnim)return;
  const start=performance.now(),dur=7500;
  const ex=W/2,ey=H*.68,er=Math.min(W,H)*.155;
  const ax0=W*.9,ay0=-er*2.2,impX=ex+er*.28,impY=ey-er*.5;
  const dvx=impX-ax0,dvy=impY-ay0,HIT=.4;
  let exploded=false,sw2=0,parts=[];
  const apts=[0,.68,1.32,2.08,2.78,3.58,4.34,5.1,5.88].map((a,i)=>({a,r:i%2===0?1:.62}));
  function boom(){
    for(let i=0;i<160;i++){const a=rand(0,TAU),sp=rand(90,700),h=rand(15,55);parts.push({x:impX,y:impY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(2,15),life:1,decay:rand(.22,.7),color:`hsl(${h},100%,${randI(52,88)}%)`,grav:rand(55,230)});}
    for(let i=0;i<45;i++){const a=rand(-Math.PI*.9,-Math.PI*.1),sp=rand(120,480);parts.push({x:impX,y:impY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(5,22),life:1,decay:rand(.15,.45),color:`hsl(${randI(18,38)},${randI(6,20)}%,${randI(30,52)}%)`,grav:rand(90,220),rock:true});}
  }
  fxAnim={lastT:start,draw(now){
    const dt=clamp((now-this.lastT)/1000,0,.1);this.lastT=now;
    const t=clamp((now-start)/dur,0,1);fxX.save();
    fxX.fillStyle=`rgba(0,0,0,${clamp(t<.82?t*.35:(1-t)/.18*.35,0,.35)})`;fxX.fillRect(0,0,W,H);
    const ea=t<.12?t/.12:t>.86?(1-(t-.86)/.14):1;
    fxX.save();fxX.globalAlpha=ea;
    const atm=fxX.createRadialGradient(ex,ey,er*.88,ex,ey,er*1.42);atm.addColorStop(0,'rgba(60,140,255,.25)');atm.addColorStop(.4,'rgba(40,100,220,.1)');atm.addColorStop(1,'rgba(0,20,100,0)');fxX.beginPath();fxX.arc(ex,ey,er*1.42,0,TAU);fxX.fillStyle=atm;fxX.fill();
    const oc=fxX.createRadialGradient(ex-er*.25,ey-er*.25,0,ex,ey,er);oc.addColorStop(0,'#1565b8');oc.addColorStop(.4,'#0d47a1');oc.addColorStop(.75,'#0a3880');oc.addColorStop(1,'#061c50');fxX.beginPath();fxX.arc(ex,ey,er,0,TAU);fxX.fillStyle=oc;fxX.fill();
    fxX.fillStyle='rgba(34,142,52,.88)';[[-.3,-.25,.39],[.24,-.1,.27],[-.1,.3,.22],[.3,.3,.17],[-.05,-.08,.14]].forEach(([ox2,oy2,r])=>{fxX.beginPath();fxX.arc(ex+ox2*er,ey+oy2*er,r*er,0,TAU);fxX.fill();});
    fxX.globalAlpha=ea*.38;fxX.fillStyle='rgba(255,255,255,.6)';[[-.12,-.38,.32],[.3,.08,.24],[-.26,.22,.19],[.08,-.15,.15]].forEach(([ox2,oy2,r])=>{fxX.beginPath();fxX.arc(ex+ox2*er,ey+oy2*er,r*er,0,TAU);fxX.fill();});
    fxX.globalAlpha=ea*.7;fxX.fillStyle='rgba(220,235,255,.7)';fxX.beginPath();fxX.ellipse(ex,ey-er*.88,er*.35,er*.14,0,0,TAU);fxX.fill();
    const shd=fxX.createRadialGradient(ex+er*.5,ey+er*.4,er*.2,ex,ey,er);shd.addColorStop(0,'rgba(0,0,0,0)');shd.addColorStop(.5,'rgba(0,0,0,.18)');shd.addColorStop(1,'rgba(0,0,0,.6)');fxX.globalAlpha=ea*.5;fxX.beginPath();fxX.arc(ex,ey,er,0,TAU);fxX.fillStyle=shd;fxX.fill();
    if(exploded){const cp=clamp((t-HIT)/.22,0,1);fxX.globalAlpha=ea*cp;const cg2=fxX.createRadialGradient(impX,impY,0,impX,impY,er*.26*cp);cg2.addColorStop(0,'rgba(255,150,50,.8)');cg2.addColorStop(.4,'rgba(200,80,20,.5)');cg2.addColorStop(.8,'rgba(100,30,0,.3)');cg2.addColorStop(1,'rgba(0,0,0,0)');fxX.beginPath();fxX.arc(impX,impY,er*.26*cp,0,TAU);fxX.fillStyle=cg2;fxX.fill();fxX.fillStyle='rgba(0,0,0,.7)';fxX.beginPath();fxX.arc(impX,impY,er*.12*cp,0,TAU);fxX.fill();}
    fxX.restore();
    if(t<HIT&&!exploded){
      const p=t/HIT,astX=ax0+dvx*p,astY=ay0+dvy*p,astR=er*.2,ang2=Math.atan2(dvy,dvx);
      fxX.save();fxX.translate(astX,astY);fxX.rotate(ang2);
      const scone=fxX.createLinearGradient(-astR*5,0,astR*2,0);scone.addColorStop(0,'rgba(255,150,80,0)');scone.addColorStop(.5,`rgba(255,180,100,${p*.2})`);scone.addColorStop(1,`rgba(255,230,150,${p*.45})`);
      fxX.beginPath();fxX.moveTo(astR*.8,0);fxX.lineTo(-astR*5,-astR*2.5);fxX.lineTo(-astR*5,astR*2.5);fxX.closePath();fxX.fillStyle=scone;fxX.fill();fxX.restore();
      for(let i=0;i<12;i++){const tp=clamp(p-i*.025,0,1);const ttx=ax0+dvx*tp,tty=ay0+dvy*tp;const tg=fxX.createRadialGradient(ttx,tty,0,ttx,tty,mxr(astR*(1.5+i*.6)));tg.addColorStop(0,`rgba(255,220,80,${.42-i*.03})`);tg.addColorStop(.4,`rgba(255,100,20,${.22-i*.015})`);tg.addColorStop(1,'rgba(0,0,0,0)');fxX.beginPath();fxX.arc(ttx,tty,mxr(astR*(1.5+i*.6)),0,TAU);fxX.fillStyle=tg;fxX.fill();}
      fxX.save();fxX.translate(astX,astY);fxX.rotate(p*11);
      const ag2=fxX.createRadialGradient(-astR*.3,-astR*.3,0,0,0,astR);ag2.addColorStop(0,'hsl(28,20%,65%)');ag2.addColorStop(.5,'hsl(22,15%,40%)');ag2.addColorStop(1,'hsl(18,10%,18%)');
      fxX.beginPath();apts.forEach((pt2,i)=>{const r2=astR*pt2.r;i?fxX.lineTo(Math.cos(pt2.a)*r2,Math.sin(pt2.a)*r2):fxX.moveTo(Math.cos(pt2.a)*r2,Math.sin(pt2.a)*r2);});
      fxX.closePath();fxX.fillStyle=ag2;fxX.fill();fxX.strokeStyle='rgba(0,0,0,.5)';fxX.lineWidth=1.5;fxX.stroke();fxX.restore();
    }
    if(t>=HIT&&!exploded){exploded=true;sw2=0;boom();}
    if(exploded){
      sw2+=dt*520;const swa=clamp(1-sw2/(er*3.2),0,1);
      if(swa>0){fxX.beginPath();fxX.arc(impX,impY,mxr(sw2),0,TAU);fxX.strokeStyle=`rgba(255,210,90,${swa*.7})`;fxX.lineWidth=mxr(4*swa);fxX.stroke();}
      const fp=clamp(1-(now-start-HIT*dur)/(dur*.08),0,1);
      if(fp>0){fxX.fillStyle=`rgba(255,230,120,${fp*.85})`;fxX.fillRect(0,0,W,H);}
      for(const p2 of parts){p2.x+=p2.vx*dt;p2.y+=p2.vy*dt;p2.vy+=p2.grav*dt;p2.vx*=.995;p2.life-=p2.decay*dt;const r2=mxr(p2.r*p2.life);if(!r2)continue;fxX.globalAlpha=mxr(p2.life);if(p2.rock){fxX.beginPath();fxX.arc(p2.x,p2.y,r2,0,TAU);fxX.fillStyle=p2.color;fxX.fill();}else{const pg=fxX.createRadialGradient(p2.x,p2.y,0,p2.x,p2.y,r2);pg.addColorStop(0,p2.color);pg.addColorStop(1,'rgba(0,0,0,0)');fxX.beginPath();fxX.arc(p2.x,p2.y,r2,0,TAU);fxX.fillStyle=pg;fxX.fill();}fxX.globalAlpha=1;}
      parts=parts.filter(p2=>p2.life>0);
    }
    fxX.restore();if(t>=1)fxAnim=null;
  }};
}

/* ════ STAR LAYER DRAW ════ */
function drawStarLayer(arr,px,py,dt){
  for(const s of arr){
    s.phase+=s.speed*.45*dt;
    const op=s.baseOp*(.72+.28*Math.sin(s.phase));
    const col=s.sat>0?`hsla(${s.hue},${s.sat}%,88%,${op})`:`rgba(255,255,255,${op})`;
    const sx=((s.x+px)%W+W)%W,sy=((s.y+py)%H+H)%H;
    if(s.r>1.6){
      const hl=bgX.createRadialGradient(sx,sy,0,sx,sy,mxr(s.r*5));
      hl.addColorStop(0,s.sat>0?`hsla(${s.hue},65%,82%,${op*.4})`:`rgba(200,215,255,${op*.3})`);hl.addColorStop(1,'transparent');
      bgX.beginPath();bgX.arc(sx,sy,mxr(s.r*5),0,TAU);bgX.fillStyle=hl;bgX.fill();
      if(s.r>2.2){bgX.save();bgX.globalAlpha=op*.26;bgX.strokeStyle='#cde';bgX.lineWidth=.5;bgX.beginPath();bgX.moveTo(sx-s.r*8,sy);bgX.lineTo(sx+s.r*8,sy);bgX.moveTo(sx,sy-s.r*8);bgX.lineTo(sx,sy+s.r*8);bgX.stroke();bgX.restore();}
    }
    bgX.beginPath();bgX.arc(sx,sy,mxr(s.r),0,TAU);bgX.fillStyle=col;bgX.fill();
  }
}

/* ════ BG RENDER LOOP ════ */
function bgTick(now){
  const dt=(now-bgLast)/1000;bgLast=now;bgT+=dt;

  parMx+=(mx-parMx)*.04;parMy+=(my-parMy)*.04;
  const pdx=parMx-W/2,pdy=parMy-H/2;

  bgX.fillStyle='#000';bgX.fillRect(0,0,W,H);

  // Milky Way — draw cached offscreen canvas
  if(!milkyWayCache)buildMilkyWay();
  bgX.save();
  bgX.globalAlpha=.85;
  // Subtle slow drift
  const mwDx=pdx*-.004,mwDy=pdy*-.004;
  bgX.drawImage(milkyWayCache,mwDx,mwDy);
  bgX.restore();

  // Aurora (space weather)
  drawAurora(swData.auroraAlpha,swData.tint);

  // Stars — 3 parallax layers
  drawStarLayer(starsFar,pdx*-.008,pdy*-.008,dt);
  drawStarLayer(starsMid,pdx*-.018,pdy*-.018,dt);
  drawStarLayer(starsNear,pdx*-.034,pdy*-.034,dt);

  // Shooting stars — rate boosted by space weather
  shootSec-=dt*swData.shooterMult;
  if(shootSec<=0){spawnShooter();shootSec=rand(1.2,4);}
  shooters=shooters.filter(s=>s.life>0);
  for(const s of shooters){
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=s.decay*dt;
    const ang=Math.atan2(s.vy,s.vx);
    const tx=s.x-Math.cos(ang)*s.len*s.life,ty=s.y-Math.sin(ang)*s.len*s.life;
    const sg=bgX.createLinearGradient(tx,ty,s.x,s.y);
    sg.addColorStop(0,'rgba(255,255,255,0)');sg.addColorStop(.5,`rgba(210,228,255,${s.life*.32})`);sg.addColorStop(1,`rgba(255,255,255,${s.life*.92})`);
    bgX.save();bgX.globalCompositeOperation='screen';
    bgX.beginPath();bgX.moveTo(tx,ty);bgX.lineTo(s.x,s.y);bgX.strokeStyle=sg;bgX.lineWidth=mxr(s.width*s.life);bgX.lineCap='round';bgX.stroke();
    bgX.beginPath();bgX.arc(s.x,s.y,mxr(1.8*s.life),0,TAU);bgX.fillStyle=`rgba(255,255,255,${s.life*.9})`;bgX.fill();
    bgX.restore();
  }

  // Comets
  cometTimer+=dt;
  if(cometTimer>=cometInterval){spawnComet();cometTimer=0;cometInterval=10;}
  cosmics=cosmics.filter(o=>o.life>0&&o.x>-600&&o.x<W+600&&o.y>-600&&o.y<H+600);
  for(const o of cosmics){o.x+=o.vx*dt;o.y+=o.vy*dt;o.life-=o.decay*dt;drawComet(o);}

  // Satellites
  satelliteTimer-=dt;
  if(satelliteTimer<=0){spawnSatellite();satelliteTimer=rand(25,55);}
  satellites=satellites.filter(s=>s.life>0&&s.x>-200&&s.x<W+200);
  for(const s of satellites){s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=s.decay*dt;drawSatellite(s,dt);}

  requestAnimationFrame(bgTick);
}
requestAnimationFrame(bgTick);

/* ════ FX RENDER LOOP ════ */
function fxTick(){
  fxX.clearRect(0,0,W,H);
  // Ripples
  const now2=Date.now();
  ripples=ripples.filter(r=>r.life>0);
  for(const r of ripples){
    const age=(now2-r.born-r.delay)/1000;if(age<0)continue;
    r.radius=r.maxR*(1-Math.pow(1-Math.min(age*1.8,1),.5));r.life=mxr(1-age*1.15);
    fxX.beginPath();fxX.arc(r.x,r.y,mxr(r.radius),0,TAU);
    fxX.strokeStyle=`rgba(255,255,255,${r.life*.45})`;fxX.lineWidth=mxr(1.8*r.life);fxX.stroke();
  }
  // Comet cursor trail
  cometTrail.push({x:mx,y:my});if(cometTrail.length>CMAX)cometTrail.shift();
  for(let i=1;i<cometTrail.length;i++){const p=i/cometTrail.length;fxX.beginPath();fxX.arc(cometTrail[i].x,cometTrail[i].y,mxr(p*3.2),0,TAU);fxX.fillStyle=`hsla(205,100%,78%,${p*.6})`;fxX.fill();}
  if(cometTrail.length>0){const h=cometTrail[cometTrail.length-1];const hg=fxX.createRadialGradient(h.x,h.y,0,h.x,h.y,8);hg.addColorStop(0,'rgba(255,255,255,.88)');hg.addColorStop(1,'rgba(100,200,255,0)');fxX.beginPath();fxX.arc(h.x,h.y,8,0,TAU);fxX.fillStyle=hg;fxX.fill();}
  if(fxAnim)fxAnim.draw(performance.now());
  requestAnimationFrame(fxTick);
}
requestAnimationFrame(fxTick);

/* ════ VOICE COMMANDS ════ */
(()=>{
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  const hud=document.getElementById('voice-hud');
  const label=document.getElementById('voice-label');
  if(!SpeechRecognition){hud.style.opacity='.25';hud.title='Voice not supported in this browser';return;}

  const rec=new SpeechRecognition();
  rec.continuous=false;rec.interimResults=false;rec.lang='en-US';

  const VOICE_CMDS=[
    {patterns:['spawn comet','fire comet','comet'],fn:()=>{spawnComet();spawnComet();}},
    {patterns:['meteor rain','meteor shower','shooting stars','rain'],fn:()=>spawnMeteorRain(15)},
    {patterns:['meteor storm','storm'],fn:()=>spawnMeteorRain(50)},
    {patterns:['spawn satellite','satellite'],fn:()=>spawnSatellite(true)},
    {patterns:['supernova','explode','explosion'],fn:()=>triggerSupernova()},
    {patterns:['asteroid impact','asteroid','impact'],fn:()=>triggerAsteroid()},
    {patterns:['wormhole'],fn:()=>triggerWormhole(null)},
    {patterns:['clear','clear sky','reset'],fn:()=>{cosmics=[];satellites=[];}},
  ];

  let listening=false;

  function startListen(){
    if(listening)return;
    listening=true;
    hud.classList.add('listening');
    label.textContent='listening…';
    rec.start();
  }
  function stopListen(){
    listening=false;
    hud.classList.remove('listening');
    label.textContent='voice commands';
  }

  rec.onresult=e=>{
    const transcript=e.results[0][0].transcript.toLowerCase().trim();
    label.textContent=`"${transcript}"`;
    let matched=false;
    for(const cmd of VOICE_CMDS){
      if(cmd.patterns.some(p=>transcript.includes(p))){
        cmd.fn();matched=true;break;
      }
    }
    if(!matched)label.textContent='not recognized';
    setTimeout(stopListen,1800);
  };
  rec.onerror=()=>stopListen();
  rec.onend=()=>{if(listening)stopListen();};

  hud.addEventListener('click',()=>{
    if(listening){rec.stop();stopListen();}
    else{startListen();}
  });
  hud.addEventListener('touchend',e=>{
    e.preventDefault();
    if(listening){rec.stop();stopListen();}
    else{startListen();}
  });
})();
