<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Nasko Dev — Developer & Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & ROOT ── */
:root{
  --bg:#000;--fg:#fff;--muted:#888;
  --discord:hsl(235,86%,65%);--discord-glow:hsla(235,86%,65%,.45);
  --title-glow1:hsla(0,0%,100%,.15);--title-glow2:hsla(0,0%,100%,.05);
  --btn-bg:hsla(0,0%,100%,.07);--btn-hover:hsla(0,0%,100%,.13);
}
body.light{
  --bg:#f5f5f5;--fg:#111;--muted:#555;
  --title-glow1:hsla(0,0%,0%,.08);--title-glow2:hsla(0,0%,0%,.03);
  --btn-bg:hsla(0,0%,0%,.06);--btn-hover:hsla(0,0%,0%,.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;touch-action:none;}
body{
  background:var(--bg);color:var(--fg);
  font-family:'Inter',sans-serif;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  transition:background .5s,color .5s;
}

/* ── CANVASES ── */
#bg-canvas,#fx-canvas{
  position:fixed;inset:0;pointer-events:none;
}
#bg-canvas{z-index:0;}
#fx-canvas{z-index:5;}

/* ── TOOLBAR (top-left) ── */
.toolbar{
  position:fixed;top:1.2rem;left:1.2rem;
  display:flex;gap:.5rem;z-index:50;
  opacity:0;animation:fadeIn .5s ease 1s forwards;
}
.tool-btn{
  width:2.6rem;height:2.6rem;border-radius:.5rem;
  border:1px solid hsla(0,0%,50%,.2);
  background:var(--btn-bg);color:var(--muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:background .2s,color .2s,transform .2s cubic-bezier(.22,1,.36,1);
  -webkit-tap-highlight-color:transparent;
}
.tool-btn:hover{background:var(--btn-hover);color:var(--fg);transform:scale(1.08);}
.tool-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── UI HIDDEN STATE ── */
body.ui-hidden .stage,
body.ui-hidden #cmd-bar,
body.ui-hidden #cmd-suggestions,
body.ui-hidden .code-panel{
  opacity:0 !important;pointer-events:none !important;
}
body.ui-hidden .toolbar{opacity:.25;}
/* transparent btn fades slightly to show it still exists */

/* ── CODE PANEL ── */
.code-panel{
  position:fixed;top:4.4rem;left:1.2rem;z-index:60;
  background:hsla(0,0%,4%,.97);border:1px solid hsla(0,0%,100%,.12);
  border-radius:.6rem;padding:.85rem;width:215px;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  display:none;flex-direction:column;gap:.5rem;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
}
.code-panel.open{display:flex;}
.code-panel label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:hsla(0,0%,100%,.38);}
.code-panel input{
  background:hsla(0,0%,100%,.06);border:1px solid hsla(0,0%,100%,.12);
  border-radius:.35rem;padding:.4rem .6rem;color:#fff;
  font-family:'Inter',monospace;font-size:.82rem;outline:none;width:100%;
  transition:border-color .2s;
}
.code-panel input:focus{border-color:hsla(235,86%,65%,.6);}
.code-hint{font-size:.6rem;color:hsla(0,0%,100%,.25);}
.code-hint span{color:hsl(220,80%,65%);}

/* ── COMMAND BAR (bottom-left) ── */
#cmd-bar{
  position:fixed;bottom:1.4rem;left:1.2rem;z-index:60;
  display:flex;align-items:center;gap:0;
  background:hsla(0,0%,4%,.96);border:1px solid hsla(0,0%,100%,.12);
  border-radius:.55rem;overflow:hidden;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  box-shadow:0 6px 28px rgba(0,0,0,.7);
  width:52px;transition:width .3s cubic-bezier(.22,1,.36,1);
  opacity:0;animation:fadeIn .5s ease 1.1s forwards;
}
#cmd-bar.open{width:min(360px,90vw);}
#cmd-toggle{
  width:52px;height:42px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:none;border:none;color:var(--muted);
  transition:color .2s;-webkit-tap-highlight-color:transparent;
  font-size:.68rem;font-weight:700;font-family:'Inter',monospace;letter-spacing:.02em;
}
#cmd-toggle:hover{color:#fff;}
#cmd-input-wrap{
  flex:1;display:flex;align-items:center;overflow:hidden;
  padding:0 .6rem 0 0;
}
#cmd-input{
  flex:1;background:none;border:none;outline:none;
  color:#fff;font-family:'Inter',monospace;font-size:.8rem;
  white-space:nowrap;min-width:0;
}
#cmd-input::placeholder{color:hsla(0,0%,100%,.3);}
#cmd-hint{
  font-size:.6rem;color:hsla(0,0%,100%,.22);white-space:nowrap;
  padding-right:.4rem;
}
#cmd-suggestions{
  position:fixed;bottom:4.4rem;left:1.2rem;
  width:min(360px,90vw);z-index:61;
  background:hsla(0,0%,5%/.98);border:1px solid hsla(0,0%,100%/.12);
  border-radius:.55rem;overflow:hidden;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  box-shadow:0 -4px 24px rgba(0,0,0,.7);
  display:none;
}
#cmd-suggestions.open{display:block;}
.cs{
  display:flex;align-items:center;gap:.6rem;
  padding:.48rem .9rem;cursor:pointer;
  transition:background .1s;font-size:.78rem;color:hsla(0,0%,100%,.7);
}
.cs:hover,.cs.sel{background:hsla(0,0%,100%/.07);color:#fff;}
.cs-key{font-family:monospace;color:hsl(220,80%,68%);font-size:.76rem;flex-shrink:0;}
.cs-desc{font-size:.66rem;color:hsla(0,0%,100%,.3);margin-left:auto;}

/* ── STAGE ── */
.stage{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;gap:1.5rem;text-align:center;padding:2rem;
  transform-style:preserve-3d;will-change:transform;
  transition:transform .1s linear, opacity .4s ease;
}
.stage.fading{opacity:0 !important;pointer-events:none;}

.greeting{
  font-size:.78rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
  color:hsl(220,90%,70%);opacity:0;animation:fadeIn .6s ease .05s forwards;
}
.avatar{
  width:100px;height:100px;border-radius:50%;object-fit:cover;
  border:2px solid hsla(0,0%,100%,.15);box-shadow:0 0 30px hsla(0,0%,100%,.08);
  opacity:0;transform:translateY(30px);cursor:pointer;
  animation:fadeUp .8s cubic-bezier(.22,1,.36,1) 0s forwards;
  transition:box-shadow .2s;-webkit-tap-highlight-color:transparent;
}
.avatar:hover{box-shadow:0 0 40px hsla(235,86%,65%,.4);}
@keyframes wobble{
  0%{transform:rotate(0)scale(1)}15%{transform:rotate(-8deg)scale(1.08)}
  30%{transform:rotate(7deg)scale(1.08)}45%{transform:rotate(-5deg)scale(1.04)}
  60%{transform:rotate(4deg)scale(1.04)}75%{transform:rotate(-2deg)scale(1.01)}
  100%{transform:rotate(0)scale(1)}
}
.avatar.wobbling{animation:wobble .6s cubic-bezier(.22,1,.36,1) forwards!important;}
.title{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(3rem,10vw,6rem);letter-spacing:-.03em;line-height:1;
  color:var(--fg);text-shadow:0 0 40px var(--title-glow1),0 0 80px var(--title-glow2);
  opacity:0;transform:translateY(30px);
  animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .1s forwards;
}
.tagline{
  font-size:clamp(.9rem,2.5vw,1.15rem);letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);opacity:0;transform:translateY(30px);
  animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .3s forwards;min-height:1.5em;
}
.cursor-blink{
  display:inline-block;width:2px;height:1em;
  background:var(--muted);margin-left:2px;vertical-align:middle;
  animation:blink .7s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.discord-btn{
  display:inline-flex;align-items:center;gap:.6rem;margin-top:.5rem;
  padding:.75rem 2rem;background:var(--discord);color:#fff;
  font-weight:600;font-size:.95rem;border-radius:.5rem;text-decoration:none;
  cursor:pointer;transition:transform .2s cubic-bezier(.22,1,.36,1),box-shadow .2s;
  opacity:0;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .5s forwards;
  -webkit-tap-highlight-color:transparent;
}
.discord-btn:hover{transform:scale(1.08);box-shadow:0 0 30px var(--discord-glow),0 0 60px var(--discord-glow);}
.discord-btn:active{transform:scale(.96);}
.discord-btn svg{width:18px;height:18px;fill:currentColor;}
.socials{display:flex;align-items:center;gap:1.25rem;opacity:0;animation:fadeIn .7s ease .7s forwards;}
.social-link{
  display:flex;align-items:center;justify-content:center;
  width:2.5rem;height:2.5rem;border-radius:.4rem;
  color:var(--muted);text-decoration:none;
  transition:color .2s,background .2s,transform .2s cubic-bezier(.22,1,.36,1);
  -webkit-tap-highlight-color:transparent;
}
.social-link:hover{color:var(--fg);background:hsla(0,0%,100%,.08);transform:scale(1.1);}
.social-link svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.visitor-counter{
  display:flex;align-items:center;gap:.5rem;font-size:.75rem;
  color:hsla(0,0%,100%,.3);letter-spacing:.08em;
  opacity:0;animation:fadeIn .7s ease .9s forwards;
}
.visitor-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;flex-shrink:0;animation:dotpulse 2s ease-in-out infinite;}
@keyframes dotpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.deploy-note{font-size:.72rem;color:hsla(0,0%,100%/.22);letter-spacing:.18em;opacity:0;animation:fadeIn .7s ease .9s forwards;}

/* ── FLASH ── */
#flash{position:fixed;inset:0;z-index:9999;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s;}
#flash.go{opacity:.45;}

/* ── KEYFRAMES ── */
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{to{opacity:1;}}

/* ── MOBILE ── */
@media(max-width:480px){
  .stage{gap:1.1rem;padding:1.2rem;}
  .title{font-size:clamp(2.4rem,13vw,4rem);}
  .avatar{width:80px;height:80px;}
  .discord-btn{padding:.65rem 1.4rem;font-size:.88rem;}
  .toolbar{top:.8rem;left:.8rem;}
  #cmd-bar{bottom:.8rem;left:.8rem;}
  #cmd-suggestions{bottom:4rem;left:.8rem;}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<div id="flash"></div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="tool-btn" id="uiToggleBtn" aria-label="Toggle UI visibility" title="Hide/show UI">
    <svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>

<!-- Command Bar (bottom-left) -->
<div id="cmd-bar">
  <button id="cmd-toggle" aria-label="Command bar" title="Open command bar (L)">
    <svg viewBox="0 0 24 24" width="15" height="15" style="stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>

<!-- Stage -->
<main class="stage" id="stage">

    Join Discord
  </a>

<script>
/* ════ UTILS ════ */
const rand=(a,b)=>a+Math.random()*(b-a);
const randI=(a,b)=>Math.floor(rand(a,b));
const TAU=Math.PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const mxr=v=>Math.max(0,v);

/* ════ CANVAS + STATE ════ */
const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
const fxC=document.getElementById('fx-canvas'),fxX=fxC.getContext('2d');
let W=0,H=0;

// All state declared before first resize
let starsNear=[],starsMid=[],starsFar=[];
let shooters=[],shootSec=rand(1,3);
let cosmics=[];
let cometTimer=0,cometInterval=15;
let ripples=[];
let fxAnim=null;
let bgT=0,bgLast=performance.now();
let mx=0,my=0,pmx=0,pmy=0;
const cometTrail=[],CMAX=36;

/* ════ PARALLAX MOUSE ════ */
let parMx=0,parMy=0; // smoothed parallax position
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
// Touch support
document.addEventListener('touchmove',e=>{
  const t=e.touches[0];mx=t.clientX;my=t.clientY;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchstart',e=>{
  const t=e.touches[0];mx=t.clientX;my=t.clientY;
},{passive:true});

/* ════ RESIZE ════ */
function resizeAll(){
  W=bgC.width=fxC.width=window.innerWidth;
  H=bgC.height=fxC.height=window.innerHeight;
  makeStarLayers();
}
resizeAll();
window.addEventListener('resize',resizeAll);
document.addEventListener('fullscreenchange',()=>setTimeout(resizeAll,80));
document.addEventListener('webkitfullscreenchange',()=>setTimeout(resizeAll,80));
new ResizeObserver(()=>resizeAll()).observe(document.documentElement);

/* ════ CODE PANEL ════ */
const codePanel=document.getElementById('codePanel');
const codeInp=document.getElementById('codeInput');
// code panel now opens from cmd bar area — attach to a dedicated open fn
function openCodePanel(){codePanel.classList.add('open');codeInp.focus();}
document.addEventListener('click',e=>{
  if(!codePanel.contains(e.target))codePanel.classList.remove('open');
});
codeInp.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const c=codeInp.value.trim().toUpperCase();codeInp.value='';codePanel.classList.remove('open');
  if(c==='ASTEROID')triggerAsteroid();
});

/* ════ UI TOGGLE (transparent button) ════ */
let uiVisible=true;
document.getElementById('uiToggleBtn').addEventListener('click',()=>{
  uiVisible=!uiVisible;
  document.body.classList.toggle('ui-hidden',!uiVisible);
  // swap eye icon to slashed or normal
  const btn=document.getElementById('uiToggleBtn');
  btn.style.opacity=uiVisible?'1':'.4';
});

/* ════ COMMAND BAR ════ */
const cmdBar=document.getElementById('cmd-bar');
const cmdInput=document.getElementById('cmd-input');
const cmdSugg=document.getElementById('cmd-suggestions');

const CMD_LIST=[
  {cmd:'/spawn comet',desc:'Send a comet across the sky',fn:()=>spawnComet()},
  {cmd:'/rain',desc:'10 shooting stars',fn:()=>spawnMeteorRain(10)},
  {cmd:'/storm',desc:'50 shooting stars',fn:()=>spawnMeteorRain(50)},
  {cmd:'/impact',desc:'Asteroid hits Earth (cinematic)',fn:()=>triggerAsteroid()},
  {cmd:'/supernova',desc:'Star explosion',fn:()=>triggerSupernova()},
  {cmd:'/clear',desc:'Clear all cosmic objects',fn:()=>{cosmics=[];}},
];

let cmdSelIdx=0;

function openCmdBar(){
  cmdBar.classList.add('open');
  cmdInput.focus();
  renderSuggestions('');
}
function closeCmdBar(){
  cmdBar.classList.remove('open');
  cmdSugg.classList.remove('open');
  cmdInput.value='';
}

function renderSuggestions(q){
  const filt=q?CMD_LIST.filter(c=>c.cmd.includes(q.toLowerCase())):CMD_LIST;
  if(!filt.length){cmdSugg.classList.remove('open');return;}
  cmdSugg.classList.add('open');
  cmdSugg.innerHTML=filt.slice(0,7).map((c,i)=>`
    <div class="cs${i===cmdSelIdx?' sel':''}" data-i="${i}">
      <span class="cs-key">${c.cmd}</span>
      <span class="cs-desc">${c.desc}</span>
    </div>`).join('');
  cmdSugg.querySelectorAll('.cs').forEach((el,i)=>{
    el.addEventListener('click',()=>{filt[i].fn();closeCmdBar();});
    el.addEventListener('touchend',()=>{filt[i].fn();closeCmdBar();});
  });
  return filt;
}

document.getElementById('cmd-toggle').addEventListener('click',()=>{
  cmdBar.classList.contains('open')?closeCmdBar():openCmdBar();
});
document.getElementById('cmd-toggle').addEventListener('touchend',e=>{
  e.preventDefault();
  cmdBar.classList.contains('open')?closeCmdBar():openCmdBar();
});

cmdInput.addEventListener('input',e=>{
  cmdSelIdx=0;renderSuggestions(e.target.value);
});
cmdInput.addEventListener('keydown',e=>{
  const q=cmdInput.value.toLowerCase();
  const filt=q?CMD_LIST.filter(c=>c.cmd.includes(q)):CMD_LIST;
  const els=cmdSugg.querySelectorAll('.cs');
  if(e.key==='ArrowDown'){e.preventDefault();cmdSelIdx=Math.min(cmdSelIdx+1,els.length-1);}
  if(e.key==='ArrowUp'){e.preventDefault();cmdSelIdx=Math.max(cmdSelIdx-1,0);}
  if(e.key==='Enter'){

  }
  if(e.key==='Escape')closeCmdBar();
  els.forEach((el,i)=>el.classList.toggle('sel',i===cmdSelIdx));
});

function makeStarLayers(){
  function makeLayer(n,rMin,rMax,opMin,opMax){
    const arr=[];
    for(let i=0;i<n;i++){
      const t=Math.random();
      arr.push({
        x:rand(0,W),y:rand(0,H),
        r:rand(rMin,rMax),
        baseOp:rand(opMin,opMax),
        phase:rand(0,TAU),speed:rand(.15,.8),
        hue:Math.random()<.65?0:randI(210,270),
        sat:Math.random()<.65?0:rand(20,60),
      });
    }
    return arr;
  }
  const total=Math.floor(W*H/2200);
  starsFar =makeLayer(Math.floor(total*.55),.2,.65,.15,.4);  // slowest parallax
  starsMid =makeLayer(Math.floor(total*.3), .6,1.3,.3,.6);   // medium
  starsNear=makeLayer(Math.floor(total*.15),1.2,2.6,.5,.95); // fastest parallax
}

/* ════ COMET ════ */
function spawnComet(){
  // Comets always enter from a screen edge at a shallow realistic angle
  const side=randI(0,4); // 0=top, 1=right, 2=bottom, 3=left
  let x,y,vx,vy;
  const spd=rand(28,55); // slow and majestic
  const ang=rand(.12,.38); // shallow trajectory angle
  if(side===0){       // from top
    x=rand(W*.05,W*.95); y=-80;
    vx=rand(-.5,.5)*spd; vy=spd*ang;
  }else if(side===1){ // from right
    x=W+80; y=rand(H*.05,H*.75);
    vx=-spd; vy=rand(-.25,.25)*spd;
  }else if(side===2){ // from bottom
    x=rand(W*.05,W*.95); y=H+80;
    vx=rand(-.5,.5)*spd; vy=-spd*ang;
  }else{              // from left
    x=-80; y=rand(H*.05,H*.75);
    vx=spd; vy=rand(-.25,.25)*spd;
  }

  // Varied comet personalities
  const isLarge=Math.random()<.25; // 1 in 4 chance of a spectacular large comet
  cosmics.push({
    type:'comet',
    x,y,vx,vy,
    life:1,
    // Slow decay — comet lingers across the full screen
    decay:isLarge?rand(.00012,.00022):rand(.00022,.00045),
    tailLen:isLarge?rand(380,600):rand(180,360),
    brightness:isLarge?rand(.92,1.0):rand(.65,.88),
    nucleus:isLarge?rand(7,12):rand(3.5,7),
    // Anti-solar tail angle offset (tail always points away from travel direction)
    tailSpread:rand(.02,.08),
    dustWidth:isLarge?rand(14,22):rand(7,14),
    ionWidth:isLarge?rand(3.5,6):rand(1.8,3.5),
  });
}

/* ════ DRAW COMET ════ */
function drawComet(o,dt){
  const al=clamp(o.life*6,0,1);
  const ang=Math.atan2(o.vy,o.vx);
  // tail points anti-solar (opposite travel direction)
  const tailAng=ang+Math.PI;

  bgX.save();
  bgX.globalCompositeOperation='screen';

  // ── Dust tail (broad, yellowish-white, curved) ──
  const dustLen=o.tailLen;
  const dTX=o.x+Math.cos(tailAng)*dustLen;
  const dTY=o.y+Math.sin(tailAng)*dustLen;
  const dg=bgX.createLinearGradient(o.x,o.y,dTX,dTY);
  dg.addColorStop(0,`rgba(255,248,200,${.55*al*o.brightness})`);
  dg.addColorStop(.2,`rgba(255,238,170,${.38*al*o.brightness})`);
  dg.addColorStop(.55,`rgba(240,220,140,${.18*al*o.brightness})`);
  dg.addColorStop(1,'rgba(200,180,100,0)');
  bgX.beginPath();bgX.moveTo(o.x,o.y);bgX.lineTo(dTX,dTY);
  bgX.strokeStyle=dg;bgX.lineWidth=mxr(o.dustWidth*o.life);bgX.lineCap='round';bgX.stroke();

  // ── Ion tail (narrow, straight, blue-white) ──
  // Ion tail is slightly straighter than dust tail
  const ionLen=o.tailLen*1.55;
  const ionAng=tailAng+o.tailSpread; // slight angular separation
  const iTX=o.x+Math.cos(ionAng)*ionLen;
  const iTY=o.y+Math.sin(ionAng)*ionLen;
  const ig=bgX.createLinearGradient(o.x,o.y,iTX,iTY);
  ig.addColorStop(0,`rgba(200,230,255,${.75*al*o.brightness})`);
  ig.addColorStop(.3,`rgba(170,210,255,${.45*al*o.brightness})`);
  ig.addColorStop(.65,`rgba(140,190,255,${.2*al*o.brightness})`);
  ig.addColorStop(1,'rgba(100,160,255,0)');
  bgX.beginPath();bgX.moveTo(o.x,o.y);bgX.lineTo(iTX,iTY);
  bgX.strokeStyle=ig;bgX.lineWidth=mxr(o.ionWidth*o.life);bgX.lineCap='round';bgX.stroke();

  bgX.restore();

  // ── Coma (extended green-white fuzzy glow around nucleus) ──
  // Real comets have a green coma from diatomic carbon
  const comaR=o.nucleus*5.5;
  const cg=bgX.createRadialGradient(o.x,o.y,0,o.x,o.y,mxr(comaR));
  cg.addColorStop(0,`rgba(255,255,255,${.95*al})`);
  cg.addColorStop(.2,`rgba(210,255,210,${.55*al*o.brightness})`);
  cg.addColorStop(.5,`rgba(160,230,160,${.22*al*o.brightness})`);
  cg.addColorStop(.8,`rgba(100,200,120,${.07*al*o.brightness})`);
  cg.addColorStop(1,'rgba(0,0,0,0)');
  bgX.beginPath();bgX.arc(o.x,o.y,mxr(comaR),0,TAU);
  bgX.fillStyle=cg;bgX.fill();

  // ── Nucleus — bright hard core ──
  const ng=bgX.createRadialGradient(o.x,o.y,0,o.x,o.y,mxr(o.nucleus));
  ng.addColorStop(0,`rgba(255,255,255,${al})`);
  ng.addColorStop(.6,`rgba(230,248,255,${.8*al})`);
  ng.addColorStop(1,`rgba(180,220,255,0)`);
  bgX.beginPath();bgX.arc(o.x,o.y,mxr(o.nucleus),0,TAU);
  bgX.fillStyle=ng;bgX.fill();
}

/* ════ SUPERNOVA ════ */
function triggerSupernova(){
  if(fxAnim)return;
  const sx=rand(W*.15,W*.85),sy=rand(H*.15,H*.75);
  const start=performance.now(),dur=3500;
  const parts=[];let blasted=false;
  fxAnim={lastT:start,draw(now){
    const t=clamp((now-start)/dur,0,1);
    const dt=clamp((now-this.lastT)/1000,0,.08);this.lastT=now;
    fxX.save();
    if(t<.3){
      const p=t/.3,r=mxr(10+p*55);
      const sg=fxX.createRadialGradient(sx,sy,0,sx,sy,r);
      sg.addColorStop(0,`rgba(255,255,200,${p*.95})`);sg.addColorStop(.5,`rgba(255,180,50,${p*.65})`);sg.addColorStop(1,'rgba(255,100,0,0)');
      fxX.beginPath();fxX.arc(sx,sy,r,0,TAU);fxX.fillStyle=sg;fxX.fill();
    }
    if(t>=.3&&!blasted){
      blasted=true;
      for(let i=0;i<90;i++){
        const a=rand(0,TAU),sp=rand(70,450),h=rand(18,65);
        parts.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(2,9),life:1,decay:rand(.25,.7),h});
      }
    }
    if(t>=.3){
      const p=(t-.3)/.7;
      for(let r=0;r<4;r++){
        const rp=clamp((p-.06*r)/.75,0,1);
        const rr=mxr(rp*(W*.32+r*55));
        fxX.beginPath();fxX.arc(sx,sy,rr,0,TAU);
        fxX.strokeStyle=`rgba(255,${175-r*35},${45+r*18},${.38*(1-rp)})`;
        fxX.lineWidth=3.5-r*.5;fxX.stroke();
      }
      for(const p2 of parts){
        p2.x+=p2.vx*dt;p2.y+=p2.vy*dt;p2.life-=p2.decay*dt;
        const r2=mxr(p2.r*p2.life);if(!r2)continue;
        fxX.globalAlpha=mxr(p2.life);
        const pg=fxX.createRadialGradient(p2.x,p2.y,0,p2.x,p2.y,r2);
        pg.addColorStop(0,`hsl(${p2.h},100%,82%)`);pg.addColorStop(1,'rgba(0,0,0,0)');
        fxX.beginPath();fxX.arc(p2.x,p2.y,r2,0,TAU);fxX.fillStyle=pg;fxX.fill();
        fxX.globalAlpha=1;
      }
    }
    fxX.restore();
    if(t>=1)fxAnim=null;
  }};
}

/* ════ ASTEROID IMPACT (REALISTIC) ════ */
function triggerAsteroid(){
  if(fxAnim)return;
  const start=performance.now(),dur=7500;
  const ex=W/2,ey=H*.68,er=Math.min(W,H)*.155;
  const ax0=W*.9,ay0=-er*2.2;
  const impX=ex+er*.28,impY=ey-er*.5;
  const dvx=impX-ax0,dvy=impY-ay0,HIT=.4;
  let exploded=false,sw=0,parts=[];
  // asteroid shape for animation
  const apts=[0,.68,1.32,2.08,2.78,3.58,4.34,5.1,5.88].map((a,i)=>({a,r:i%2===0?1:.62}));

  function boom(){
    // Fire particles
    for(let i=0;i<160;i++){
      const a=rand(0,TAU),sp=rand(90,700),h=rand(15,55);
      parts.push({x:impX,y:impY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(2,15),life:1,decay:rand(.22,.7),color:`hsl(${h},100%,${randI(52,88)}%)`,grav:rand(55,230)});
    }
    // Rock chunks
    for(let i=0;i<45;i++){
      const a=rand(-Math.PI*.9,-Math.PI*.1),sp=rand(120,480);
      parts.push({x:impX,y:impY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(5,22),life:1,decay:rand(.15,.45),color:`hsl(${randI(18,38)},${randI(6,20)}%,${randI(30,52)}%)`,grav:rand(90,220),rock:true});
    }
    // Steam/vapor
    for(let i=0;i<30;i++){
      const a=rand(-Math.PI,0),sp=rand(60,200);
      parts.push({x:impX,y:impY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(8,28),life:.6,decay:rand(.08,.2),color:`rgba(200,180,160,`,grav:rand(-30,20),vapor:true});
    }
  }

  fxAnim={lastT:start,draw(now){
    const dt=clamp((now-this.lastT)/1000,0,.1);this.lastT=now;
    const t=clamp((now-start)/dur,0,1);
    fxX.save();
    fxX.fillStyle=`rgba(0,0,0,${clamp(t<.82?t*.35:(1-t)/.18*.35,0,.35)})`;
    fxX.fillRect(0,0,W,H);

    // Earth
    const ea=t<.12?t/.12:t>.86?(1-(t-.86)/.14):1;
    fxX.save();fxX.globalAlpha=ea;

    // Atmosphere
    const atm=fxX.createRadialGradient(ex,ey,er*.88,ex,ey,er*1.42);
    atm.addColorStop(0,'rgba(60,140,255,.25)');atm.addColorStop(.4,'rgba(40,100,220,.1)');atm.addColorStop(1,'rgba(0,20,100,0)');
    fxX.beginPath();fxX.arc(ex,ey,er*1.42,0,TAU);fxX.fillStyle=atm;fxX.fill();

    // Ocean
    const oc=fxX.createRadialGradient(ex-er*.25,ey-er*.25,0,ex,ey,er);
    oc.addColorStop(0,'#1565b8');oc.addColorStop(.4,'#0d47a1');oc.addColorStop(.75,'#0a3880');oc.addColorStop(1,'#061c50');
    fxX.beginPath();fxX.arc(ex,ey,er,0,TAU);fxX.fillStyle=oc;fxX.fill();

    // Continents
    fxX.fillStyle='rgba(34,142,52,.88)';
    [[-.3,-.25,.39],[.24,-.1,.27],[-.1,.3,.22],[.3,.3,.17],[-.05,-.08,.14]].forEach(([ox,oy,r])=>{
      fxX.beginPath();fxX.arc(ex+ox*er,ey+oy*er,r*er,0,TAU);fxX.fill();
    });
    // Mountain/terrain variation
    fxX.fillStyle='rgba(20,100,35,.4)';
    [[-.25,-.2,.15],[.18,-.05,.12],[.28,.28,.1]].forEach(([ox,oy,r])=>{
      fxX.beginPath();fxX.arc(ex+ox*er,ey+oy*er,r*er,0,TAU);fxX.fill();
    });
    // Clouds
    fxX.globalAlpha=ea*.38;fxX.fillStyle='rgba(255,255,255,.6)';
    [[-.12,-.38,.32],[.3,.08,.24],[-.26,.22,.19],[.08,-.15,.15]].forEach(([ox,oy,r])=>{
      fxX.beginPath();fxX.arc(ex+ox*er,ey+oy*er,r*er,0,TAU);fxX.fill();
    });

    // Polar ice
    fxX.globalAlpha=ea*.7;fxX.fillStyle='rgba(220,235,255,.7)';
    fxX.beginPath();fxX.ellipse(ex,ey-er*.88,er*.35,er*.14,0,0,TAU);fxX.fill();
    fxX.beginPath();fxX.ellipse(ex,ey+er*.88,er*.28,er*.1,0,0,TAU);fxX.fill();

    // Terminator shadow
    fxX.globalAlpha=ea*.5;
    const shd=fxX.createRadialGradient(ex+er*.5,ey+er*.4,er*.2,ex,ey,er);
    shd.addColorStop(0,'rgba(0,0,0,0)');shd.addColorStop(.5,'rgba(0,0,0,.18)');shd.addColorStop(1,'rgba(0,0,0,.6)');
    fxX.beginPath();fxX.arc(ex,ey,er,0,TAU);fxX.fillStyle=shd;fxX.fill();

    // Impact crater (grows after hit)
    if(exploded){
      const cp=clamp((t-HIT)/.22,0,1);
      fxX.globalAlpha=ea*cp;
      // glowing crater
      const cg=fxX.createRadialGradient(impX,impY,0,impX,impY,er*.26*cp);
      cg.addColorStop(0,'rgba(255,150,50,.8)');cg.addColorStop(.4,'rgba(200,80,20,.5)');cg.addColorStop(.8,'rgba(100,30,0,.3)');cg.addColorStop(1,'rgba(0,0,0,0)');
      fxX.beginPath();fxX.arc(impX,impY,er*.26*cp,0,TAU);fxX.fillStyle=cg;fxX.fill();
      fxX.fillStyle='rgba(0,0,0,.7)';
      fxX.beginPath();fxX.arc(impX,impY,er*.12*cp,0,TAU);fxX.fill();
    }
    fxX.restore();

    // Asteroid entry
    if(t<HIT&&!exploded){
      const p=t/HIT;
      const astX=ax0+dvx*p,astY=ay0+dvy*p;
      const astR=er*.2;
      const speed=Math.sqrt(dvx*dvx+dvy*dvy);
      const ang2=Math.atan2(dvy,dvx);

      // Hypersonic shock cone
      fxX.save();fxX.translate(astX,astY);fxX.rotate(ang2);
      const scone=fxX.createLinearGradient(-astR*5,0,astR*2,0);
      scone.addColorStop(0,'rgba(255,150,80,0)');scone.addColorStop(.5,`rgba(255,180,100,${p*.2})`);scone.addColorStop(1,`rgba(255,230,150,${p*.45})`);
      fxX.beginPath();fxX.moveTo(astR*.8,0);fxX.lineTo(-astR*5,-astR*2.5);fxX.lineTo(-astR*5,astR*2.5);fxX.closePath();
      fxX.fillStyle=scone;fxX.fill();
      fxX.restore();

      // Fire plasma trail
      for(let i=0;i<12;i++){
        const tp=clamp(p-i*.025,0,1);
        const ttx=ax0+dvx*tp,tty=ay0+dvy*tp;
        const tg=fxX.createRadialGradient(ttx,tty,0,ttx,tty,mxr(astR*(1.5+i*.6)));
        tg.addColorStop(0,`rgba(255,220,80,${.42-i*.03})`);
        tg.addColorStop(.4,`rgba(255,100,20,${.22-i*.015})`);
        tg.addColorStop(1,'rgba(0,0,0,0)');
        fxX.beginPath();fxX.arc(ttx,tty,mxr(astR*(1.5+i*.6)),0,TAU);fxX.fillStyle=tg;fxX.fill();
      }
      // Smoke trail
      for(let i=0;i<20;i++){
        const tp=clamp(p-i*.022,0,1);
        const ttx=ax0+dvx*tp,tty=ay0+dvy*tp;
        fxX.beginPath();fxX.arc(ttx,tty,mxr(astR*.7*((20-i)/20)),0,TAU);
        fxX.fillStyle=`rgba(60,45,30,${.12-i*.005})`;fxX.fill();
      }
      // Asteroid body
      fxX.save();fxX.translate(astX,astY);fxX.rotate(p*11);
      const ag2=fxX.createRadialGradient(-astR*.3,-astR*.3,0,0,0,astR);
      ag2.addColorStop(0,'hsl(28,20%,65%)');ag2.addColorStop(.5,'hsl(22,15%,40%)');ag2.addColorStop(1,'hsl(18,10%,18%)');
      fxX.beginPath();
      apts.forEach((pt2,i)=>{const r2=astR*pt2.r;i?fxX.lineTo(Math.cos(pt2.a)*r2,Math.sin(pt2.a)*r2):fxX.moveTo(Math.cos(pt2.a)*r2,Math.sin(pt2.a)*r2);});
      fxX.closePath();fxX.fillStyle=ag2;fxX.fill();
      fxX.strokeStyle='rgba(0,0,0,.5)';fxX.lineWidth=1.5;fxX.stroke();
      // craters on animated asteroid
      [[.2,.1,.18],[-.22,-.18,.12],[.08,-.26,.09]].forEach(([ox,oy,r])=>{
        fxX.beginPath();fxX.arc(ox*astR,oy*astR,mxr(r*astR),0,TAU);fxX.fillStyle='rgba(0,0,0,.38)';fxX.fill();
      });
      fxX.restore();
    }

    if(t>=HIT&&!exploded){exploded=true;sw=0;boom();}

    if(exploded){
      sw+=dt*520;
      const swa=clamp(1-sw/(er*3.2),0,1);
      if(swa>0){
        fxX.beginPath();fxX.arc(impX,impY,mxr(sw),0,TAU);
        fxX.strokeStyle=`rgba(255,210,90,${swa*.7})`;fxX.lineWidth=mxr(4*swa);fxX.stroke();
        const swg=fxX.createRadialGradient(impX,impY,mxr(sw*.65),impX,impY,mxr(sw));
        swg.addColorStop(0,'rgba(255,150,30,0)');
        swg.addColorStop(.55,`rgba(255,120,15,${.1*swa})`);
        swg.addColorStop(1,'rgba(0,0,0,0)');
        fxX.beginPath();fxX.arc(impX,impY,mxr(sw),0,TAU);fxX.fillStyle=swg;fxX.fill();
      }
      // Impact flash
      const fp=clamp(1-(now-start-HIT*dur)/(dur*.08),0,1);
      if(fp>0){fxX.fillStyle=`rgba(255,230,120,${fp*.85})`;fxX.fillRect(0,0,W,H);}
      // Particles
      for(const p2 of parts){
        p2.x+=p2.vx*dt;p2.y+=p2.vy*dt;
        p2.vy+=p2.grav*dt;
        p2.vx*=.995;
        p2.life-=p2.decay*dt;
        const r2=mxr(p2.r*p2.life);if(!r2)continue;
        fxX.globalAlpha=mxr(p2.life);
        if(p2.vapor){
          fxX.beginPath();fxX.arc(p2.x,p2.y,r2,0,TAU);
          fxX.fillStyle=`rgba(200,175,150,${p2.life*.3})`;fxX.fill();
        }else if(p2.rock){
          fxX.beginPath();fxX.arc(p2.x,p2.y,r2,0,TAU);
          fxX.fillStyle=p2.color;fxX.fill();
          // rock highlight
          fxX.fillStyle='rgba(255,255,255,.08)';fxX.fill();
        }else{
          const pg=fxX.createRadialGradient(p2.x,p2.y,0,p2.x,p2.y,r2);
          pg.addColorStop(0,p2.color);pg.addColorStop(1,'rgba(0,0,0,0)');
          fxX.beginPath();fxX.arc(p2.x,p2.y,r2,0,TAU);fxX.fillStyle=pg;fxX.fill();
        }
        fxX.globalAlpha=1;
      }
      parts=parts.filter(p2=>p2.life>0);
    }
    fxX.restore();
    if(t>=1)fxAnim=null;
  }};
}

/* ════ BG RENDER LOOP ════ */
function drawStarLayer(arr,parallaxX,parallaxY,dt){
  for(const s of arr){
    s.phase+=s.speed*.45*dt;
    const op=s.baseOp*(.72+.28*Math.sin(s.phase));
    const col=s.sat>0?`hsla(${s.hue},${s.sat}%,88%,${op})`:`rgba(255,255,255,${op})`;
    const sx=((s.x+parallaxX)%W+W)%W;
    const sy=((s.y+parallaxY)%H+H)%H;
    if(s.r>1.6){
      const hl=bgX.createRadialGradient(sx,sy,0,sx,sy,mxr(s.r*5));
      hl.addColorStop(0,s.sat>0?`hsla(${s.hue},65%,82%,${op*.4})`:`rgba(200,215,255,${op*.3})`);
      hl.addColorStop(1,'transparent');
      bgX.beginPath();bgX.arc(sx,sy,mxr(s.r*5),0,TAU);bgX.fillStyle=hl;bgX.fill();
      if(s.r>2.2){
        bgX.save();bgX.globalAlpha=op*.26;bgX.strokeStyle='#cde';bgX.lineWidth=.5;
        bgX.beginPath();bgX.moveTo(sx-s.r*8,sy);bgX.lineTo(sx+s.r*8,sy);bgX.moveTo(sx,sy-s.r*8);bgX.lineTo(sx,sy+s.r*8);bgX.stroke();bgX.restore();
      }
    }
    bgX.beginPath();bgX.arc(sx,sy,mxr(s.r),0,TAU);bgX.fillStyle=col;bgX.fill();
  }
}

function bgTick(now){
  const dt=(now-bgLast)/1000;bgLast=now;bgT+=dt;

  // Smooth parallax
  parMx+=(mx-parMx)*.04;
  parMy+=(my-parMy)*.04;
  const pdx=parMx-W/2,pdy=parMy-H/2;

  bgX.fillStyle='#000';bgX.fillRect(0,0,W,H);

  // Parallax star layers
  drawStarLayer(starsFar,  pdx*-.008, pdy*-.008, dt);
  drawStarLayer(starsMid,  pdx*-.018, pdy*-.018, dt);
  drawStarLayer(starsNear, pdx*-.034, pdy*-.034, dt);

  // Shooting stars
  shootSec-=dt;
  if(shootSec<=0){spawnShooter();shootSec=rand(1.2,4);}
  shooters=shooters.filter(s=>s.life>0);
  for(const s of shooters){
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=s.decay*dt;
    const ang=Math.atan2(s.vy,s.vx);
    const tx=s.x-Math.cos(ang)*s.len*s.life,ty=s.y-Math.sin(ang)*s.len*s.life;
    const sg=bgX.createLinearGradient(tx,ty,s.x,s.y);
    sg.addColorStop(0,'rgba(255,255,255,0)');
    sg.addColorStop(.5,`rgba(210,228,255,${s.life*.32})`);
    sg.addColorStop(1,`rgba(255,255,255,${s.life*.92})`);
    bgX.save();bgX.globalCompositeOperation='screen';
    bgX.beginPath();bgX.moveTo(tx,ty);bgX.lineTo(s.x,s.y);
    bgX.strokeStyle=sg;bgX.lineWidth=mxr(s.width*s.life);bgX.lineCap='round';bgX.stroke();
    bgX.beginPath();bgX.arc(s.x,s.y,mxr(1.8*s.life),0,TAU);
    bgX.fillStyle=`rgba(255,255,255,${s.life*.9})`;bgX.fill();
    bgX.restore();
  }

  // Auto comet — 15s first, 10s cooldown between each
  cometTimer+=dt;
  if(cometTimer>=cometInterval){
    spawnComet();
    cometTimer=0;
    cometInterval=10;
  }

  // Draw cosmics
  cosmics=cosmics.filter(o=>o.life>0&&o.x>-600&&o.x<W+600&&o.y>-600&&o.y<H+600);
  for(const o of cosmics){
    o.x+=o.vx*dt;o.y+=o.vy*dt;o.life-=o.decay*dt;
    if(o.type==='comet'){drawComet(o,dt);}
  }

  requestAnimationFrame(bgTick);
}
requestAnimationFrame(bgTick);

/* ════ FX CANVAS ════ */
function fxTick(){
  fxX.clearRect(0,0,W,H);

  // Ripples
  const now2=Date.now();
  ripples=ripples.filter(r=>r.life>0);
  for(const r of ripples){
    const age=(now2-r.born-r.delay)/1000;if(age<0)continue;
    r.radius=r.maxR*(1-Math.pow(1-Math.min(age*1.8,1),.5));
    r.life=mxr(1-age*1.15);
    fxX.beginPath();fxX.arc(r.x,r.y,mxr(r.radius),0,TAU);
    fxX.strokeStyle=`rgba(255,255,255,${r.life*.45})`;fxX.lineWidth=mxr(1.8*r.life);fxX.stroke();
  }

  // Comet cursor trail
  cometTrail.push({x:mx,y:my});
  if(cometTrail.length>CMAX)cometTrail.shift();
  for(let i=1;i<cometTrail.length;i++){
    const p=i/cometTrail.length;
    fxX.beginPath();fxX.arc(cometTrail[i].x,cometTrail[i].y,mxr(p*3.2),0,TAU);
    fxX.fillStyle=`hsla(205,100%,78%,${p*.6})`;fxX.fill();
  }
  if(cometTrail.length>0){
    const h=cometTrail[cometTrail.length-1];
    const hg=fxX.createRadialGradient(h.x,h.y,0,h.x,h.y,8);
    hg.addColorStop(0,'rgba(255,255,255,.88)');hg.addColorStop(1,'rgba(100,200,255,0)');
    fxX.beginPath();fxX.arc(h.x,h.y,8,0,TAU);fxX.fillStyle=hg;fxX.fill();
  }

  if(fxAnim)fxAnim.draw(performance.now());
  requestAnimationFrame(fxTick);
}
requestAnimationFrame(fxTick);
</script>
