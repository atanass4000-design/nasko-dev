<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nasko Dev — Developer & Creator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:hsl(0 0% 0%);--fg:hsl(0 0% 100%);--muted:hsl(0 0% 55%);--discord:hsl(235 86% 65%);--discord-glow:hsla(235 86% 65%/.45);--title-glow1:hsla(0 0% 100%/.15);--title-glow2:hsla(0 0% 100%/.05);--btn-bg:hsla(0 0% 100%/.07);--btn-hover:hsla(0 0% 100%/.13);}
body.light{--bg:hsl(0 0% 97%);--fg:hsl(0 0% 5%);--muted:hsl(0 0% 40%);--title-glow1:hsla(0 0% 0%/.08);--title-glow2:hsla(0 0% 0%/.03);--btn-bg:hsla(0 0% 0%/.06);--btn-hover:hsla(0 0% 0%/.11);}
html{scroll-behavior:smooth;}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}
body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:background .4s,color .4s;}
#bg-canvas,#fx-canvas{position:fixed;inset:0;pointer-events:none;}#bg-canvas{z-index:0;}#fx-canvas{z-index:5;}
/* toolbar */
.toolbar{position:fixed;top:1.2rem;left:1.2rem;display:flex;gap:.5rem;z-index:50;opacity:0;animation:fadeIn .5s ease 1s forwards;}
.tool-btn{width:2.6rem;height:2.6rem;border-radius:.5rem;border:1px solid hsla(0 0% 50%/.2);background:var(--btn-bg);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);font-size:.7rem;font-weight:700;letter-spacing:.04em;font-family:'Inter',sans-serif;transition:background .2s,color .2s,transform .2s cubic-bezier(.22,1,.36,1);}
.tool-btn:hover{background:var(--btn-hover);color:var(--fg);transform:scale(1.1);}
.tool-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.icon-moon{display:block;}.icon-sun{display:none;}body.light .icon-moon{display:none;}body.light .icon-sun{display:block;}
/* code panel */
.code-panel{position:fixed;top:4.4rem;left:1.2rem;z-index:60;background:hsla(0 0% 4%/.97);border:1px solid hsla(0 0% 100%/.12);border-radius:.6rem;padding:.85rem;width:215px;backdrop-filter:blur(18px);display:none;flex-direction:column;gap:.5rem;box-shadow:0 8px 32px rgba(0,0,0,.7);}
.code-panel.open{display:flex;}.code-panel label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:hsla(0 0% 100%/.38);}
.code-panel input{background:hsla(0 0% 100%/.06);border:1px solid hsla(0 0% 100%/.12);border-radius:.35rem;padding:.4rem .6rem;color:#fff;font-family:'Inter',monospace;font-size:.82rem;outline:none;width:100%;transition:border-color .2s;}
.code-panel input:focus{border-color:hsla(235 86% 65%/.6);}.code-hint{font-size:.6rem;color:hsla(0 0% 100%/.25);}.code-hint span{color:hsl(220 80% 65%);}
/* command palette */
#cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:16vh;opacity:0;pointer-events:none;transition:opacity .15s;}
#cmd-overlay.open{opacity:1;pointer-events:all;}
#cmd-box{width:min(560px,90vw);background:hsla(0 0% 6%/.99);border:1px solid hsla(0 0% 100%/.14);border-radius:.9rem;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.9);}
#cmd-wrap{display:flex;align-items:center;gap:.6rem;padding:.9rem 1rem;border-bottom:1px solid hsla(0 0% 100%/.08);}
#cmd-wrap svg{width:15px;height:15px;flex-shrink:0;stroke:hsla(0 0% 100%/.35);fill:none;stroke-width:2;stroke-linecap:round;}
#cmd-input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:'Inter',sans-serif;font-size:.93rem;}
#cmd-input::placeholder{color:hsla(0 0% 100%/.3);}
#cmd-results{max-height:340px;overflow-y:auto;padding:.35rem 0;}
.ci{display:flex;align-items:center;gap:.7rem;padding:.55rem 1rem;cursor:pointer;transition:background .1s;}
.ci.sel,.ci:hover{background:hsla(0 0% 100%/.07);}
.ci-icon{width:30px;height:30px;border-radius:.4rem;display:flex;align-items:center;justify-content:center;font-size:1rem;background:hsla(0 0% 100%/.06);flex-shrink:0;}
.ci-text{flex:1;}.ci-label{font-size:.86rem;color:#fff;}.ci-desc{font-size:.7rem;color:hsla(0 0% 100%/.38);}
.ci-kbd{font-size:.62rem;color:hsla(0 0% 100%/.28);background:hsla(0 0% 100%/.06);padding:.12rem .35rem;border-radius:.22rem;font-family:monospace;flex-shrink:0;}
.cmd-section{padding:.4rem 1rem .2rem;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:hsla(0 0% 100%/.28);}
/* globe */
#globe-wrap{position:fixed;bottom:1.5rem;left:1.5rem;width:180px;height:180px;z-index:8;border-radius:50%;overflow:hidden;border:1px solid hsla(0 0% 100%/.12);box-shadow:0 0 40px rgba(0,30,80,.5),0 0 0 1px hsla(0 0% 100%/.05);cursor:grab;opacity:0;animation:fadeIn .6s ease 1.4s forwards;}
#globe-wrap:active{cursor:grabbing;}
#globe-label{position:fixed;bottom:calc(1.5rem + 188px);left:1.5rem;width:180px;text-align:center;font-size:.58rem;color:hsla(0 0% 100%/.28);letter-spacing:.1em;pointer-events:none;opacity:0;animation:fadeIn .6s ease 1.4s forwards;}
/* chat */
#chat-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:50;width:3rem;height:3rem;border-radius:50%;background:var(--discord);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px hsla(235 86% 65%/.45);transition:transform .2s,box-shadow .2s;opacity:0;animation:fadeIn .5s ease 1.2s forwards;}
#chat-btn:hover{transform:scale(1.1);box-shadow:0 6px 30px hsla(235 86% 65%/.65);}
#chat-btn svg{width:20px;height:20px;fill:#fff;}
#chat-panel{position:fixed;bottom:5.5rem;right:1.5rem;z-index:50;width:300px;height:420px;background:hsla(0 0% 5%/.97);border:1px solid hsla(0 0% 100%/.12);border-radius:1rem;display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(20px);box-shadow:0 12px 48px rgba(0,0,0,.8);transform:translateY(16px) scale(.96);opacity:0;pointer-events:none;transition:transform .25s cubic-bezier(.22,1,.36,1),opacity .2s;}
#chat-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
.ch{display:flex;align-items:center;gap:.6rem;padding:.75rem 1rem;border-bottom:1px solid hsla(0 0% 100%/.08);flex-shrink:0;}
.ch-av{width:26px;height:26px;border-radius:50%;background:var(--discord);display:flex;align-items:center;justify-content:center;font-size:.7rem;}
.ch-title{font-size:.86rem;font-weight:600;flex:1;}
.ch-close{background:none;border:none;cursor:pointer;color:hsla(0 0% 100%/.4);display:flex;padding:.2rem;border-radius:.3rem;transition:color .2s;}
.ch-close:hover{color:#fff;}.ch-close svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
#chat-msgs{flex:1;overflow-y:auto;padding:.65rem;display:flex;flex-direction:column;gap:.45rem;scrollbar-width:thin;scrollbar-color:hsla(0 0% 100%/.1) transparent;}
.msg{max-width:88%;padding:.45rem .7rem;border-radius:.6rem;font-size:.8rem;line-height:1.48;}
.msg.bot{background:hsla(0 0% 100%/.08);color:#fff;align-self:flex-start;border-bottom-left-radius:.18rem;}
.msg.user{background:var(--discord);color:#fff;align-self:flex-end;border-bottom-right-radius:.18rem;}
.msg.typing{display:flex;gap:.28rem;align-items:center;}
.td{width:5px;height:5px;border-radius:50%;background:hsla(0 0% 100%/.5);animation:td 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.2s;}.td:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.1);opacity:1}}
.ci-wrap{display:flex;gap:.4rem;padding:.65rem;border-top:1px solid hsla(0 0% 100%/.08);flex-shrink:0;}
#chat-in{flex:1;background:hsla(0 0% 100%/.06);border:1px solid hsla(0 0% 100%/.1);border-radius:.45rem;padding:.4rem .65rem;color:#fff;font-family:'Inter',sans-serif;font-size:.8rem;outline:none;transition:border-color .2s;}
#chat-in:focus{border-color:hsla(235 86% 65%/.5);}#chat-in::placeholder{color:hsla(0 0% 100%/.28);}
#chat-send{background:var(--discord);border:none;border-radius:.45rem;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s;}
#chat-send:hover{opacity:.85;}#chat-send svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* stage */
.stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:1.5rem;text-align:center;padding:2rem;transform-style:preserve-3d;will-change:transform;transition:transform .08s linear;}
.greeting{font-size:.78rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:hsl(220 90% 70%);opacity:0;animation:fadeIn .6s ease .05s forwards;}
.avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid hsla(0 0% 100%/.15);box-shadow:0 0 30px hsla(0 0% 100%/.08);opacity:0;transform:translateY(30px);cursor:pointer;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) 0s forwards;transition:box-shadow .2s;}
.avatar:hover{box-shadow:0 0 40px hsla(235 86% 65%/.4);}
@keyframes wobble{0%{transform:rotate(0)scale(1)}15%{transform:rotate(-8deg)scale(1.08)}30%{transform:rotate(7deg)scale(1.08)}45%{transform:rotate(-5deg)scale(1.04)}60%{transform:rotate(4deg)scale(1.04)}75%{transform:rotate(-2deg)scale(1.01)}100%{transform:rotate(0)scale(1)}}
.avatar.wobbling{animation:wobble .6s cubic-bezier(.22,1,.36,1) forwards!important;}
.title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3.5rem,10vw,6rem);letter-spacing:-.03em;line-height:1;color:var(--fg);text-shadow:0 0 40px var(--title-glow1),0 0 80px var(--title-glow2);opacity:0;transform:translateY(30px);animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .1s forwards;}
.tagline{font-size:clamp(1rem,2.5vw,1.2rem);letter-spacing:.18em;text-transform:uppercase;color:var(--muted);opacity:0;transform:translateY(30px);animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .3s forwards;min-height:1.5em;}
.cursor-blink{display:inline-block;width:2px;height:1em;background:var(--muted);margin-left:2px;vertical-align:middle;animation:blink .7s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.discord-btn{display:inline-flex;align-items:center;gap:.6rem;margin-top:.5rem;padding:.75rem 2rem;background:var(--discord);color:#fff;font-weight:600;font-size:.95rem;border-radius:.5rem;text-decoration:none;cursor:pointer;transition:transform .2s cubic-bezier(.22,1,.36,1),box-shadow .2s;opacity:0;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .5s forwards;}
.discord-btn:hover{transform:scale(1.1);box-shadow:0 0 30px var(--discord-glow),0 0 60px var(--discord-glow);}
.discord-btn:active{transform:scale(.97);}.discord-btn svg{width:18px;height:18px;fill:currentColor;}
.socials{display:flex;align-items:center;gap:1.25rem;opacity:0;animation:fadeIn .7s ease .7s forwards;}
.social-link{display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:.4rem;color:var(--muted);text-decoration:none;transition:color .2s,background .2s,transform .2s cubic-bezier(.22,1,.36,1);}
.social-link:hover{color:var(--fg);background:hsla(0 0% 100%/.08);transform:scale(1.1);}
.social-link svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.visitor-counter{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:hsla(0 0% 100%/.3);letter-spacing:.08em;opacity:0;animation:fadeIn .7s ease .9s forwards;}
.visitor-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;flex-shrink:0;animation:dotpulse 2s ease-in-out infinite;}
@keyframes dotpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.deploy-note{font-size:.72rem;color:hsla(0 0% 100%/.22);letter-spacing:.18em;opacity:0;animation:fadeIn .7s ease .9s forwards;}
/* konami toast */
#konami-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);z-index:999;background:hsla(0 0% 6%/.96);border:1px solid hsla(0 0% 100%/.15);border-radius:.75rem;padding:.9rem 1.6rem;font-size:1.1rem;font-weight:700;letter-spacing:.05em;color:#fff;pointer-events:none;opacity:0;transition:all .3s cubic-bezier(.22,1,.36,1);backdrop-filter:blur(16px);}
#konami-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#flash{position:fixed;inset:0;z-index:9999;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s;}
#flash.go{opacity:.5;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}@keyframes fadeIn{to{opacity:1;}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas><canvas id="fx-canvas"></canvas><div id="flash"></div>
<div id="konami-toast">🌠 KONAMI CODE — METEOR STORM!</div>

<!-- Toolbar -->

<script>
/* ═══ UTILS ═══ */
const rand=(a,b)=>a+Math.random()*(b-a);
const randI=(a,b)=>Math.floor(rand(a,b));
const TAU=Math.PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const mxr=(v)=>Math.max(0,v);

/* ═══ CANVAS + STATE (ALL VARS DECLARED FIRST) ═══ */
const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
const fxC=document.getElementById('fx-canvas'),fxX=fxC.getContext('2d');
let W=0,H=0;
let stars=[],conNodes=[];
let shooters=[],shootSec=rand(1,2.5);
let cosmics=[],cosmicSec=rand(3,6);
let ripples=[];
let fxAnim=null;
let bgT=0,bgLast=performance.now();
let mx=-999,my=-999;
const cometTrail=[],CMAX=32;

/* ═══ RESIZE (fullscreen-safe) ═══ */
function resizeAll(){
  W=bgC.width=fxC.width=window.innerWidth;
  H=bgC.height=fxC.height=window.innerHeight;
  makeStars();makeConstellation();
}
resizeAll();
window.addEventListener('resize',resizeAll);
document.addEventListener('fullscreenchange',()=>setTimeout(resizeAll,80));
document.addEventListener('webkitfullscreenchange',()=>setTimeout(resizeAll,80));

const COMMANDS=[
  {icon:'🪨',label:'Spawn Asteroid',desc:'Launch a rocky asteroid across the sky',key:'asteroid',fn:()=>spawnCosmic('asteroid')},
  {icon:'🕳️',label:'Spawn Black Hole',desc:'TON 618 — quasar with relativistic jets',key:'blackhole',fn:()=>spawnCosmic('blackhole')},
  {icon:'🌠',label:'Meteor Shower',desc:'Rain of 15 shooting stars',key:'rain',fn:()=>spawnMeteorRain(15)},
  {icon:'☄️',label:'Spawn Comet',desc:'Large slow comet with glowing tail',key:'comet',fn:()=>spawnComet()},
  {icon:'💥',label:'Supernova',desc:'Star explosion with expanding rings',key:'supernova',fn:()=>triggerSupernova()},
  {icon:'🌌',label:'TON 618 Animation',desc:'Full cinematic black hole sequence',key:'ton618',fn:()=>triggerTON618()},

  {icon:'🧹',label:'Clear Sky',desc:'Remove all cosmic objects',key:'clear',fn:()=>{cosmics=[];}},
  {icon:'🌧️',label:'Mega Storm',desc:'50 simultaneous shooting stars',key:'storm',fn:()=>spawnMeteorRain(50)},
];
const cmdOverlay=document.getElementById('cmd-overlay');
const cmdInput=document.getElementById('cmd-input');
const cmdResults=document.getElementById('cmd-results');
let cmdSel=0;

function openCmd(){cmdOverlay.classList.add('open');cmdInput.value='';cmdInput.focus();renderCmd('');}
function closeCmd(){cmdOverlay.classList.remove('open');}
function renderCmd(q){
  const filt=q?COMMANDS.filter(c=>c.label.toLowerCase().includes(q)||c.key.includes(q)||c.desc.toLowerCase().includes(q)):COMMANDS;
  cmdResults.innerHTML=filt.map((c,i)=>`
    <div class="ci${i===cmdSel?' sel':''}" data-i="${i}">
      <div class="ci-icon">${c.icon}</div>
      <div class="ci-text"><div class="ci-label">${c.label}</div><div class="ci-desc">${c.desc}</div></div>
      <div class="ci-kbd">↵</div>
    </div>`).join('');
  cmdResults.querySelectorAll('.ci').forEach((el,i)=>{
    el.addEventListener('click',()=>{filt[i].fn();closeCmd();});
  });
  return filt;
}
cmdInput.addEventListener('input',e=>{cmdSel=0;renderCmd(e.target.value.toLowerCase());});
cmdInput.addEventListener('keydown',e=>{
  const items=cmdResults.querySelectorAll('.ci');
  if(e.key==='ArrowDown'){e.preventDefault();cmdSel=Math.min(cmdSel+1,items.length-1);}
  if(e.key==='ArrowUp'){e.preventDefault();cmdSel=Math.max(cmdSel-1,0);}
  if(e.key==='Enter'){
    const q=cmdInput.value.toLowerCase();
    const filt=q?COMMANDS.filter(c=>c.label.toLowerCase().includes(q)||c.key.includes(q)):COMMANDS;
    if(filt[cmdSel]){filt[cmdSel].fn();closeCmd();}
  }
  if(e.key==='Escape')closeCmd();
  items.forEach((el,i)=>el.classList.toggle('sel',i===cmdSel));
});
cmdOverlay.addEventListener('click',e=>{if(e.target===cmdOverlay)closeCmd();});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();cmdOverlay.classList.contains('open')?closeCmd():openCmd();}
  if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){e.preventDefault();openCmd();}
  if(e.key==='Escape')closeCmd();
});

  for(let i=0;i<n;i++){
    const t=Math.random();
    stars.push({x:rand(0,W),y:rand(0,H),r:t<.78?rand(.25,.8):t<.95?rand(.8,1.6):rand(1.6,2.8),baseOp:t<.78?rand(.2,.5):t<.95?rand(.4,.7):rand(.65,1),phase:rand(0,TAU),speed:rand(.25,1.1),hue:Math.random()<.65?0:randI(210,270),sat:Math.random()<.65?0:rand(30,70)});
  }
}

/* ═══ COSMIC OBJECTS ═══ */
function spawnCosmic(forceType){
  const type=forceType||(Math.random()<.3?'asteroid':'blackhole');
  const fl=Math.random()<.5;const spd=rand(50,140);const ang=rand(-.28,.28);
  const o={type,life:1,decay:rand(.0008,.002),x:fl?-150:W+150,y:rand(H*.05,H*.95),vx:Math.cos(ang)*spd*(fl?1:-1),vy:Math.sin(ang)*spd,rot:rand(0,TAU),rotSpeed:rand(-.02,.02)};
  if(type==='asteroid'){
    const br=rand(12,38),np=randI(7,13);o.baseR=br;
    o.pts=Array.from({length:np},(_,i)=>({a:(i/np)*TAU,r:br*rand(.5,1)}));
    o.craters=Array.from({length:randI(2,6)},()=>({ox:rand(-br*.5,br*.5),oy:rand(-br*.5,br*.5),r:rand(2,br*.3)}));
    o.color=`hsl(${randI(18,38)},${randI(8,22)}%,${randI(35,55)}%)`;o.debris=[];
  }else{
    o.bhR=rand(16,38);o.diskW=o.bhR*rand(.55,.85);
    o.spin=rand(.005,.016)*(Math.random()<.5?1:-1);
    o.diskAngle=rand(0,TAU);o.jetLen=o.bhR*rand(3.5,6);
  }
  cosmics.push(o);
}

/* ═══ DRAW FUNCTIONS ═══ */
function drawAsteroid(o,dt){
  if(Math.random()<.35) o.debris.push({x:o.x+rand(-o.baseR*.4,o.baseR*.4),y:o.y+rand(-o.baseR*.4,o.baseR*.4),vx:-o.vx*.001*rand(.1,.3)+rand(-.3,.3),vy:-o.vy*.001*rand(.1,.3)+rand(-.3,.3),r:rand(.7,2.2),life:rand(.5,1),decay:rand(.012,.03)});
  o.debris=o.debris.filter(d=>d.life>0);
  for(const d of o.debris){
    d.x+=d.vx;d.y+=d.vy;d.life-=d.decay*dt;
    const dr=mxr(d.r*d.life);if(!dr)continue;
    bgX.beginPath();bgX.arc(d.x,d.y,dr,0,TAU);bgX.fillStyle=`rgba(155,125,85,${d.life*.65*o.life})`;bgX.fill();
  }
  bgX.save();bgX.translate(o.x,o.y);bgX.rotate(o.rot);bgX.globalAlpha=clamp(o.life*4,0,1);
  bgX.beginPath();
  o.pts.forEach((p,i)=>{const px=Math.cos(p.a)*p.r,py=Math.sin(p.a)*p.r;i?bgX.lineTo(px,py):bgX.moveTo(px,py);});
  bgX.closePath();
  const g=bgX.createRadialGradient(-o.baseR*.3,-o.baseR*.3,0,0,0,o.baseR*1.1);
  g.addColorStop(0,'hsl(30,18%,68%)');g.addColorStop(.5,o.color);g.addColorStop(1,'hsl(20,8%,16%)');
  bgX.fillStyle=g;bgX.fill();bgX.strokeStyle='rgba(0,0,0,.5)';bgX.lineWidth=1.1;bgX.stroke();
  for(const cr of o.craters){bgX.beginPath();bgX.arc(cr.ox,cr.oy,mxr(cr.r),0,TAU);bgX.fillStyle='rgba(0,0,0,.32)';bgX.fill();}
  bgX.restore();
}

function drawComet(o){
  const al=clamp(o.life*4,0,1);
  const ang=Math.atan2(o.vy,o.vx);
  const tx=o.x-Math.cos(ang)*o.tailLen*o.life;
  const ty=o.y-Math.sin(ang)*o.tailLen*o.life;
  // tail
  const tg=bgX.createLinearGradient(tx,ty,o.x,o.y);
  tg.addColorStop(0,'rgba(255,255,255,0)');
  tg.addColorStop(.4,`rgba(180,220,255,${.15*al*o.brightness})`);
  tg.addColorStop(.8,`rgba(220,240,255,${.4*al*o.brightness})`);
  tg.addColorStop(1,`rgba(255,255,255,${.85*al*o.brightness})`);
  bgX.save();bgX.globalCompositeOperation='screen';
  bgX.beginPath();bgX.moveTo(tx,ty);bgX.lineTo(o.x,o.y);
  bgX.strokeStyle=tg;bgX.lineWidth=5*o.life;bgX.lineCap='round';bgX.stroke();
  // nucleus glow
  const ng=bgX.createRadialGradient(o.x,o.y,0,o.x,o.y,18);
  ng.addColorStop(0,`rgba(255,255,255,${al*o.brightness})`);
  ng.addColorStop(.4,`rgba(180,220,255,${.6*al})`);
  ng.addColorStop(1,'rgba(0,0,0,0)');
  bgX.beginPath();bgX.arc(o.x,o.y,18,0,TAU);bgX.fillStyle=ng;bgX.fill();
  bgX.restore();
}

function drawTON(ctx,x,y,bhR,diskW,diskAngle,jetLen,al){
  if(bhR<=0)return;
  ctx.save();
  const nr=mxr(bhR+diskW*5);
  const nb=ctx.createRadialGradient(x,y,mxr(bhR),x,y,nr);
  nb.addColorStop(0,'rgba(255,180,60,0)');nb.addColorStop(.2,`rgba(255,160,40,${.08*al})`);nb.addColorStop(.6,`rgba(200,80,10,${.03*al})`);nb.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(x,y,nr,0,TAU);ctx.fillStyle=nb;ctx.fill();
  ctx.save();ctx.translate(x,y);ctx.rotate(diskAngle+Math.PI/2);
  for(const d of[-1,1]){
    const jg=ctx.createLinearGradient(0,0,0,d*jetLen);
    jg.addColorStop(0,`rgba(180,220,255,${.6*al})`);jg.addColorStop(.35,`rgba(100,160,255,${.28*al})`);jg.addColorStop(1,'rgba(60,80,200,0)');
    const jw=mxr(bhR*.35);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-jw,d*jetLen);ctx.lineTo(jw,d*jetLen);ctx.closePath();ctx.fillStyle=jg;ctx.fill();
    const cg=ctx.createLinearGradient(0,0,0,d*jetLen*.65);
    cg.addColorStop(0,`rgba(255,255,255,${.75*al})`);cg.addColorStop(1,'rgba(150,180,255,0)');
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,d*jetLen*.65);ctx.strokeStyle=cg;ctx.lineWidth=mxr(bhR*.07);ctx.stroke();
  }
  ctx.restore();
  ctx.save();ctx.translate(x,y);ctx.rotate(diskAngle);ctx.scale(1,.22);
  [[0,60,100,100,.95],[30,55,95,100,.78],[25,45,82,95,.56],[20,35,65,80,.32],[15,25,45,60,.13]].forEach(([hs,lMin,lMax,sat,mA],i)=>{
    const ir=mxr(bhR+i*(diskW/5)),or=mxr(ir+diskW/5+1);
    const dg=ctx.createRadialGradient(0,0,ir,0,0,or);
    dg.addColorStop(0,`hsla(${30+hs},${sat}%,${lMax}%,${mA*al})`);dg.addColorStop(1,`hsla(${35+hs},${sat-10}%,${lMin}%,0)`);
    ctx.beginPath();ctx.arc(0,0,or,0,TAU);ctx.arc(0,0,ir,TAU,0,true);ctx.fillStyle=dg;ctx.fill();
  });
  ctx.beginPath();ctx.arc(0,0,mxr(bhR+2),0,TAU);ctx.strokeStyle=`rgba(255,240,200,${.92*al})`;ctx.lineWidth=mxr(bhR*.12);ctx.stroke();
  const ifl=ctx.createRadialGradient(0,0,mxr(bhR*.9),0,0,mxr(bhR*1.6));
  ifl.addColorStop(0,`rgba(255,255,240,${.65*al})`);ifl.addColorStop(1,'rgba(255,180,60,0)');
  ctx.beginPath();ctx.arc(0,0,mxr(bhR*1.6),0,TAU);ctx.fillStyle=ifl;ctx.fill();
  ctx.restore();
  ctx.beginPath();ctx.arc(x,y,mxr(bhR),0,TAU);ctx.fillStyle='#000';ctx.fill();
  const sh=ctx.createRadialGradient(x,y,mxr(bhR*.82),x,y,mxr(bhR));
  sh.addColorStop(0,'transparent');sh.addColorStop(1,`rgba(255,160,30,${.24*al})`);
  ctx.beginPath();ctx.arc(x,y,mxr(bhR),0,TAU);ctx.fillStyle=sh;ctx.fill();
  ctx.restore();
}

/* ═══ SUPERNOVA SPAWN ═══ */
function triggerSupernova(){
  if(fxAnim)return;
  const sx=rand(W*.2,W*.8),sy=rand(H*.2,H*.8);
  const start=performance.now(),dur=3200;
  const parts=[];
  let blasted=false;
  fxAnim={lastT:start,draw(now){
    const t=clamp((now-start)/dur,0,1);
    const dt=clamp((now-this.lastT)/1000,0,.08);this.lastT=now;
    fxX.save();
    if(t<.35){
      const p=t/.35,r=mxr(12+p*60);
      const sg=fxX.createRadialGradient(sx,sy,0,sx,sy,r);
      sg.addColorStop(0,`rgba(255,255,200,${p*.9})`);sg.addColorStop(.5,`rgba(255,180,50,${p*.6})`);sg.addColorStop(1,'rgba(255,100,0,0)');
      fxX.beginPath();fxX.arc(sx,sy,r,0,TAU);fxX.fillStyle=sg;fxX.fill();
    }
    if(t>=.35&&!blasted){
      blasted=true;
      for(let i=0;i<80;i++){
        const a=rand(0,TAU),sp=rand(60,400),h=rand(20,60);
        parts.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(2,8),life:1,decay:rand(.3,.7),h});
      }
    }
    if(t>=.35){
      const p=(t-.35)/.65;
      // expanding rings
      for(let r=0;r<3;r++){
        const rp=clamp((p-.08*r)/.7,0,1),rr=mxr(rp*(W*.35+r*60));
        fxX.beginPath();fxX.arc(sx,sy,rr,0,TAU);
        fxX.strokeStyle=`rgba(255,${180-r*40},${50+r*20},${.4*(1-rp)})`;fxX.lineWidth=3-r;fxX.stroke();
      }
      for(const p2 of parts){
        p2.x+=p2.vx*dt;p2.y+=p2.vy*dt;p2.life-=p2.decay*dt;
        const r2=mxr(p2.r*p2.life);if(!r2)continue;
        const pg=fxX.createRadialGradient(p2.x,p2.y,0,p2.x,p2.y,r2);
        pg.addColorStop(0,`hsl(${p2.h},100%,80%)`);pg.addColorStop(1,'rgba(0,0,0,0)');
        fxX.globalAlpha=mxr(p2.life);fxX.beginPath();fxX.arc(p2.x,p2.y,r2,0,TAU);fxX.fillStyle=pg;fxX.fill();fxX.globalAlpha=1;
      }
    }
    fxX.restore();
    if(t>=1)fxAnim=null;
  }};
}

/* ═══ BG RENDER LOOP ═══ */
function bgTick(now){
  const dt=(now-bgLast)/1000;bgLast=now;bgT+=dt;
  bgX.fillStyle='#000';bgX.fillRect(0,0,W,H);

  // stars
  for(const s of stars){
    s.phase+=s.speed*.5*dt;
    const op=s.baseOp*(.72+.28*Math.sin(s.phase));
    const col=s.sat>0?`hsla(${s.hue},${s.sat}%,88%,${op})`:`rgba(255,255,255,${op})`;
    if(s.r>1.6){
      const hl=bgX.createRadialGradient(s.x,s.y,0,s.x,s.y,mxr(s.r*5));
      hl.addColorStop(0,s.sat>0?`hsla(${s.hue},65%,82%,${op*.4})`:`rgba(200,215,255,${op*.3})`);hl.addColorStop(1,'transparent');
      bgX.beginPath();bgX.arc(s.x,s.y,mxr(s.r*5),0,TAU);bgX.fillStyle=hl;bgX.fill();
      if(s.r>2.2){bgX.save();bgX.globalAlpha=op*.28;bgX.strokeStyle='#cde';bgX.lineWidth=.5;bgX.beginPath();bgX.moveTo(s.x-s.r*9,s.y);bgX.lineTo(s.x+s.r*9,s.y);bgX.moveTo(s.x,s.y-s.r*9);bgX.lineTo(s.x,s.y+s.r*9);bgX.stroke();bgX.restore();}
    }
    bgX.beginPath();bgX.arc(s.x,s.y,mxr(s.r),0,TAU);bgX.fillStyle=col;bgX.fill();
  }

  // constellation
  for(const n of conNodes){
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
    n.x=clamp(n.x,0,W);n.y=clamp(n.y,0,H);
  }
  for(let i=0;i<conNodes.length;i++){
    for(let j=i+1;j<conNodes.length;j++){
      const dx=conNodes[i].x-conNodes[j].x,dy=conNodes[i].y-conNodes[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<130){
        bgX.beginPath();bgX.moveTo(conNodes[i].x,conNodes[i].y);bgX.lineTo(conNodes[j].x,conNodes[j].y);
        bgX.strokeStyle=`rgba(180,210,255,${.25*(1-d/130)})`;bgX.lineWidth=.7;bgX.stroke();
      }
    }
  }
  for(const n of conNodes){
    bgX.beginPath();bgX.arc(n.x,n.y,mxr(n.r),0,TAU);bgX.fillStyle=`rgba(180,210,255,${n.op})`;bgX.fill();
  }

  // shooting stars
  shootSec-=dt;if(shootSec<=0){spawnShooter();shootSec=rand(1,4);}
  shooters=shooters.filter(s=>s.life>0);
  for(const s of shooters){
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=s.decay*dt;
    const ang=Math.atan2(s.vy,s.vx);
    const tx=s.x-Math.cos(ang)*s.len*s.life,ty=s.y-Math.sin(ang)*s.len*s.life;
    const sg=bgX.createLinearGradient(tx,ty,s.x,s.y);
    sg.addColorStop(0,'rgba(255,255,255,0)');sg.addColorStop(.55,`rgba(200,225,255,${s.life*.35})`);sg.addColorStop(1,`rgba(255,255,255,${s.life*.95})`);
    bgX.save();bgX.globalCompositeOperation='screen';
    bgX.beginPath();bgX.moveTo(tx,ty);bgX.lineTo(s.x,s.y);bgX.strokeStyle=sg;bgX.lineWidth=mxr(1.8*s.life);bgX.lineCap='round';bgX.stroke();
    bgX.beginPath();bgX.arc(s.x,s.y,mxr(2*s.life),0,TAU);bgX.fillStyle=`rgba(255,255,255,${s.life*.9})`;bgX.fill();bgX.restore();
  }

  // cosmics
  cosmicSec-=dt;if(cosmicSec<=0){spawnCosmic();cosmicSec=rand(4,9);}
  cosmics=cosmics.filter(o=>o.life>0&&o.x>-500&&o.x<W+500&&o.y>-500&&o.y<H+500);
  for(const o of cosmics){
    o.x+=o.vx*dt;o.y+=o.vy*dt;o.life-=o.decay*dt;
    if(o.type==='asteroid'){o.rot+=o.rotSpeed;drawAsteroid(o,dt);}
    else if(o.type==='comet'){drawComet(o);}
    else{o.diskAngle+=o.spin*dt;drawTON(bgX,o.x,o.y,o.bhR,o.diskW,o.diskAngle,o.jetLen,clamp(o.life*4,0,1));}
  }
  requestAnimationFrame(bgTick);
}
requestAnimationFrame(bgTick);

/* ═══ FX RENDER LOOP ═══ */
function fxTick(){
  fxX.clearRect(0,0,W,H);

  // ripples
  const now2=Date.now();
  ripples=ripples.filter(r=>r.life>0);
  for(const r of ripples){
    const age=(now2-r.born-r.delay)/1000;if(age<0)continue;
    r.radius=r.maxR*(1-Math.pow(1-Math.min(age*2,1),.5));
    r.life=mxr(1-age*1.2);
    fxX.beginPath();fxX.arc(r.x,r.y,mxr(r.radius),0,TAU);
    fxX.strokeStyle=`rgba(255,255,255,${r.life*.5})`;fxX.lineWidth=mxr(2*r.life);fxX.stroke();
  }

  // comet cursor
  cometTrail.push({x:mx,y:my});
  if(cometTrail.length>CMAX)cometTrail.shift();
  for(let i=1;i<cometTrail.length;i++){
    const p=i/cometTrail.length;
    fxX.beginPath();fxX.arc(cometTrail[i].x,cometTrail[i].y,mxr(p*3.5),0,TAU);
    fxX.fillStyle=`hsla(200,100%,80%,${p*.65})`;fxX.fill();
  }
  if(cometTrail.length>0){
    const h=cometTrail[cometTrail.length-1];
    const hg=fxX.createRadialGradient(h.x,h.y,0,h.x,h.y,9);
    hg.addColorStop(0,'rgba(255,255,255,.9)');hg.addColorStop(1,'rgba(100,200,255,0)');
    fxX.beginPath();fxX.arc(h.x,h.y,9,0,TAU);fxX.fillStyle=hg;fxX.fill();
  }

  if(fxAnim)fxAnim.draw(performance.now());
  requestAnimationFrame(fxTick);
}
requestAnimationFrame(fxTick);

/* ═══ CODE ANIMATIONS ═══ */
function triggerTON618(){
  if(fxAnim)return;
  const start=performance.now(),dur=6500,cx=W/2,cy=H/2,BHR=Math.min(W,H)*.13;
  fxAnim={draw(now){
    const t=clamp((now-start)/dur,0,1);fxX.save();
    if(t<.15){fxX.fillStyle=`rgba(0,0,0,${(t/.15)*.85})`;fxX.fillRect(0,0,W,H);}
    if(t>=.15&&t<.45){
      const p=(t-.15)/.3;fxX.fillStyle='rgba(0,0,0,.85)';fxX.fillRect(0,0,W,H);
      for(let r=0;r<5;r++){const rp=clamp(p*5-r*.6,0,1);fxX.beginPath();fxX.arc(cx,cy,mxr(BHR*(2+r*.7)*rp),0,TAU);fxX.strokeStyle=`rgba(255,${180+r*12},${50+r*8},${.18*(1-rp)})`;fxX.lineWidth=2.5-r*.3;fxX.stroke();}
      drawTON(fxX,cx,cy,mxr(BHR*Math.pow(p,1.3)),mxr(BHR*.72*Math.pow(p,1.3)),(bgT+t*8)*1.5,BHR*5*p,p);
    }
    if(t>=.45&&t<.8){
      const p=(t-.45)/.35;fxX.fillStyle='rgba(0,0,0,.85)';fxX.fillRect(0,0,W,H);
      const shk=(1-p)*5;fxX.translate(rand(-shk,shk),rand(-shk,shk));
      drawTON(fxX,cx,cy,BHR*(1+.05*Math.sin(t*65)),BHR*.72,(bgT+t*8)*1.5,BHR*5,1);
    }
    if(t>=.8){
      const p=(t-.8)/.2;fxX.fillStyle=`rgba(0,0,0,${.85*(1-p*.7)})`;fxX.fillRect(0,0,W,H);
      drawTON(fxX,cx,cy,BHR,BHR*.72,(bgT+t*8)*1.5,BHR*5,clamp(1-p*1.8,0,1));
      if(p>.65){fxX.fillStyle=`rgba(255,240,180,${((p-.65)/.35)*.7})`;fxX.fillRect(0,0,W,H);}
    }
    fxX.restore();if(t>=1)fxAnim=null;
  }};
}

function triggerAsteroid(){
  if(fxAnim)return;
  const start=performance.now(),dur=6000;
  const ex=W/2,ey=H*.7,er=Math.min(W,H)*.15;
  const ax0=W*.88,ay0=-er*2,impX=ex+er*.3,impY=ey-er*.55;
  const dvx=impX-ax0,dvy=impY-ay0,HIT=.38;
  let exploded=false,sw=0,parts=[];
  function boom(){
    for(let i=0;i<130;i++){const a=rand(0,TAU),sp=rand(80,650),h=rand(18,52);parts.push({x:impX,y:impY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(2,14),life:1,decay:rand(.28,.75),color:`hsl(${h},100%,${randI(55,85)}%)`,grav:rand(60,220)});}
    for(let i=0;i<35;i++){const a=rand(-Math.PI*.85,-Math.PI*.15),sp=rand(100,420);parts.push({x:impX,y:impY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(4,20),life:1,decay:rand(.18,.5),color:`hsl(${randI(18,38)},${randI(8,22)}%,${randI(32,52)}%)`,grav:rand(80,200),rock:true});}
  }
  fxAnim={lastT:start,draw(now){
    const dt=clamp((now-this.lastT)/1000,0,.1);this.lastT=now;
    const t=clamp((now-start)/dur,0,1);fxX.save();
    fxX.fillStyle=`rgba(0,0,0,${clamp(t<.85?t*.38:(1-t)/.15*.38,0,.38)})`;fxX.fillRect(0,0,W,H);
    const ea=t<.1?t/.1:t>.88?(1-(t-.88)/.12):1;
    fxX.save();fxX.globalAlpha=ea;
    const atm=fxX.createRadialGradient(ex,ey,er*.9,ex,ey,er*1.38);atm.addColorStop(0,'rgba(60,140,255,.22)');atm.addColorStop(.6,'rgba(30,80,200,.07)');atm.addColorStop(1,'rgba(0,20,100,0)');
    fxX.beginPath();fxX.arc(ex,ey,er*1.38,0,TAU);fxX.fillStyle=atm;fxX.fill();
    const oc=fxX.createRadialGradient(ex-er*.2,ey-er*.2,0,ex,ey,er);oc.addColorStop(0,'#1a6acd');oc.addColorStop(.5,'#0d4a9e');oc.addColorStop(1,'#041f5c');
    fxX.beginPath();fxX.arc(ex,ey,er,0,TAU);fxX.fillStyle=oc;fxX.fill();
    fxX.fillStyle='rgba(40,160,60,.82)';[[-.3,-.25,.38],[.25,-.1,.28],[-.1,.3,.22],[.3,.3,.18]].forEach(([ox,oy,r])=>{fxX.beginPath();fxX.arc(ex+ox*er,ey+oy*er,r*er,0,TAU);fxX.fill();});
    fxX.globalAlpha=ea*.3;fxX.fillStyle='rgba(255,255,255,.55)';[[-.1,-.35,.3],[.32,.1,.22],[-.28,.2,.18]].forEach(([ox,oy,r])=>{fxX.beginPath();fxX.arc(ex+ox*er,ey+oy*er,r*er,0,TAU);fxX.fill();});
    if(exploded){const cp=clamp((t-HIT)/.25,0,1);fxX.globalAlpha=ea*cp;fxX.fillStyle='rgba(255,70,0,.55)';fxX.beginPath();fxX.arc(impX,impY,er*.2*cp,0,TAU);fxX.fill();fxX.fillStyle='rgba(0,0,0,.65)';fxX.beginPath();fxX.arc(impX,impY,er*.12*cp,0,TAU);fxX.fill();}
    fxX.restore();
    if(t<HIT&&!exploded){
      const p=t/HIT,astX=ax0+dvx*p,astY=ay0+dvy*p,astR=er*.22;
      for(let i=0;i<8;i++){const tp=clamp(p-i*.03,0,1);const ttx=ax0+dvx*tp,tty=ay0+dvy*tp;const tg=fxX.createRadialGradient(ttx,tty,0,ttx,tty,mxr(astR*(1.2+i*.55)));tg.addColorStop(0,`rgba(255,200,50,${.38-i*.04})`);tg.addColorStop(.5,`rgba(255,80,10,${.18-i*.02})`);tg.addColorStop(1,'rgba(0,0,0,0)');fxX.beginPath();fxX.arc(ttx,tty,mxr(astR*(1.2+i*.55)),0,TAU);fxX.fillStyle=tg;fxX.fill();}
      fxX.save();fxX.translate(astX,astY);fxX.rotate(p*9);
      const ag=fxX.createRadialGradient(-astR*.3,-astR*.3,0,0,0,astR);ag.addColorStop(0,'hsl(28,18%,64%)');ag.addColorStop(.6,'hsl(22,14%,38%)');ag.addColorStop(1,'hsl(18,10%,16%)');
      fxX.beginPath();[0,.72,1.35,2.1,2.82,3.6,4.38,5.18,5.92].forEach((a,i)=>{const r2=astR*(i%2===0?1:.62);i?fxX.lineTo(Math.cos(a)*r2,Math.sin(a)*r2):fxX.moveTo(Math.cos(a)*r2,Math.sin(a)*r2);});
      fxX.closePath();fxX.fillStyle=ag;fxX.fill();fxX.strokeStyle='rgba(0,0,0,.4)';fxX.lineWidth=1.5;fxX.stroke();fxX.restore();
    }
    if(t>=HIT&&!exploded){exploded=true;boom();}
    if(exploded){
      sw+=dt*500;const swa=clamp(1-sw/(er*2.8),0,1);
      if(swa>0){fxX.beginPath();fxX.arc(impX,impY,mxr(sw),0,TAU);fxX.strokeStyle=`rgba(255,200,80,${swa*.6})`;fxX.lineWidth=3*swa;fxX.stroke();}
      const fp=clamp(1-(now-start-HIT*dur)/(dur*.1),0,1);
      if(fp>0){fxX.fillStyle=`rgba(255,220,100,${fp*.8})`;fxX.fillRect(0,0,W,H);}
      for(const p2 of parts){p2.x+=p2.vx*dt;p2.y+=p2.vy*dt;p2.vy+=p2.grav*dt;p2.life-=p2.decay*dt;const r2=mxr(p2.r*p2.life);if(!r2)continue;fxX.globalAlpha=mxr(p2.life);fxX.beginPath();fxX.arc(p2.x,p2.y,r2,0,TAU);if(p2.rock){fxX.fillStyle=p2.color;}else{const pg=fxX.createRadialGradient(p2.x,p2.y,0,p2.x,p2.y,r2);pg.addColorStop(0,p2.color);pg.addColorStop(1,'rgba(0,0,0,0)');fxX.fillStyle=pg;}fxX.fill();fxX.globalAlpha=1;}
      parts=parts.filter(p2=>p2.life>0);
    }
    fxX.restore();if(t>=1)fxAnim=null;
  }};
}

/* ═══ THREE.JS REALISTIC GLOBE ═══ */
(()=>{
  if(!window.THREE)return;
  const wrap=document.getElementById('globe-wrap');
  const SIZE=180;
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(SIZE,SIZE);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  wrap.appendChild(renderer.domElement);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45,1,0.1,100);
  camera.position.z=2.6;

  // Lights
  const sun=new THREE.DirectionalLight(0xffffff,1.4);sun.position.set(5,3,5);scene.add(sun);
  scene.add(new THREE.AmbientLight(0x112244,0.6));

  // Build canvas texture for Earth
  function makeEarthTex(){
    const c=document.createElement('canvas');c.width=2048;c.height=1024;
    const x=c.getContext('2d');
    // ocean
    const og=x.createLinearGradient(0,0,0,1024);og.addColorStop(0,'#0d2b52');og.addColorStop(.5,'#1a4a8e');og.addColorStop(1,'#0d2b52');
    x.fillStyle=og;x.fillRect(0,0,2048,1024);
    // continent helper
    function ll(lon,lat){return{px:(lon+180)/360*2048,py:(90-lat)/180*1024};}
    function poly(pts,col){x.beginPath();pts.forEach(([ln,lt],i)=>{const{px,py}=ll(ln,lt);i?x.lineTo(px,py):x.moveTo(px,py);});x.closePath();x.fillStyle=col;x.fill();}
    // North America
    poly([[-165,70],[-140,72],[-100,75],[-75,72],[-60,50],[-55,45],[-80,27],[-90,16],[-110,20],[-120,30],[-135,58],[-165,65]],'#3d7a3d');
    poly([[-117,32],[-80,26],[-87,16],[-92,17],[-82,10],[-77,8],[-83,9],[-87,15],[-90,21],[-104,19],[-118,23]],'#4a8a40');
    // South America
    poly([[-80,12],[-62,12],[-50,3],[-35,-8],[-35,-20],[-52,-33],[-65,-55],[-75,-50],[-80,-35],[-82,-5],[-80,12]],'#4a8a40');
    // Europe
    poly([[-10,35],[36,35],[40,42],[45,45],[60,55],[30,72],[10,72],[-5,65],[-15,60],[-10,35]],'#5a8a45');
    // Africa
    poly([[-18,38],[52,38],[50,12],[45,-12],[36,-25],[20,-35],[15,-35],[-5,-18],[-18,15],[-18,38]],'#7a9a40');
    // Asia (simplified)
    poly([[25,68],[145,72],[145,22],[135,10],[115,-5],[100,5],[80,8],[65,22],[40,38],[28,45],[25,68]],'#5a9040');
    poly([[98,20],[110,20],[125,10],[125,-1],[110,-5],[100,5],[98,20]],'#5a9040');
    // Japan
    poly([[130,31],[130,34],[131,38],[132,43],[132,44],[130,44],[129,35],[129,31]],'#6a9a45');
    // Australia
    poly([[114,-22],[154,-22],[155,-38],[147,-44],[135,-40],[128,-35],[114,-30],[114,-22]],'#8a9050');
    // Greenland
    poly([[-72,76],[-18,76],[-20,84],[-45,84],[-72,80],[-72,76]],'#a0b888');
    // Antarctica
    x.fillStyle='#d0e8f0';x.fillRect(0,930,2048,94);
    poly([[-180,-65],[180,-65],[180,-70],[160,-72],[120,-75],[60,-78],[0,-80],[-60,-78],[-120,-75],[-160,-72],[-180,-70]],'#d0e8f0');
    // polar ice cap
    x.fillStyle='#e8f4ff';x.fillRect(0,0,2048,55);
    // subtle detail noise
    x.globalAlpha=0.06;
    for(let i=0;i<800;i++){x.beginPath();x.arc(rand(0,2048),rand(0,1024),rand(1,8),0,TAU);x.fillStyle=Math.random()<.5?'#2a5a1a':'#8aab55';x.fill();}
    x.globalAlpha=1;
    return new THREE.CanvasTexture(c);
  }

  function makeCloudTex(){
    const c=document.createElement('canvas');c.width=1024;c.height=512;
    const x=c.getContext('2d');
    x.fillStyle='rgba(0,0,0,0)';x.fillRect(0,0,1024,512);
    x.fillStyle='rgba(255,255,255,0.55)';
    for(let i=0;i<300;i++){
      const cx=rand(0,1024),cy=rand(0,512),rx=rand(15,80),ry=rand(8,30);
      x.beginPath();x.ellipse(cx,cy,rx,ry,rand(0,TAU),0,TAU);x.fill();
    }
    return new THREE.CanvasTexture(c);
  }

  const earthTex=makeEarthTex(),cloudTex=makeCloudTex();

  // Earth mesh
  const earthGeo=new THREE.SphereGeometry(1,64,64);
  const earthMat=new THREE.MeshPhongMaterial({map:earthTex,specular:new THREE.Color(0x334466),shininess:18,});
  const earthMesh=new THREE.Mesh(earthGeo,earthMat);scene.add(earthMesh);

  // Cloud layer
  const cloudGeo=new THREE.SphereGeometry(1.008,48,48);
  const cloudMat=new THREE.MeshPhongMaterial({map:cloudTex,transparent:true,opacity:.55,depthWrite:false});
  const cloudMesh=new THREE.Mesh(cloudGeo,cloudMat);scene.add(cloudMesh);

  // Atmosphere glow
  const atmGeo=new THREE.SphereGeometry(1.15,32,32);
  const atmMat=new THREE.MeshBasicMaterial({color:0x2266ff,transparent:true,opacity:.08,side:THREE.BackSide});
  scene.add(new THREE.Mesh(atmGeo,atmMat));
  const atmGeo2=new THREE.SphereGeometry(1.05,32,32);
  const atmMat2=new THREE.MeshBasicMaterial({color:0x4499ff,transparent:true,opacity:.12,side:THREE.BackSide});
  scene.add(new THREE.Mesh(atmGeo2,atmMat2));

  // Drag to rotate
  let dragging=false,lastX=0,lastY=0,velX=0,velY=0;
  const d=renderer.domElement;
  d.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;velX=0;velY=0;});
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    velX=(e.clientX-lastX)*.01;velY=(e.clientY-lastY)*.01;
    earthMesh.rotation.y+=velX;cloudMesh.rotation.y+=velX;
    earthMesh.rotation.x+=velY;cloudMesh.rotation.x+=velY;
    lastX=e.clientX;lastY=e.clientY;
  });
  window.addEventListener('mouseup',()=>{dragging=false;});

  function globeLoop(){
    requestAnimationFrame(globeLoop);
    if(!dragging){
      velX*=.92;velY*=.92;
      earthMesh.rotation.y+=0.0015+velX;cloudMesh.rotation.y+=0.0018+velX;
      earthMesh.rotation.x+=velY;cloudMesh.rotation.x+=velY;
    }
    renderer.render(scene,camera);
  }
  globeLoop();
})();

/* ═══ AI CHAT WIDGET ═══ */
(()=>{
  const btn=document.getElementById('chat-btn');
  const panel=document.getElementById('chat-panel');
  const closeBtn=document.getElementById('chatClose');
  const msgs=document.getElementById('chat-msgs');
  const input=document.getElementById('chat-in');
  const sendBtn=document.getElementById('chat-send');
  let history=[];
  let thinking=false;

  btn.addEventListener('click',()=>{
    panel.classList.toggle('open');
    if(panel.classList.contains('open')&&msgs.children.length===0){
      addMsg('bot','Hey! 👋 I\'m NaskoBot. Ask me anything about Nasko Dev, the site, or just say hi!');
    }
    setTimeout(()=>input.focus(),200);
  });
  closeBtn.addEventListener('click',()=>panel.classList.remove('open'));

  function addMsg(role,text){
    const el=document.createElement('div');el.className=`msg ${role}`;el.textContent=text;
    msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;return el;
  }
  function addTyping(){
    const el=document.createElement('div');el.className='msg bot typing';
    el.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
    msgs.appendChild(el);msgs.scrollTop=msgs.scrollHeight;return el;
  }

  async function send(){
    const text=input.value.trim();if(!text||thinking)return;
    input.value='';thinking=true;
    addMsg('user',text);
    history.push({role:'user',content:text});
    const typing=addTyping();
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:300,
          system:`You are NaskoBot, the friendly AI assistant on Nasko Dev's personal portfolio website. Nasko is a developer and creator from Bulgaria. His site features a stunning space-themed background with asteroids, black holes, shooting stars, and more. He has a Discord server (discord.gg/rSbJmG9CnY), GitHub (github.com/atanass4000-design), YouTube (@NaskoDev), and X (@NaskoBul). There's a secret command palette (press / or Cmd+K) to spawn cosmic objects. Secret codes: TON618 and ASTEROID. Keep replies short, friendly, and fun. Max 2-3 sentences.`,
          messages:history.slice(-8)
        })
      });
      const data=await res.json();
      typing.remove();
      const reply=data.content?.[0]?.text||"Hmm, I couldn't think of a response!";
      history.push({role:'assistant',content:reply});
      addMsg('bot',reply);
    }catch{
      typing.remove();
      addMsg('bot','Oops, my brain glitched! Try again in a sec.');
    }
    thinking=false;
  }

  sendBtn.addEventListener('click',send);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')send();});
})();
