<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nasko Dev — Developer & Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:hsl(0 0% 0%);--fg:hsl(0 0% 100%);--muted:hsl(0 0% 55%);
      --discord:hsl(235 86% 65%);--discord-glow:hsla(235 86% 65%/.45);
      --title-glow1:hsla(0 0% 100%/.15);--title-glow2:hsla(0 0% 100%/.05);
      --btn-bg:hsla(0 0% 100%/.07);--btn-hover:hsla(0 0% 100%/.13);
    }
    body.light{
      --bg:hsl(0 0% 97%);--fg:hsl(0 0% 5%);--muted:hsl(0 0% 40%);
      --title-glow1:hsla(0 0% 0%/.08);--title-glow2:hsla(0 0% 0%/.03);
      --btn-bg:hsla(0 0% 0%/.06);--btn-hover:hsla(0 0% 0%/.11);
    }
    html{scroll-behavior:smooth;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;
      overflow:hidden;display:flex;align-items:center;justify-content:center;
      transition:background .4s,color .4s;}

    #bg-canvas,#fx-canvas{position:fixed;inset:0;pointer-events:none;}
    #bg-canvas{z-index:0;}
    #fx-canvas{z-index:5;}

    .toolbar{position:fixed;top:1.2rem;left:1.2rem;display:flex;gap:.5rem;
      z-index:50;opacity:0;animation:fadeIn .5s ease 1s forwards;}
    .tool-btn{width:2.6rem;height:2.6rem;border-radius:.5rem;
      border:1px solid hsla(0 0% 50%/.2);background:var(--btn-bg);color:var(--muted);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(10px);font-size:.7rem;font-weight:700;letter-spacing:.04em;
      font-family:'Inter',sans-serif;
      transition:background .2s,color .2s,transform .2s cubic-bezier(.22,1,.36,1);}
    .tool-btn:hover{background:var(--btn-hover);color:var(--fg);transform:scale(1.1);}
    .tool-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .icon-moon{display:block;}.icon-sun{display:none;}
    body.light .icon-moon{display:none;}body.light .icon-sun{display:block;}

    .code-panel{position:fixed;top:4.4rem;left:1.2rem;z-index:60;
      background:hsla(0 0% 4%/.96);border:1px solid hsla(0 0% 100%/.12);
      border-radius:.6rem;padding:.85rem;width:215px;
      backdrop-filter:blur(18px);display:none;flex-direction:column;gap:.5rem;
      box-shadow:0 8px 32px rgba(0,0,0,.7);}
    .code-panel.open{display:flex;}
    .code-panel label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
      color:hsla(0 0% 100%/.38);}
    .code-panel input{background:hsla(0 0% 100%/.06);border:1px solid hsla(0 0% 100%/.12);
      border-radius:.35rem;padding:.4rem .6rem;color:#fff;font-family:'Inter',monospace;
      font-size:.82rem;outline:none;width:100%;transition:border-color .2s;}
    .code-panel input:focus{border-color:hsla(235 86% 65%/.6);}
    .code-hint{font-size:.6rem;color:hsla(0 0% 100%/.25);}
    .code-hint span{color:hsl(220 80% 65%);}

    .stage{position:relative;z-index:10;display:flex;flex-direction:column;
      align-items:center;gap:1.5rem;text-align:center;padding:2rem;
      transform-style:preserve-3d;will-change:transform;
      transition:transform .08s linear;}
    .greeting{font-size:.78rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
      color:hsl(220 90% 70%);opacity:0;animation:fadeIn .6s ease .05s forwards;}
    .avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;
      border:2px solid hsla(0 0% 100%/.15);box-shadow:0 0 30px hsla(0 0% 100%/.08);
      opacity:0;transform:translateY(30px);cursor:pointer;
      animation:fadeUp .8s cubic-bezier(.22,1,.36,1) 0s forwards;
      transition:box-shadow .2s;}
    .avatar:hover{box-shadow:0 0 40px hsla(235 86% 65%/.4);}
    @keyframes wobble{
      0%{transform:rotate(0)scale(1)}15%{transform:rotate(-8deg)scale(1.08)}
      30%{transform:rotate(7deg)scale(1.08)}45%{transform:rotate(-5deg)scale(1.04)}
      60%{transform:rotate(4deg)scale(1.04)}75%{transform:rotate(-2deg)scale(1.01)}
      100%{transform:rotate(0)scale(1)}}
    .avatar.wobbling{animation:wobble .6s cubic-bezier(.22,1,.36,1) forwards!important;}
    .title{font-family:'Syne',sans-serif;font-weight:800;
      font-size:clamp(3.5rem,10vw,6rem);letter-spacing:-.03em;line-height:1;
      color:var(--fg);text-shadow:0 0 40px var(--title-glow1),0 0 80px var(--title-glow2);
      opacity:0;transform:translateY(30px);
      animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .1s forwards;}
    .tagline{font-size:clamp(1rem,2.5vw,1.2rem);letter-spacing:.18em;text-transform:uppercase;
      color:var(--muted);opacity:0;transform:translateY(30px);
      animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .3s forwards;}
    .discord-btn{display:inline-flex;align-items:center;gap:.6rem;margin-top:.5rem;
      padding:.75rem 2rem;background:var(--discord);color:#fff;font-weight:600;
      font-size:.95rem;border-radius:.5rem;text-decoration:none;cursor:pointer;
      transition:transform .2s cubic-bezier(.22,1,.36,1),box-shadow .2s;
      opacity:0;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .5s forwards;}
    .discord-btn:hover{transform:scale(1.1);box-shadow:0 0 30px var(--discord-glow),0 0 60px var(--discord-glow);}
    .discord-btn:active{transform:scale(.97);}
    .discord-btn svg{width:18px;height:18px;fill:currentColor;}
    .socials{display:flex;align-items:center;gap:1.25rem;opacity:0;animation:fadeIn .7s ease .7s forwards;}
    .social-link{display:flex;align-items:center;justify-content:center;
      width:2.5rem;height:2.5rem;border-radius:.4rem;color:var(--muted);text-decoration:none;
      transition:color .2s,background .2s,transform .2s cubic-bezier(.22,1,.36,1);}
    .social-link:hover{color:var(--fg);background:hsla(0 0% 100%/.08);transform:scale(1.1);}
    .social-link svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
    .visitor-counter{display:flex;align-items:center;gap:.5rem;font-size:.75rem;
      color:hsla(0 0% 100%/.3);letter-spacing:.08em;opacity:0;animation:fadeIn .7s ease .9s forwards;}
    .visitor-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;
      box-shadow:0 0 6px #4ade80;flex-shrink:0;animation:dotpulse 2s ease-in-out infinite;}
    @keyframes dotpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    .deploy-note{font-size:.72rem;color:hsla(0 0% 100%/.22);letter-spacing:.18em;
      opacity:0;animation:fadeIn .7s ease .9s forwards;}

    #flash{position:fixed;inset:0;z-index:9999;background:#fff;opacity:0;
      pointer-events:none;transition:opacity .12s ease;}
    #flash.go{opacity:.5;}

    @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{to{opacity:1;}}
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <canvas id="fx-canvas"></canvas>
  <div id="flash"></div>

  <div class="toolbar">
    <button class="tool-btn" id="themeBtn" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <button class="tool-btn" id="codeBtn" title="Enter secret code">&lt;/&gt;</button>
  </div>

  <div class="code-panel" id="codePanel">
    <label>Secret Code</label>
    <input id="codeInput" type="text" placeholder="Enter code…" maxlength="20" autocomplete="off" spellcheck="false"/>
    <div class="code-hint">Try: <span>TON618</span> · <span>ASTEROID</span></div>
  </div>

  <main class="stage" id="stage">
    <p class="greeting" id="greeting"></p>
    <img class="avatar" src="images.jpg" alt="Nasko Dev" id="avatar"/>
    <h1 class="title">Nasko Dev</h1>
    <p class="tagline">Developer &amp; Creator</p>
    <a class="discord-btn" href="https://discord.gg/rSbJmG9CnY" target="_blank" rel="noopener noreferrer" data-trans>
      <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      Join Discord
    </a>
    <div class="socials">
      <a class="social-link" href="https://github.com/atanass4000-design" target="_blank" rel="noopener" data-trans aria-label="GitHub">
        <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      </a>
      <a class="social-link" href="https://x.com/NaskoBul" target="_blank" rel="noopener" data-trans aria-label="X">
        <svg viewBox="0 0 24 24"><path d="M4 4l16 16M4 20 20 4" stroke="currentColor"/></svg>
      </a>
      <a class="social-link" href="https://www.youtube.com/@NaskoDev" target="_blank" rel="noopener" data-trans aria-label="YouTube">
        <svg viewBox="0 0 24 24">
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
          <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </div>
    <div class="visitor-counter"><span class="visitor-dot"></span><span id="visit-text">Loading…</span></div>
    <p class="deploy-note">Welcome</p>
  </main>

<script>
/* ── utils ── */
const rand=(a,b)=>a+Math.random()*(b-a);
const randI=(a,b)=>Math.floor(rand(a,b));
const TAU=Math.PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ── canvases ── */
const bgC=document.getElementById('bg-canvas'), bgX=bgC.getContext('2d');
const fxC=document.getElementById('fx-canvas'), fxX=fxC.getContext('2d');
let W=0,H=0;

/* ── declare all state BEFORE first resize ── */
let stars=[];
let shooters=[],shootSec=rand(1.2,3);
let cosmics=[],cosmicSec=rand(3,7);

function resizeAll(){
  W=bgC.width=fxC.width=window.innerWidth;
  H=bgC.height=fxC.height=window.innerHeight;
  makeStars();
}
resizeAll();
window.addEventListener('resize',resizeAll);
document.addEventListener('fullscreenchange',()=>setTimeout(resizeAll,80));
document.addEventListener('webkitfullscreenchange',()=>setTimeout(resizeAll,80));
new ResizeObserver(()=>resizeAll()).observe(document.documentElement);

/* ── theme ── */
if(localStorage.getItem('naskodev_theme')==='light') document.body.classList.add('light');
document.getElementById('themeBtn').addEventListener('click',()=>{
  document.body.classList.toggle('light');
  localStorage.setItem('naskodev_theme',document.body.classList.contains('light')?'light':'dark');
});

/* ── code panel ── */
const codePanel=document.getElementById('codePanel');
const codeInput=document.getElementById('codeInput');
document.getElementById('codeBtn').addEventListener('click',e=>{
  e.stopPropagation(); codePanel.classList.toggle('open');
  if(codePanel.classList.contains('open')) codeInput.focus();
});
document.addEventListener('click',e=>{
  if(!codePanel.contains(e.target)&&e.target!==document.getElementById('codeBtn'))
    codePanel.classList.remove('open');
});
codeInput.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const code=codeInput.value.trim().toUpperCase(); codeInput.value='';
  codePanel.classList.remove('open');
  if(code==='TON618') triggerTON618();
  if(code==='ASTEROID') triggerAsteroid();
});

/* ── visitor counter ── */
(()=>{
  const k='naskodev_visits'; let v=parseInt(localStorage.getItem(k)||'0',10)+1;
  localStorage.setItem(k,v);
  document.getElementById('visit-text').textContent=v===1?'First time here — welcome!':`You've visited ${v} times`;
})();

/* ── greeting ── */
(()=>{
  const h=new Date().getHours();
  document.getElementById('greeting').textContent=h<5?'🌙 Good Night':h<12?'🌅 Good Morning':h<17?'☀️ Good Afternoon':h<21?'🌆 Good Evening':'🌙 Good Night';
})();

/* ── avatar wobble ── */
document.getElementById('avatar').addEventListener('click',function(){
  this.classList.remove('wobbling'); void this.offsetWidth;
  this.classList.add('wobbling');
  this.addEventListener('animationend',()=>this.classList.remove('wobbling'),{once:true});
});

/* ── 3D tilt ── */
const stage=document.getElementById('stage');
document.addEventListener('mousemove',e=>{
  const dx=(e.clientX-W/2)/(W/2), dy=(e.clientY-H/2)/(H/2);
  stage.style.transform=`perspective(900px) rotateX(${-dy*8}deg) rotateY(${dx*8}deg)`;
});
document.addEventListener('mouseleave',()=>{ stage.style.transform='perspective(900px) rotateX(0) rotateY(0)'; });

/* ── page transition flash ── */
const flash=document.getElementById('flash');
document.querySelectorAll('[data-trans]').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault(); const href=a.href;
    flash.classList.add('go');
    setTimeout(()=>{ window.open(href,'_blank'); flash.classList.remove('go'); },130);
  });
});

/* ── comet cursor ── */
let mx=-999,my=-999; const cometTrail=[]; const CMAX=30;
document.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; });

/* ═══════════════════════════════════════
   STARS
═══════════════════════════════════════ */
function makeStars(){
  stars=[];
  const n=Math.floor(W*H/2400);
  for(let i=0;i<n;i++){
    const t=Math.random();
    stars.push({
      x:rand(0,W),y:rand(0,H),
      r:t<.78?rand(.25,.8):t<.95?rand(.8,1.6):rand(1.6,2.8),
      baseOp:t<.78?rand(.2,.5):t<.95?rand(.4,.7):rand(.65,1),
      phase:rand(0,TAU),speed:rand(.25,1.1),
      hue:Math.random()<.65?0:randI(210,270),sat:Math.random()<.65?0:rand(30,70),
    });
  }
}

/* ═══════════════════════════════════════
   SHOOTING STARS — real seconds
═══════════════════════════════════════ */
function spawnShooter(){
  const fromTop=Math.random()<.6;
  shooters.push({
    x:fromTop?rand(W*.05,W*.95):(Math.random()<.5?-10:W+10),
    y:fromTop?rand(-10,H*.25):rand(0,H*.5),
    vx:rand(220,420)*(Math.random()<.5?1:-1)*(fromTop?rand(.35,.85):1),
    vy:fromTop?rand(100,200):rand(-25,25),
    len:rand(60,180),life:1,decay:rand(.45,1.0),
  });
}

/* ═══════════════════════════════════════
   COSMIC OBJECTS
═══════════════════════════════════════ */
function spawnCosmic(){
  const type=Math.random()<.3?'asteroid':'blackhole';
  const fl=Math.random()<.5; const spd=rand(50,140); const ang=rand(-.28,.28);
  const o={type,life:1,decay:rand(.0008,.002),x:fl?-150:W+150,y:rand(H*.05,H*.95),
    vx:Math.cos(ang)*spd*(fl?1:-1),vy:Math.sin(ang)*spd,rot:rand(0,TAU),rotSpeed:rand(-.02,.02)};
  if(type==='asteroid'){
    const br=rand(12,38),np=randI(7,13); o.baseR=br;
    o.pts=Array.from({length:np},(_,i)=>({a:(i/np)*TAU,r:br*rand(.5,1)}));
    o.craters=Array.from({length:randI(2,6)},()=>({ox:rand(-br*.5,br*.5),oy:rand(-br*.5,br*.5),r:rand(2,br*.3)}));
    o.color=`hsl(${randI(18,38)},${randI(8,22)}%,${randI(35,55)}%)`; o.debris=[];
  } else {
    o.bhR=rand(16,38); o.diskW=o.bhR*rand(.55,.85);
    o.spin=rand(.005,.016)*(Math.random()<.5?1:-1);
    o.diskAngle=rand(0,TAU); o.jetLen=o.bhR*rand(3.5,6);
  }
  cosmics.push(o);
}

function drawAsteroid(o,dt){
  if(Math.random()<.35) o.debris.push({
    x:o.x+rand(-o.baseR*.4,o.baseR*.4),y:o.y+rand(-o.baseR*.4,o.baseR*.4),
    vx:-o.vx*.001*rand(.1,.3)+rand(-.3,.3),vy:-o.vy*.001*rand(.1,.3)+rand(-.3,.3),
    r:rand(.7,2.2),life:rand(.5,1),decay:rand(.012,.03)
  });
  o.debris=o.debris.filter(d=>d.life>0);
  for(const d of o.debris){
    d.x+=d.vx;d.y+=d.vy;d.life-=d.decay*dt;
    const dr=Math.max(0,d.r*d.life); if(!dr) continue;
    bgX.beginPath();bgX.arc(d.x,d.y,dr,0,TAU);
    bgX.fillStyle=`rgba(155,125,85,${d.life*.65*o.life})`;bgX.fill();
  }
  bgX.save();bgX.translate(o.x,o.y);bgX.rotate(o.rot);bgX.globalAlpha=clamp(o.life*4,0,1);
  bgX.beginPath();
  o.pts.forEach((p,i)=>{ const px=Math.cos(p.a)*p.r,py=Math.sin(p.a)*p.r; i?bgX.lineTo(px,py):bgX.moveTo(px,py); });
  bgX.closePath();
  const g=bgX.createRadialGradient(-o.baseR*.3,-o.baseR*.3,0,0,0,o.baseR*1.1);
  g.addColorStop(0,'hsl(30,18%,68%)');g.addColorStop(.5,o.color);g.addColorStop(1,'hsl(20,8%,16%)');
  bgX.fillStyle=g;bgX.fill();bgX.strokeStyle='rgba(0,0,0,.5)';bgX.lineWidth=1.1;bgX.stroke();
  for(const cr of o.craters){
    bgX.beginPath();bgX.arc(cr.ox,cr.oy,Math.max(.1,cr.r),0,TAU);
    bgX.fillStyle='rgba(0,0,0,.32)';bgX.fill();
    bgX.strokeStyle='rgba(255,255,255,.05)';bgX.lineWidth=.5;bgX.stroke();
  }
  bgX.restore();
}

function drawTON(ctx,x,y,bhR,diskW,diskAngle,jetLen,al){
  ctx.save();
  // outer quasar nebula
  const nr=bhR+diskW*5;
  const nb=ctx.createRadialGradient(x,y,bhR,x,y,nr);
  nb.addColorStop(0,'rgba(255,180,60,0)');
  nb.addColorStop(.2,`rgba(255,160,40,${.08*al})`);
  nb.addColorStop(.6,`rgba(200,80,10,${.03*al})`);
  nb.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(x,y,Math.max(0,nr),0,TAU);ctx.fillStyle=nb;ctx.fill();
  // jets
  ctx.save();ctx.translate(x,y);ctx.rotate(diskAngle+Math.PI/2);
  for(const d of[-1,1]){
    const jg=ctx.createLinearGradient(0,0,0,d*jetLen);
    jg.addColorStop(0,`rgba(180,220,255,${.6*al})`);
    jg.addColorStop(.35,`rgba(100,160,255,${.28*al})`);
    jg.addColorStop(1,'rgba(60,80,200,0)');
    const jw=bhR*.35;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-jw,d*jetLen);ctx.lineTo(jw,d*jetLen);ctx.closePath();
    ctx.fillStyle=jg;ctx.fill();
    const cg=ctx.createLinearGradient(0,0,0,d*jetLen*.65);
    cg.addColorStop(0,`rgba(255,255,255,${.75*al})`);cg.addColorStop(1,'rgba(150,180,255,0)');
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,d*jetLen*.65);
    ctx.strokeStyle=cg;ctx.lineWidth=bhR*.07;ctx.stroke();
  }
  ctx.restore();
  // disk
  ctx.save();ctx.translate(x,y);ctx.rotate(diskAngle);ctx.scale(1,.22);
  [[0,60,100,100,.95],[30,55,95,100,.78],[25,45,82,95,.56],[20,35,65,80,.32],[15,25,45,60,.13]].forEach(([hs,lMin,lMax,sat,mA],i)=>{
    const ir=bhR+i*(diskW/5),or=ir+diskW/5+1;
    const dg=ctx.createRadialGradient(0,0,ir,0,0,or);
    dg.addColorStop(0,`hsla(${30+hs},${sat}%,${lMax}%,${mA*al})`);
    dg.addColorStop(1,`hsla(${35+hs},${sat-10}%,${lMin}%,0)`);
    ctx.beginPath();ctx.arc(0,0,Math.max(0,or),0,TAU);ctx.arc(0,0,Math.max(0,ir),TAU,0,true);
    ctx.fillStyle=dg;ctx.fill();
  });
  ctx.beginPath();ctx.arc(0,0,Math.max(0,bhR+2),0,TAU);
  ctx.strokeStyle=`rgba(255,240,200,${.92*al})`;ctx.lineWidth=bhR*.12;ctx.stroke();
  const ifl=ctx.createRadialGradient(0,0,bhR*.9,0,0,bhR*1.6);
  ifl.addColorStop(0,`rgba(255,255,240,${.65*al})`);ifl.addColorStop(1,'rgba(255,180,60,0)');
  ctx.beginPath();ctx.arc(0,0,Math.max(0,bhR*1.6),0,TAU);ctx.fillStyle=ifl;ctx.fill();
  ctx.restore();
  // event horizon
  ctx.beginPath();ctx.arc(x,y,Math.max(0,bhR),0,TAU);ctx.fillStyle='#000';ctx.fill();
  const sh=ctx.createRadialGradient(x,y,bhR*.82,x,y,bhR);
  sh.addColorStop(0,'transparent');sh.addColorStop(1,`rgba(255,160,30,${.24*al})`);
  ctx.beginPath();ctx.arc(x,y,Math.max(0,bhR),0,TAU);ctx.fillStyle=sh;ctx.fill();
  ctx.restore();
}

/* ═══════════════════════════════════════
   BG RENDER LOOP
═══════════════════════════════════════ */
let bgLast=performance.now(),bgT=0;
function bgTick(now){
  const dt=(now-bgLast)/1000; bgLast=now; bgT+=dt;
  bgX.fillStyle='#000';bgX.fillRect(0,0,W,H);
  // stars
  for(const s of stars){
    s.phase+=s.speed*.5*dt;
    const op=s.baseOp*(.72+.28*Math.sin(s.phase));
    const col=s.sat>0?`hsla(${s.hue},${s.sat}%,88%,${op})`:`rgba(255,255,255,${op})`;
    if(s.r>1.6){
      const hl=bgX.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*5);
      hl.addColorStop(0,s.sat>0?`hsla(${s.hue},65%,82%,${op*.4})`:`rgba(200,215,255,${op*.3})`);
      hl.addColorStop(1,'transparent');
      bgX.beginPath();bgX.arc(s.x,s.y,Math.max(0,s.r*5),0,TAU);bgX.fillStyle=hl;bgX.fill();
      if(s.r>2.2){
        bgX.save();bgX.globalAlpha=op*.28;bgX.strokeStyle='#cde';bgX.lineWidth=.5;
        bgX.beginPath();bgX.moveTo(s.x-s.r*9,s.y);bgX.lineTo(s.x+s.r*9,s.y);
        bgX.moveTo(s.x,s.y-s.r*9);bgX.lineTo(s.x,s.y+s.r*9);bgX.stroke();bgX.restore();
      }
    }
    bgX.beginPath();bgX.arc(s.x,s.y,Math.max(0,s.r),0,TAU);bgX.fillStyle=col;bgX.fill();
  }
  // shooting stars
  shootSec-=dt;
  if(shootSec<=0){spawnShooter();shootSec=rand(1.2,4);}
  shooters=shooters.filter(s=>s.life>0);
  for(const s of shooters){
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=s.decay*dt;
    const ang=Math.atan2(s.vy,s.vx);
    const tx=s.x-Math.cos(ang)*s.len*s.life,ty=s.y-Math.sin(ang)*s.len*s.life;
    const sg=bgX.createLinearGradient(tx,ty,s.x,s.y);
    sg.addColorStop(0,'rgba(255,255,255,0)');
    sg.addColorStop(.55,`rgba(200,225,255,${s.life*.35})`);
    sg.addColorStop(1,`rgba(255,255,255,${s.life*.95})`);
    bgX.save();bgX.globalCompositeOperation='screen';
    bgX.beginPath();bgX.moveTo(tx,ty);bgX.lineTo(s.x,s.y);
    bgX.strokeStyle=sg;bgX.lineWidth=1.8*s.life;bgX.lineCap='round';bgX.stroke();
    bgX.beginPath();bgX.arc(s.x,s.y,Math.max(0,2*s.life),0,TAU);
    bgX.fillStyle=`rgba(255,255,255,${s.life*.9})`;bgX.fill();bgX.restore();
  }
  // cosmics
  cosmicSec-=dt;
  if(cosmicSec<=0){spawnCosmic();cosmicSec=rand(4,9);}
  cosmics=cosmics.filter(o=>o.life>0&&o.x>-400&&o.x<W+400&&o.y>-400&&o.y<H+400);
  for(const o of cosmics){
    o.x+=o.vx*dt;o.y+=o.vy*dt;o.life-=o.decay*dt;
    if(o.type==='asteroid'){o.rot+=o.rotSpeed;drawAsteroid(o,dt);}
    else{o.diskAngle+=o.spin*dt;drawTON(bgX,o.x,o.y,o.bhR,o.diskW,o.diskAngle,o.jetLen,clamp(o.life*4,0,1));}
  }
  requestAnimationFrame(bgTick);
}
requestAnimationFrame(bgTick);

/* ═══════════════════════════════════════
   FX CANVAS — comet + code anims
═══════════════════════════════════════ */
let fxAnim=null;
function fxTick(){
  fxX.clearRect(0,0,W,H);
  // comet
  cometTrail.push({x:mx,y:my});
  if(cometTrail.length>CMAX) cometTrail.shift();
  for(let i=1;i<cometTrail.length;i++){
    const p=i/cometTrail.length;
    fxX.beginPath();fxX.arc(cometTrail[i].x,cometTrail[i].y,Math.max(0,p*3.5),0,TAU);
    fxX.fillStyle=`hsla(200,100%,80%,${p*.65})`;fxX.fill();
  }
  if(cometTrail.length>0){
    const h=cometTrail[cometTrail.length-1];
    const hg=fxX.createRadialGradient(h.x,h.y,0,h.x,h.y,9);
    hg.addColorStop(0,'rgba(255,255,255,.9)');hg.addColorStop(1,'rgba(100,200,255,0)');
    fxX.beginPath();fxX.arc(h.x,h.y,9,0,TAU);fxX.fillStyle=hg;fxX.fill();
  }
  // active anim
  if(fxAnim) fxAnim.draw(performance.now());
  requestAnimationFrame(fxTick);
}
requestAnimationFrame(fxTick);

/* ═══════════════════════════════════════
   CODE: TON618
═══════════════════════════════════════ */
function triggerTON618(){
  if(fxAnim) return;
  const start=performance.now(),dur=6500;
  const cx=W/2,cy=H/2,BHR=Math.min(W,H)*.13;
  fxAnim={draw(now){
    const t=clamp((now-start)/dur,0,1);
    fxX.save();
    // phase 1: dim screen
    if(t<.15){
      fxX.fillStyle=`rgba(0,0,0,${(t/.15)*.85})`;fxX.fillRect(0,0,W,H);
    }
    // phase 2: grow BH + lensing rings
    if(t>=.15&&t<.45){
      const p=(t-.15)/.3;
      fxX.fillStyle='rgba(0,0,0,.85)';fxX.fillRect(0,0,W,H);
      for(let r=0;r<5;r++){
        const rp=clamp(p*5-r*.6,0,1);
        const rr=BHR*(2+r*.7)*rp;
        fxX.beginPath();fxX.arc(cx,cy,rr,0,TAU);
        fxX.strokeStyle=`rgba(255,${180+r*12},${50+r*8},${.18*(1-rp)})`;
        fxX.lineWidth=2.5-r*.3;fxX.stroke();
      }
      drawTON(fxX,cx,cy,BHR*Math.pow(p,1.3),BHR*.72*Math.pow(p,1.3),(bgT+t*8)*1.5,BHR*5*p,p);
    }
    // phase 3: full + shake
    if(t>=.45&&t<.8){
      const p=(t-.45)/.35;
      fxX.fillStyle='rgba(0,0,0,.85)';fxX.fillRect(0,0,W,H);
      const shk=(1-p)*5;
      fxX.translate(rand(-shk,shk),rand(-shk,shk));
      const pulse=1+.05*Math.sin(t*65);
      drawTON(fxX,cx,cy,BHR*pulse,BHR*.72*pulse,(bgT+t*8)*1.5,BHR*5*pulse,1);
    }
    // phase 4: flash out
    if(t>=.8){
      const p=(t-.8)/.2;
      fxX.fillStyle=`rgba(0,0,0,${.85*(1-p*.7)})`;fxX.fillRect(0,0,W,H);
      drawTON(fxX,cx,cy,BHR,BHR*.72,(bgT+t*8)*1.5,BHR*5,clamp(1-p*1.8,0,1));
      if(p>.65){
        const fp=(p-.65)/.35;
        fxX.fillStyle=`rgba(255,240,180,${fp*.7})`;fxX.fillRect(0,0,W,H);
      }
    }
    fxX.restore();
    if(t>=1) fxAnim=null;
  }};
}

/* ═══════════════════════════════════════
   CODE: ASTEROID → EARTH IMPACT
═══════════════════════════════════════ */
function triggerAsteroid(){
  if(fxAnim) return;
  const start=performance.now(),dur=6000;
  const ex=W/2,ey=H*.7,er=Math.min(W,H)*.15;
  const ax0=W*.88,ay0=-er*2;
  const impX=ex+er*.3,impY=ey-er*.55;
  const dvx=impX-ax0,dvy=impY-ay0;
  const HIT=.38;
  let exploded=false,sw=0,parts=[];

  function boom(){
    for(let i=0;i<130;i++){
      const a=rand(0,TAU),sp=rand(80,650),h=rand(18,52);
      parts.push({x:impX,y:impY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
        r:rand(2,14),life:1,decay:rand(.28,.75),color:`hsl(${h},100%,${randI(55,85)}%)`,grav:rand(60,220)});
    }
    for(let i=0;i<35;i++){
      const a=rand(-Math.PI*.85,-Math.PI*.15),sp=rand(100,420);
      parts.push({x:impX,y:impY,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
        r:rand(4,20),life:1,decay:rand(.18,.5),color:`hsl(${randI(18,38)},${randI(8,22)}%,${randI(32,52)}%)`,grav:rand(80,200),rock:true});
    }
  }

  fxAnim={lastT:start,draw(now){
    const dt=clamp((now-this.lastT)/1000,0,.1); this.lastT=now;
    const t=clamp((now-start)/dur,0,1);
    fxX.save();
    // dim overlay
    fxX.fillStyle=`rgba(0,0,0,${clamp(t<.85?t*.38:(1-t)/.15*.38,0,.38)})`;
    fxX.fillRect(0,0,W,H);

    // earth
    const ea=t<.1?t/.1:t>.88?(1-(t-.88)/.12):1;
    fxX.save();fxX.globalAlpha=ea;
    const atm=fxX.createRadialGradient(ex,ey,er*.9,ex,ey,er*1.38);
    atm.addColorStop(0,'rgba(60,140,255,.22)');atm.addColorStop(.6,'rgba(30,80,200,.07)');atm.addColorStop(1,'rgba(0,20,100,0)');
    fxX.beginPath();fxX.arc(ex,ey,er*1.38,0,TAU);fxX.fillStyle=atm;fxX.fill();
    const oc=fxX.createRadialGradient(ex-er*.2,ey-er*.2,0,ex,ey,er);
    oc.addColorStop(0,'#1a6acd');oc.addColorStop(.5,'#0d4a9e');oc.addColorStop(1,'#041f5c');
    fxX.beginPath();fxX.arc(ex,ey,er,0,TAU);fxX.fillStyle=oc;fxX.fill();
    fxX.fillStyle='rgba(40,160,60,.82)';
    [[-.3,-.25,.38],[.25,-.1,.28],[-.1,.3,.22],[.3,.3,.18]].forEach(([ox,oy,r])=>{
      fxX.beginPath();fxX.arc(ex+ox*er,ey+oy*er,r*er,0,TAU);fxX.fill();
    });
    fxX.globalAlpha=ea*.3;fxX.fillStyle='rgba(255,255,255,.55)';
    [[-.1,-.35,.3],[.32,.1,.22],[-.28,.2,.18]].forEach(([ox,oy,r])=>{
      fxX.beginPath();fxX.arc(ex+ox*er,ey+oy*er,r*er,0,TAU);fxX.fill();
    });
    // crater after impact
    if(exploded){
      const cp=clamp((t-HIT)/.25,0,1);
      fxX.globalAlpha=ea*cp;
      fxX.fillStyle='rgba(255,70,0,.55)';fxX.beginPath();fxX.arc(impX,impY,er*.2*cp,0,TAU);fxX.fill();
      fxX.fillStyle='rgba(0,0,0,.65)';fxX.beginPath();fxX.arc(impX,impY,er*.12*cp,0,TAU);fxX.fill();
    }
    fxX.restore();

    // asteroid pre-impact
    if(t<HIT&&!exploded){
      const p=t/HIT;
      const astX=ax0+dvx*p,astY=ay0+dvy*p,astR=er*.22;
      // fire/smoke trail
      for(let i=0;i<8;i++){
        const tp=clamp(p-i*.03,0,1);
        const ttx=ax0+dvx*tp,tty=ay0+dvy*tp;
        const tg=fxX.createRadialGradient(ttx,tty,0,ttx,tty,astR*(1.2+i*.55));
        tg.addColorStop(0,`rgba(255,200,50,${.38-i*.04})`);
        tg.addColorStop(.5,`rgba(255,80,10,${.18-i*.02})`);
        tg.addColorStop(1,'rgba(0,0,0,0)');
        fxX.beginPath();fxX.arc(ttx,tty,astR*(1.2+i*.55),0,TAU);fxX.fillStyle=tg;fxX.fill();
      }
      for(let i=0;i<18;i++){
        const tp=clamp(p-i*.02,0,1);
        const ttx=ax0+dvx*tp,tty=ay0+dvy*tp;
        fxX.beginPath();fxX.arc(ttx,tty,astR*.55*((18-i)/18),0,TAU);
        fxX.fillStyle=`rgba(70,50,30,${.1-i*.005})`;fxX.fill();
      }
      fxX.save();fxX.translate(astX,astY);fxX.rotate(p*9);
      const ag=fxX.createRadialGradient(-astR*.3,-astR*.3,0,0,0,astR);
      ag.addColorStop(0,'hsl(28,18%,64%)');ag.addColorStop(.6,'hsl(22,14%,38%)');ag.addColorStop(1,'hsl(18,10%,16%)');
      fxX.beginPath();
      [0,.72,1.35,2.1,2.82,3.6,4.38,5.18,5.92].forEach((a,i)=>{
        const r2=astR*(i%2===0?1:.62);
        i?fxX.lineTo(Math.cos(a)*r2,Math.sin(a)*r2):fxX.moveTo(Math.cos(a)*r2,Math.sin(a)*r2);
      });
      fxX.closePath();fxX.fillStyle=ag;fxX.fill();
      fxX.strokeStyle='rgba(0,0,0,.4)';fxX.lineWidth=1.5;fxX.stroke();
      [[.2,.1,.18],[-.2,-.2,.12],[.1,-.25,.09]].forEach(([ox,oy,r])=>{
        fxX.beginPath();fxX.arc(ox*astR,oy*astR,r*astR,0,TAU);fxX.fillStyle='rgba(0,0,0,.35)';fxX.fill();
      });
      fxX.restore();
    }

    if(t>=HIT&&!exploded){exploded=true;boom();}

    if(exploded){
      sw+=dt*500;
      const swa=clamp(1-sw/(er*2.8),0,1);
      if(swa>0){
        fxX.beginPath();fxX.arc(impX,impY,sw,0,TAU);
        fxX.strokeStyle=`rgba(255,200,80,${swa*.6})`;fxX.lineWidth=3*swa;fxX.stroke();
        const swg=fxX.createRadialGradient(impX,impY,sw*.7,impX,impY,sw);
        swg.addColorStop(0,'rgba(255,160,30,0)');
        swg.addColorStop(.6,`rgba(255,120,10,${.09*swa})`);
        swg.addColorStop(1,'rgba(0,0,0,0)');
        fxX.beginPath();fxX.arc(impX,impY,sw,0,TAU);fxX.fillStyle=swg;fxX.fill();
      }
      // impact flash
      const fp=clamp(1-(now-start-HIT*dur)/(dur*.1),0,1);
      if(fp>0){fxX.fillStyle=`rgba(255,220,100,${fp*.8})`;fxX.fillRect(0,0,W,H);}
      for(const p2 of parts){
        p2.x+=p2.vx*dt;p2.y+=p2.vy*dt;p2.vy+=p2.grav*dt;p2.life-=p2.decay*dt;
        const r2=Math.max(0,p2.r*p2.life); if(!r2) continue;
        fxX.globalAlpha=Math.max(0,p2.life);
        fxX.beginPath();fxX.arc(p2.x,p2.y,Math.max(0,r2),0,TAU);
        if(p2.rock){fxX.fillStyle=p2.color;}
        else{const pg=fxX.createRadialGradient(p2.x,p2.y,0,p2.x,p2.y,r2);pg.addColorStop(0,p2.color);pg.addColorStop(1,'rgba(0,0,0,0)');fxX.fillStyle=pg;}
        fxX.fill();fxX.globalAlpha=1;
      }
      parts=parts.filter(p2=>p2.life>0);
    }
    fxX.restore();
    if(t>=1) fxAnim=null;
  }};
}
</script>
