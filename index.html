<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nasko Dev — Developer & Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:           hsl(0 0% 0%);
      --fg:           hsl(0 0% 100%);
      --muted:        hsl(0 0% 55%);
      --discord:      hsl(235 86% 65%);
      --discord-glow: hsla(235 86% 65% / .45);
      --title-glow1:  hsla(0 0% 100% / .15);
      --title-glow2:  hsla(0 0% 100% / .05);
      --btn-bg:       hsla(0 0% 100% / .07);
      --btn-hover:    hsla(0 0% 100% / .13);
      --particle-rgb: 255,255,255;
    }

    body.light {
      --bg:           hsl(0 0% 97%);
      --fg:           hsl(0 0% 5%);
      --muted:        hsl(0 0% 40%);
      --title-glow1:  hsla(0 0% 0% / .08);
      --title-glow2:  hsla(0 0% 0% / .03);
      --btn-bg:       hsla(0 0% 0% / .06);
      --btn-hover:    hsla(0 0% 0% / .11);
      --particle-rgb: 0,0,0;
    }

    html {
      scroll-behavior: smooth;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── Greeting ── */
    .greeting {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: hsl(220 90% 70%);
      opacity: 0;
      animation: fadeIn 0.6s ease 0.05s forwards;
    }

    /* ── Theme Toggle ── */
    .theme-btn {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      z-index: 50;
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 0.5rem;
      border: 1px solid hsla(0 0% 50% / .2);
      background: var(--btn-bg);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: background 0.2s, color 0.2s, transform 0.2s cubic-bezier(.22,1,.36,1), border-color 0.3s;
      opacity: 0;
      animation: fadeIn 0.5s ease 1s forwards;
    }
    .theme-btn:hover {
      background: var(--btn-hover);
      color: var(--fg);
      transform: scale(1.1);
    }
    .theme-btn svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      transition: opacity 0.2s;
    }
    /* show/hide icons based on theme */
    .icon-moon { display: block; }
    .icon-sun  { display: none; }
    body.light .icon-moon { display: none; }
    body.light .icon-sun  { display: block; }

    /* ── Particles ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Stage ── */
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }

    /* ── Avatar ── */
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid hsla(0 0% 100% / .15);
      box-shadow: 0 0 30px hsla(0 0% 100% / .08);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0s forwards;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
    }
    .avatar:hover {
      box-shadow: 0 0 40px hsla(235 86% 65% / .4);
    }
    @keyframes wobble {
      0%   { transform: rotate(0deg) scale(1); }
      15%  { transform: rotate(-8deg) scale(1.08); }
      30%  { transform: rotate(7deg) scale(1.08); }
      45%  { transform: rotate(-5deg) scale(1.04); }
      60%  { transform: rotate(4deg) scale(1.04); }
      75%  { transform: rotate(-2deg) scale(1.01); }
      100% { transform: rotate(0deg) scale(1); }
    }
    .avatar.wobbling {
      animation: wobble 0.6s cubic-bezier(.22,1,.36,1) forwards !important;
    }

    /* ── Title ── */
    .title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3.5rem, 10vw, 6rem);
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--fg);
      text-shadow:
        0 0 40px var(--title-glow1),
        0 0 80px var(--title-glow2);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.1s forwards;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.3s forwards;
    }

    /* ── Discord Button ── */
    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: var(--discord);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 0.5rem;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(.22,1,.36,1), box-shadow 0.2s ease;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.5s forwards;
    }
    .discord-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px var(--discord-glow), 0 0 60px var(--discord-glow);
    }
    .discord-btn:active { transform: scale(0.97); }
    .discord-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* ── Social Icons ── */
    .socials {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      opacity: 0;
      animation: fadeIn 0.7s ease 0.7s forwards;
    }
    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.4rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s, background 0.2s, transform 0.2s cubic-bezier(.22,1,.36,1);
    }
    .social-link:hover {
      color: var(--fg);
      background: hsla(0 0% 100% / .08);
      transform: scale(1.1);
    }
    .social-link svg {
      width: 20px; height: 20px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Visitor Counter ── */
    .visitor-counter {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: hsla(0 0% 100% / .3);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeIn 0.7s ease 0.9s forwards;
    }
    .visitor-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      flex-shrink: 0;
      animation: dotpulse 2s ease-in-out infinite;
    }
    @keyframes dotpulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Welcome note ── */
    .deploy-note {
      font-size: 0.72rem;
      color: hsla(0 0% 100% / .22);
      letter-spacing: 0.18em;
      opacity: 0;
      animation: fadeIn 0.7s ease 0.9s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>

  <script>
    /* ── Theme Toggle ── */
    (function () {
      const btn  = document.getElementById('themeBtn');
      const body = document.body;
      const saved = localStorage.getItem('naskodev_theme');
      if (saved === 'light') body.classList.add('light');
      btn.addEventListener('click', () => {
        body.classList.toggle('light');
        localStorage.setItem('naskodev_theme', body.classList.contains('light') ? 'light' : 'dark');
      });
    })();

    /* ── Visitor Counter ── */
    (function () {
      const key = 'naskodev_visits';
      let visits = parseInt(localStorage.getItem(key) || '0', 10) + 1;
      localStorage.setItem(key, visits);
      const el = document.getElementById('visit-text');
      if (visits === 1) {
        el.textContent = 'First time here — welcome!';
      } else {
        el.textContent = `You've visited ${visits} times`;
      }
    })();

    /* ── Time-of-Day Greeting ── */
    (function () {
      const h = new Date().getHours();
      const greet = h < 5  ? '🌙 Good Night'
                  : h < 12 ? '🌅 Good Morning'
                  : h < 17 ? '☀️ Good Afternoon'
                  : h < 21 ? '🌆 Good Evening'
                  :          '🌙 Good Night';
      document.getElementById('greeting').textContent = greet;
    })();

    /* ── Avatar Wobble on Click ── */
    (function () {
      const avatar = document.getElementById('avatar');
      avatar.addEventListener('click', () => {
        avatar.classList.remove('wobbling');
        void avatar.offsetWidth; // reflow to restart animation
        avatar.classList.add('wobbling');
        avatar.addEventListener('animationend', () => {
          avatar.classList.remove('wobbling');
        }, { once: true });
      });
    })();

    /* ── Space Background ── */
    (function () {
      const canvas = document.getElementById('particles');
      const ctx    = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', () => { resize(); makeStars(); });

      const rand  = (a, b) => a + Math.random() * (b - a);
      const randI = (a, b) => Math.floor(rand(a, b));
      const TAU   = Math.PI * 2;

      /* ── Stars ── */
      let stars = [];
      function makeStars() {
        stars = [];
        const n = Math.floor((W * H) / 2400);
        for (let i = 0; i < n; i++) {
          const tier = Math.random();
          stars.push({
            x: rand(0,W), y: rand(0,H),
            r:      tier<0.78 ? rand(0.25,0.8) : tier<0.95 ? rand(0.8,1.6) : rand(1.6,2.8),
            baseOp: tier<0.78 ? rand(0.2,0.5)  : tier<0.95 ? rand(0.4,0.7) : rand(0.65,1.0),
            phase:  rand(0,TAU), speed: rand(0.25,1.1),
            hue:    Math.random()<0.65 ? 0 : randI(210,270),
            sat:    Math.random()<0.65 ? 0 : rand(30,70),
          });
        }
      }
      makeStars();

      /* ── Cosmic Objects ── */
      let cosmics = [], cosmicTimer = rand(160, 320); // less frequent = fewer asteroids

      /* ── Shooting Stars ── */
      let shooters = [], shootTimer = rand(60, 180);

      function spawnShooter() {
        const fromTop = Math.random() < 0.6;
        shooters.push({
          x: fromTop ? rand(W*0.05, W*0.95) : (Math.random()<0.5 ? -10 : W+10),
          y: fromTop ? rand(-10, H*0.3)     : rand(0, H*0.6),
          vx: rand(6, 16) * (Math.random()<0.5 ? 1 : -1) * (fromTop ? rand(0.3,0.9) : 1),
          vy: fromTop ? rand(4, 10) : rand(-2, 2),
          len: rand(55, 160),
          life: 1, decay: rand(0.008, 0.022),
        });
      }

      function spawnCosmic() {
        // 35% asteroid, 65% black hole — fewer rocks
        const type     = Math.random() < 0.35 ? 'asteroid' : 'blackhole';
        const fromLeft = Math.random() < 0.5;
        const angle    = rand(-0.3, 0.3);
        const speed    = rand(0.9, 2.5);
        const obj = {
          type,
          x:  fromLeft ? -120 : W + 120,
          y:  rand(H * 0.05, H * 0.95),
          vx: Math.cos(angle) * speed * (fromLeft ? 1 : -1),
          vy: Math.sin(angle) * speed,
          rot: rand(0, TAU), rotSpeed: rand(-0.02, 0.02),
          life: 1, decay: rand(0.0005, 0.0013),
        };

        if (type === 'asteroid') {
          const numPts = randI(7, 13), baseR = rand(12, 38);
          obj.pts = Array.from({length: numPts}, (_, i) => ({
            a: (i / numPts) * TAU, r: baseR * rand(0.5, 1.0)
          }));
          obj.baseR   = baseR;
          obj.craters = Array.from({length: randI(2,6)}, () => ({
            ox: rand(-baseR*0.5, baseR*0.5), oy: rand(-baseR*0.5, baseR*0.5),
            r: rand(2, baseR * 0.3)
          }));
          obj.color  = `hsl(${randI(18,38)},${randI(8,22)}%,${randI(35,55)}%)`;
          obj.debris = [];
        } else {
          // TON 618-style: fixed warm orange/white palette, jets, thick disk
          obj.bhR       = rand(16, 38);
          obj.diskW     = obj.bhR * rand(0.55, 0.85); // thick disk proportional to hole
          obj.spin      = rand(0.005, 0.016) * (Math.random()<0.5 ? 1 : -1);
          obj.diskAngle = rand(0, TAU);
          obj.jetLen    = obj.bhR * rand(3.5, 6.0);   // relativistic jets
          obj.jetAngle  = rand(0, TAU);                // perpendicular to disk
        }
        cosmics.push(obj);
      }

      function drawAsteroid(o, dt) {
        if (Math.random() < 0.4) {
          o.debris.push({
            x: o.x+rand(-o.baseR*0.4,o.baseR*0.4), y: o.y+rand(-o.baseR*0.4,o.baseR*0.4),
            vx: -o.vx*rand(0.05,0.3)+rand(-0.3,0.3), vy: -o.vy*rand(0.05,0.3)+rand(-0.3,0.3),
            r: rand(0.7,2.2), life: rand(0.5,1), decay: rand(0.01,0.028)
          });
        }
        o.debris = o.debris.filter(d => d.life > 0);
        for (const d of o.debris) {
          d.x+=d.vx*dt; d.y+=d.vy*dt; d.life-=d.decay*dt;
          const dr=Math.max(0,d.r*d.life); if(!dr) continue;
          ctx.beginPath(); ctx.arc(d.x,d.y,dr,0,TAU);
          ctx.fillStyle=`rgba(155,125,85,${d.life*0.65*o.life})`; ctx.fill();
        }
        ctx.save();
        ctx.translate(o.x,o.y); ctx.rotate(o.rot);
        ctx.globalAlpha = Math.min(1, o.life * 4);
        ctx.beginPath();
        o.pts.forEach((p,i)=>{ const px=Math.cos(p.a)*p.r,py=Math.sin(p.a)*p.r; i?ctx.lineTo(px,py):ctx.moveTo(px,py); });
        ctx.closePath();
        const g=ctx.createRadialGradient(-o.baseR*0.3,-o.baseR*0.3,0,0,0,o.baseR*1.1);
        g.addColorStop(0,'hsl(30,18%,68%)'); g.addColorStop(0.5,o.color); g.addColorStop(1,'hsl(20,8%,16%)');
        ctx.fillStyle=g; ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1.1; ctx.stroke();
        for(const cr of o.craters){
          ctx.beginPath(); ctx.arc(cr.ox,cr.oy,Math.max(0.1,cr.r),0,TAU);
          ctx.fillStyle='rgba(0,0,0,0.32)'; ctx.fill();
          ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=0.5; ctx.stroke();
        }
        ctx.restore();
      }

      /* ── TON 618 Black Hole ── */
      function drawBlackHole(o) {
        const {x, y, bhR, diskW, diskAngle, jetLen, jetAngle, life} = o;
        const alpha = Math.min(1, life * 4);
        ctx.save();

        // ── Far outer nebula glow (quasar luminosity) ──
        const outerR = bhR + diskW * 5;
        const nebula = ctx.createRadialGradient(x,y,bhR,x,y,outerR);
        nebula.addColorStop(0,   `rgba(255,180,60,0)`);
        nebula.addColorStop(0.2, `rgba(255,160,40,${0.07*alpha})`);
        nebula.addColorStop(0.5, `rgba(200,100,20,${0.04*alpha})`);
        nebula.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(x,y,outerR,0,TAU);
        ctx.fillStyle=nebula; ctx.fill();

        // ── Relativistic jets (perpendicular to disk) ──
        ctx.save();
        ctx.translate(x,y); ctx.rotate(diskAngle + Math.PI/2);
        for (const dir of [-1, 1]) {
          // jet beam
          const jg = ctx.createLinearGradient(0, 0, 0, dir * jetLen);
          jg.addColorStop(0,   `rgba(180,220,255,${0.55*alpha})`);
          jg.addColorStop(0.3, `rgba(120,170,255,${0.3*alpha})`);
          jg.addColorStop(0.7, `rgba(80,120,255,${0.12*alpha})`);
          jg.addColorStop(1,   'rgba(60,80,200,0)');
          // cone shape via two triangles
          const jetW = bhR * 0.38;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(-jetW, dir * jetLen);
          ctx.lineTo( jetW, dir * jetLen);
          ctx.closePath();
          ctx.fillStyle = jg; ctx.fill();

          // bright jet core line
          const cg = ctx.createLinearGradient(0,0,0,dir*jetLen*0.7);
          cg.addColorStop(0, `rgba(255,255,255,${0.7*alpha})`);
          cg.addColorStop(1, 'rgba(150,180,255,0)');
          ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, dir*jetLen*0.7);
          ctx.strokeStyle=cg; ctx.lineWidth=bhR*0.08; ctx.stroke();
        }
        ctx.restore();

        // ── Accretion disk (TON 618: super-bright, orange-white core → red outer) ──
        ctx.save(); ctx.translate(x,y); ctx.rotate(diskAngle);
        const scaleY = 0.22; // very flat, nearly edge-on
        ctx.scale(1, scaleY);

        // 5 disk layers from inner (white-hot) to outer (dim orange-red)
        const diskColors = [
          [0,   60, 100, 100, 0.95], // innermost: white-hot
          [30,  55,  95, 100, 0.78], // bright orange-white
          [25,  45,  82,  95, 0.58], // orange
          [20,  35,  65,  80, 0.35], // deep orange
          [15,  25,  45,  60, 0.15], // dim red-orange outer
        ];
        diskColors.forEach(([hueShift, lMin, lMax, sat, maxA], i) => {
          const ir = bhR + i * (diskW / diskColors.length);
          const or = ir + diskW / diskColors.length + 1;
          const dg = ctx.createRadialGradient(0,0,ir,0,0,or);
          dg.addColorStop(0, `hsla(${30+hueShift},${sat}%,${lMax}%,${maxA*alpha})`);
          dg.addColorStop(1, `hsla(${35+hueShift},${sat-10}%,${lMin}%,0)`);
          ctx.beginPath(); ctx.arc(0,0,or,0,TAU); ctx.arc(0,0,Math.max(0,ir),TAU,0,true);
          ctx.fillStyle=dg; ctx.fill();
        });

        // photon sphere — bright white ring right at horizon
        ctx.beginPath(); ctx.arc(0,0, bhR+2, 0, TAU);
        ctx.strokeStyle=`rgba(255,240,200,${0.9*alpha})`; ctx.lineWidth=bhR*0.12; ctx.stroke();

        // inner edge flare — brightest point of disk
        const innerFlare=ctx.createRadialGradient(0,0,bhR*0.9,0,0,bhR*1.6);
        innerFlare.addColorStop(0, `rgba(255,255,240,${0.6*alpha})`);
        innerFlare.addColorStop(1, 'rgba(255,180,60,0)');
        ctx.beginPath(); ctx.arc(0,0,bhR*1.6,0,TAU); ctx.fillStyle=innerFlare; ctx.fill();

        ctx.restore(); // undo disk transform

        // ── Event horizon ──
        ctx.beginPath(); ctx.arc(x,y,bhR,0,TAU);
        ctx.fillStyle='#000000'; ctx.fill();

        // gravitational shadow ring
        const shadow=ctx.createRadialGradient(x,y,bhR*0.85,x,y,bhR);
        shadow.addColorStop(0,'transparent');
        shadow.addColorStop(1,`rgba(255,160,30,${0.22*alpha})`);
        ctx.beginPath(); ctx.arc(x,y,bhR,0,TAU); ctx.fillStyle=shadow; ctx.fill();

        ctx.restore();
      }


      let t=0, last=performance.now();
      function tick(now) {
        const dt = Math.min((now-last)/16.67, 3); last=now; t+=dt;

        // pure black
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, W, H);

        // stars
        for (const s of stars) {
          s.phase += s.speed * 0.008 * dt;
          const op  = s.baseOp * (0.72 + 0.28 * Math.sin(s.phase));
          const col = s.sat>0 ? `hsla(${s.hue},${s.sat}%,88%,${op})` : `rgba(255,255,255,${op})`;
          if (s.r > 1.6) {
            const halo=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*5);
            halo.addColorStop(0, s.sat>0?`hsla(${s.hue},65%,82%,${op*0.4})`:`rgba(200,215,255,${op*0.3})`);
            halo.addColorStop(1,'transparent');
            ctx.beginPath(); ctx.arc(s.x,s.y,s.r*5,0,TAU); ctx.fillStyle=halo; ctx.fill();
            if (s.r>2.2) {
              ctx.save(); ctx.globalAlpha=op*0.28; ctx.strokeStyle='#cde';  ctx.lineWidth=0.5;
              ctx.beginPath();
              ctx.moveTo(s.x-s.r*9,s.y); ctx.lineTo(s.x+s.r*9,s.y);
              ctx.moveTo(s.x,s.y-s.r*9); ctx.lineTo(s.x,s.y+s.r*9);
              ctx.stroke(); ctx.restore();
            }
          }
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.fillStyle=col; ctx.fill();
        }

        // shooting stars
        shootTimer -= dt;
        if (shootTimer <= 0) { spawnShooter(); shootTimer = rand(55, 160); }
        shooters = shooters.filter(s => s.life > 0);
        for (const s of shooters) {
          s.x += s.vx*dt; s.y += s.vy*dt; s.life -= s.decay*dt;
          const ang  = Math.atan2(s.vy, s.vx);
          const tailX = s.x - Math.cos(ang)*s.len*s.life;
          const tailY = s.y - Math.sin(ang)*s.len*s.life;
          const sg = ctx.createLinearGradient(tailX,tailY,s.x,s.y);
          sg.addColorStop(0,   'rgba(255,255,255,0)');
          sg.addColorStop(0.55,`rgba(200,225,255,${s.life*0.35})`);
          sg.addColorStop(1,   `rgba(255,255,255,${s.life*0.95})`);
          ctx.save();
          ctx.globalCompositeOperation='screen';
          ctx.beginPath(); ctx.moveTo(tailX,tailY); ctx.lineTo(s.x,s.y);
          ctx.strokeStyle=sg; ctx.lineWidth=1.6*s.life; ctx.lineCap='round'; ctx.stroke();
          // bright head dot
          ctx.beginPath(); ctx.arc(s.x,s.y,1.8*s.life,0,TAU);
          ctx.fillStyle=`rgba(255,255,255,${s.life*0.9})`; ctx.fill();
          ctx.restore();
        }

        // cosmic objects
        cosmicTimer -= dt;
        if (cosmicTimer <= 0) { spawnCosmic(); cosmicTimer = rand(140, 360); }
        cosmics = cosmics.filter(o => o.life>0 && o.x>-300 && o.x<W+300 && o.y>-300 && o.y<H+300);
        for (const o of cosmics) {
          o.x += o.vx*dt; o.y += o.vy*dt; o.life -= o.decay*dt;
          if (o.type==='asteroid') { o.rot += o.rotSpeed*dt; drawAsteroid(o,dt); }
          else { o.diskAngle += o.spin*dt; drawBlackHole(o); }
        }

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();

  </script>

</body>
</html>
