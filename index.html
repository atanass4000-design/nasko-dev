<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>404 — Lost in Space · Nasko Dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#000;font-family:'Inter',sans-serif;color:#fff;}
canvas{position:fixed;inset:0;display:block;}
/* UI overlay */
#ui{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;z-index:10;
  gap:1rem;text-align:center;padding:2rem;
}
.err-code{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(5rem,18vw,11rem);letter-spacing:-.04em;line-height:1;
  color:transparent;
  background:linear-gradient(135deg,#fff 0%,rgba(180,210,255,.7) 60%,rgba(100,160,255,.4) 100%);
  -webkit-background-clip:text;background-clip:text;
  text-shadow:none;
  opacity:0;animation:fadeUp .9s cubic-bezier(.22,1,.36,1) .4s forwards;
}
.err-msg{
  font-size:clamp(.95rem,2.5vw,1.2rem);letter-spacing:.18em;
  text-transform:uppercase;color:hsla(0,0%,100%,.45);
  opacity:0;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .65s forwards;
}
.err-sub{
  font-size:clamp(.75rem,1.8vw,.88rem);color:hsla(0,0%,100%,.28);
  letter-spacing:.08em;margin-top:.25rem;
  opacity:0;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .8s forwards;
}
.back-btn{
  margin-top:1.5rem;
  display:inline-flex;align-items:center;gap:.55rem;
  padding:.7rem 1.8rem;border:1px solid hsla(0,0%,100%,.18);
  border-radius:.5rem;color:hsla(0,0%,100%,.7);text-decoration:none;
  font-size:.85rem;font-weight:600;letter-spacing:.06em;
  background:hsla(0,0%,100%,.05);backdrop-filter:blur(12px);
  pointer-events:all;
  transition:background .2s,color .2s,border-color .2s,transform .2s cubic-bezier(.22,1,.36,1);
  opacity:0;animation:fadeUp .8s cubic-bezier(.22,1,.36,1) 1s forwards;
}
.back-btn:hover{background:hsla(0,0%,100%,.11);color:#fff;border-color:hsla(0,0%,100%,.35);transform:scale(1.05);}
.back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.signal{
  position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);
  font-size:.62rem;color:hsla(0,0%,100%,.18);letter-spacing:.14em;
  text-transform:uppercase;pointer-events:none;
  opacity:0;animation:fadeIn .8s ease 1.4s forwards;
}
.signal span{
  display:inline-block;
  animation:pulse 2.4s ease-in-out infinite;
}
.signal span:nth-child(2){animation-delay:.3s;}
.signal span:nth-child(3){animation-delay:.6s;}
@keyframes pulse{0%,100%{opacity:.18}50%{opacity:.7}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}
  from{opacity:0;transform:translateY(22px);}}
@keyframes fadeIn{to{opacity:1;}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="err-code">404</div>
  <div class="err-msg">Houston, we have a problem</div>
  <div class="err-sub">This page drifted out of orbit</div>
  <a class="back-btn" href="index.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Return to base
  </a>
</div>

<div class="signal">
  <span>&#9632;</span><span>&#9632;</span><span>&#9632;</span>&nbsp;
  signal lost
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const TAU=Math.PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);
const randI=(a,b)=>Math.floor(rand(a,b));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const mxr=v=>Math.max(0,v);

let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',()=>{resize();makeStars();});

/* ── STARS ── */
let stars=[];
function makeStars(){
  stars=[];
  const n=Math.floor(W*H/1800);
  for(let i=0;i<n;i++){
    const t=Math.random();
    stars.push({
      x:rand(0,W),y:rand(0,H),
      r:t<.78?rand(.2,.7):t<.95?rand(.7,1.4):rand(1.4,2.4),
      baseOp:t<.78?rand(.18,.45):t<.95?rand(.38,.65):rand(.6,.95),
      phase:rand(0,TAU),speed:rand(.2,.9),
      hue:Math.random()<.65?0:randI(205,265),
      sat:Math.random()<.65?0:rand(25,65),
    });
  }
}
makeStars();

/* ── SHOOTING STARS ── */
let shooters=[],shootSec=rand(2,5);
function spawnShooter(){
  shooters.push({
    x:rand(W*.05,W*.9),y:rand(-10,H*.3),
    vx:rand(180,380)*(Math.random()<.5?1:-1)*rand(.3,.8),
    vy:rand(80,180),len:rand(60,160),life:1,decay:rand(.5,1.1),w:rand(1,2),
  });
}

/* ── ASTRONAUT STATE ── */
const ast={
  x:W*.5,y:H*.5,         // position
  vx:rand(.12,.28),vy:rand(.06,.16),  // drift velocity
  rot:rand(0,TAU),       // body rotation
  rotV:rand(-.004,.004), // tumble speed
  breathPhase:0,         // chest breathing
  armPhase:0,            // arm float
  legPhase:0,            // leg drift
  tether:null,           // cut tether rope points
  glintPhase:0,          // visor glint
  // Radio static flicker
  staticTimer:0,
};

// Slowly bounce off edges
function updateAstronaut(dt){
  ast.breathPhase+=dt*1.1;
  ast.armPhase   +=dt*.55;
  ast.legPhase   +=dt*.4;
  ast.glintPhase +=dt*1.8;
  ast.staticTimer+=dt;

  ast.rot+=ast.rotV*dt;
  ast.x  +=ast.vx*dt*60;
  ast.y  +=ast.vy*dt*60;

  // soft boundary bounce
  const pad=160;
  if(ast.x<pad){ast.vx=Math.abs(ast.vx)*(.8+rand(0,.3));}
  if(ast.x>W-pad){ast.vx=-Math.abs(ast.vx)*(.8+rand(0,.3));}
  if(ast.y<pad){ast.vy=Math.abs(ast.vy)*(.8+rand(0,.3));}
  if(ast.y>H-pad){ast.vy=-Math.abs(ast.vy)*(.8+rand(0,.3));}

  // occasional micro-nudge (thruster puff)
  if(Math.random()<.0008){
    ast.vx+=rand(-.15,.15);
    ast.vy+=rand(-.15,.15);
    ast.rotV+=rand(-.002,.002);
    // clamp speed
    const spd=Math.sqrt(ast.vx*ast.vx+ast.vy*ast.vy);
    if(spd>.35){ast.vx=ast.vx/spd*.35;ast.vy=ast.vy/spd*.35;}
  }
}

/* ── DRAW ASTRONAUT ── */
function drawAstronaut(x,y,rot,t){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot);

  const S=1; // scale multiplier
  const breath=Math.sin(ast.breathPhase)*.012; // subtle chest expansion
  const armFloat=Math.sin(ast.armPhase)*.06;
  const legFloat=Math.sin(ast.legPhase)*.04;

  /* ── SHADOW / SOFT SILHOUETTE BEHIND ── */
  ctx.save();
  ctx.globalAlpha=.18;
  ctx.filter='blur(14px)';
  ctx.fillStyle='rgba(100,160,255,1)';
  ctx.beginPath();ctx.ellipse(3,4,38,48,0,0,TAU);ctx.fill();
  ctx.filter='none';
  ctx.restore();

  /* ── SUIT BASE (legs) ── */
  // Left leg
  ctx.save();
  ctx.rotate(legFloat*.5);
  ctx.translate(-12,28+legFloat*8);
  // thigh
  drawRoundedRect(ctx,-8,0,16,22,6,'#d4dce8');
  // knee joint
  ctx.fillStyle='#b8c4d4';ctx.beginPath();ctx.arc(0,22,8,0,TAU);ctx.fill();
  // shin
  drawRoundedRect(ctx,-7,20,14,20,5,'#c8d4e4');
  // boot
  ctx.fillStyle='#1a1f2e';
  ctx.beginPath();ctx.ellipse(0,42,10,6,0,0,TAU);ctx.fill();
  ctx.beginPath();ctx.roundRect(-10,36,20,10,[4]);ctx.fill();
  ctx.restore();

  // Right leg
  ctx.save();
  ctx.rotate(-legFloat*.5);
  ctx.translate(12,28-legFloat*8);
  drawRoundedRect(ctx,-8,0,16,22,6,'#d4dce8');
  ctx.fillStyle='#b8c4d4';ctx.beginPath();ctx.arc(0,22,8,0,TAU);ctx.fill();
  drawRoundedRect(ctx,-7,20,14,20,5,'#c8d4e4');
  ctx.fillStyle='#1a1f2e';
  ctx.beginPath();ctx.ellipse(0,42,10,6,0,0,TAU);ctx.fill();
  ctx.beginPath();ctx.roundRect(-10,36,20,10,[4]);ctx.fill();
  ctx.restore();

  /* ── MANNED MANEUVERING UNIT (backpack) ── */
  ctx.save();ctx.translate(0,2);
  ctx.fillStyle='#bdc8d8';
  ctx.beginPath();ctx.roundRect(-18,-22,36,44,[5]);ctx.fill();
  // MMU nozzle ports
  ctx.fillStyle='#2a3040';
  [[-14,-16],[-14,8],[14,-16],[14,8]].forEach(([bx,by])=>{
    ctx.beginPath();ctx.arc(bx,by,3.5,0,TAU);ctx.fill();
  });
  // MMU panel lines
  ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-18,0);ctx.lineTo(18,0);ctx.stroke();
  ctx.restore();

  /* ── TORSO (pressure suit) ── */
  const torsoH=44*(1+breath);
  ctx.save();ctx.translate(0,-2);
  // Main torso shape
  ctx.fillStyle='#e8eef8';
  ctx.beginPath();
  ctx.moveTo(-19,4);
  ctx.bezierCurveTo(-22,-8,-22,-20,-14,-26);
  ctx.bezierCurveTo(-8,-30,8,-30,14,-26);
  ctx.bezierCurveTo(22,-20,22,-8,19,4);
  ctx.bezierCurveTo(16,14,10,18,0,18);
  ctx.bezierCurveTo(-10,18,-16,14,-19,4);
  ctx.closePath();ctx.fill();

  // Torso shading — left dark
  const ts=ctx.createLinearGradient(-22,0,22,0);
  ts.addColorStop(0,'rgba(0,0,0,.18)');
  ts.addColorStop(.4,'rgba(0,0,0,0)');
  ts.addColorStop(.7,'rgba(0,0,0,0)');
  ts.addColorStop(1,'rgba(0,0,0,.12)');
  ctx.fillStyle=ts;
  ctx.beginPath();
  ctx.moveTo(-19,4);ctx.bezierCurveTo(-22,-8,-22,-20,-14,-26);
  ctx.bezierCurveTo(-8,-30,8,-30,14,-26);ctx.bezierCurveTo(22,-20,22,-8,19,4);
  ctx.bezierCurveTo(16,14,10,18,0,18);ctx.bezierCurveTo(-10,18,-16,14,-19,4);
  ctx.closePath();ctx.fill();

  // PLSS (life support) chest unit
  ctx.fillStyle='#d0d8e8';
  ctx.beginPath();ctx.roundRect(-10,-18,20,22,[3]);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.roundRect(-10,-18,20,22,[3]);ctx.stroke();

  // Chest panel details
  ctx.fillStyle='#4a90c8';ctx.beginPath();ctx.roundRect(-7,-15,8,5,[1.5]);ctx.fill();
  ctx.fillStyle='#e05050';ctx.beginPath();ctx.arc(6,-12,3,0,TAU);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(6,-12,1.5,0,TAU);ctx.fill();
  // Panel screws/bolts
  ctx.fillStyle='#8090a8';
  [[-7,-5],[5,-5],[-7,1],[5,1]].forEach(([bx,by])=>{
    ctx.beginPath();ctx.arc(bx,by,1.5,0,TAU);ctx.fill();
  });
  ctx.restore();

  /* ── LEFT ARM ── */
  ctx.save();
  ctx.translate(-22+armFloat*15,-10);
  ctx.rotate(-.55+armFloat*.35);
  // upper arm
  drawCapsule(ctx,0,0,0,24,9,'#dce4f0');
  ctx.fillStyle='#c8d0e0';ctx.beginPath();ctx.arc(0,24,9,0,TAU);ctx.fill();
  // elbow to forearm
  drawCapsule(ctx,-2,24,4,46,7.5,'#d4dcea');
  // glove
  ctx.fillStyle='#1a1f2e';
  drawCapsule(ctx,-2,44,4,55,7,'#1a1f2e');
  // glove ring connector
  ctx.strokeStyle='#8090a8';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(1,44,7.5,0,TAU);ctx.stroke();
  // thumb suggestion
  ctx.fillStyle='#1a1f2e';
  ctx.save();ctx.translate(7,50);ctx.rotate(-.4);
  drawCapsule(ctx,0,0,0,7,3,'#1a1f2e');
  ctx.restore();
  ctx.restore();

  /* ── RIGHT ARM ── */
  ctx.save();
  ctx.translate(22-armFloat*15,-10);
  ctx.rotate(.55-armFloat*.35);
  drawCapsule(ctx,0,0,0,24,9,'#dce4f0');
  ctx.fillStyle='#c8d0e0';ctx.beginPath();ctx.arc(0,24,9,0,TAU);ctx.fill();
  drawCapsule(ctx,2,24,-4,46,7.5,'#d4dcea');
  drawCapsule(ctx,2,44,-4,55,7,'#1a1f2e');
  ctx.strokeStyle='#8090a8';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(-1,44,7.5,0,TAU);ctx.stroke();
  ctx.fillStyle='#1a1f2e';
  ctx.save();ctx.translate(-7,50);ctx.rotate(.4);
  drawCapsule(ctx,0,0,0,7,3,'#1a1f2e');
  ctx.restore();
  ctx.restore();

  /* ── NECK RING ── */
  ctx.fillStyle='#8090a8';
  ctx.beginPath();ctx.ellipse(0,-26,13,5,0,0,TAU);ctx.fill();
  ctx.strokeStyle='#606878';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(0,-26,13,5,0,0,TAU);ctx.stroke();

  /* ── HELMET ── */
  // Outer shell
  const helmGrad=ctx.createRadialGradient(-6,-42,4,0,-36,26);
  helmGrad.addColorStop(0,'#f4f6fa');
  helmGrad.addColorStop(.5,'#dde4f0');
  helmGrad.addColorStop(1,'#b8c4d4');
  ctx.fillStyle=helmGrad;
  ctx.beginPath();ctx.arc(0,-36,26,0,TAU);ctx.fill();

  // Helmet shadow
  const hs=ctx.createRadialGradient(8,-30,2,0,-36,26);
  hs.addColorStop(0,'rgba(0,0,0,0)');
  hs.addColorStop(.65,'rgba(0,0,0,0)');
  hs.addColorStop(1,'rgba(0,0,0,.25)');
  ctx.fillStyle=hs;ctx.beginPath();ctx.arc(0,-36,26,0,TAU);ctx.fill();

  // Visor
  const visGrad=ctx.createLinearGradient(-14,-50,14,-22);
  visGrad.addColorStop(0,'rgba(60,80,30,.92)');
  visGrad.addColorStop(.3,'rgba(80,110,20,.88)');
  visGrad.addColorStop(.7,'rgba(40,70,10,.85)');
  visGrad.addColorStop(1,'rgba(30,50,10,.9)');
  ctx.fillStyle=visGrad;
  ctx.beginPath();ctx.ellipse(0,-36,17,14,0,0,TAU);ctx.fill();

  // Visor golden tint overlay (real NASA visor is gold-coated)
  const visTint=ctx.createRadialGradient(-4,-42,2,0,-36,17);
  visTint.addColorStop(0,'rgba(255,200,50,.22)');
  visTint.addColorStop(.5,'rgba(200,150,20,.1)');
  visTint.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=visTint;
  ctx.beginPath();ctx.ellipse(0,-36,17,14,0,0,TAU);ctx.fill();

  // Visor glint (moves slowly)
  const glintX=-8+Math.sin(ast.glintPhase)*3;
  const glintY=-44+Math.cos(ast.glintPhase*.7)*2;
  const gg=ctx.createRadialGradient(glintX,glintY,0,glintX,glintY,6);
  gg.addColorStop(0,'rgba(255,255,200,.55)');
  gg.addColorStop(.4,'rgba(255,255,200,.18)');
  gg.addColorStop(1,'rgba(255,255,200,0)');
  ctx.fillStyle=gg;ctx.beginPath();ctx.arc(glintX,glintY,6,0,TAU);ctx.fill();

  // Visor frame ring
  ctx.strokeStyle='#8898a8';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.ellipse(0,-36,17,14,0,0,TAU);ctx.stroke();

  // Helmet lights (two small LED strips on sides)
  ctx.fillStyle='rgba(255,255,180,.7)';
  ctx.beginPath();ctx.ellipse(-20,-38,3,1.5,-.3,0,TAU);ctx.fill();
  ctx.beginPath();ctx.ellipse(20,-38,3,1.5,.3,0,TAU);ctx.fill();

  // NASA stripe on helmet
  ctx.fillStyle='rgba(30,80,200,.65)';
  ctx.beginPath();ctx.arc(0,-36,26,-.55,.55);
  ctx.arc(0,-36,23,.55,-.55,true);
  ctx.closePath();ctx.fill();

  ctx.restore(); // main translate/rotate

  /* ── TETHER (cut, drifting) ── */
  if(!ast.tether){
    // Build tether once: a segmented rope that extends behind
    ast.tether=[];
    for(let i=0;i<18;i++){
      ast.tether.push({
        ox:rand(-3,3),oy:i*8+40,
        phase:rand(0,TAU),amp:rand(2,6),sp:rand(.4,.9),
      });
    }
  }
  ctx.save();
  ctx.translate(x,y);ctx.rotate(rot);
  const tp=performance.now()/1000;
  ctx.strokeStyle='rgba(200,210,220,.35)';ctx.lineWidth=1.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,18);
  for(let i=0;i<ast.tether.length;i++){
    const seg=ast.tether[i];
    const wx=seg.ox+Math.sin(tp*seg.sp+seg.phase)*seg.amp;
    const wy=seg.oy+Math.cos(tp*seg.sp*.7+seg.phase)*(seg.amp*.5);
    i===0?ctx.lineTo(wx,wy):ctx.lineTo(wx,wy);
  }
  ctx.stroke();
  // Frayed end
  const last=ast.tether[ast.tether.length-1];
  const fwx=last.ox+Math.sin(tp*.4+last.phase)*last.amp;
  const fwy=last.oy;
  ctx.strokeStyle='rgba(200,210,220,.15)';ctx.lineWidth=.8;
  for(let f=0;f<4;f++){
    ctx.beginPath();ctx.moveTo(fwx,fwy);
    ctx.lineTo(fwx+rand(-8,8),fwy+rand(4,12));ctx.stroke();
  }
  ctx.restore();
}

/* ── HELPER: draw a capsule (stadium shape) ── */
function drawCapsule(ctx,x1,y1,x2,y2,r,col){
  ctx.fillStyle=col;
  ctx.beginPath();
  const ang=Math.atan2(y2-y1,x2-x1);
  const dx=Math.cos(ang+Math.PI/2)*r;
  const dy=Math.sin(ang+Math.PI/2)*r;
  ctx.moveTo(x1+dx,y1+dy);
  ctx.lineTo(x2+dx,y2+dy);
  ctx.arc(x2,y2,r,ang+Math.PI/2,ang-Math.PI/2,true);
  ctx.lineTo(x1-dx,y1-dy);
  ctx.arc(x1,y1,r,ang-Math.PI/2,ang+Math.PI/2,true);
  ctx.closePath();ctx.fill();
}

/* ── HELPER: rounded rect ── */
function drawRoundedRect(ctx,x,y,w,h,r,col){
  ctx.fillStyle=col;
  ctx.beginPath();ctx.roundRect(x,y,w,h,[r]);ctx.fill();
}

/* ── DISTANT EARTH (tiny, far away) ── */
function drawEarth(t){
  const ex=W*.82,ey=H*.18,er=28;
  ctx.save();ctx.translate(ex,ey);

  // Atmosphere glow
  const ag=ctx.createRadialGradient(0,0,er*.85,0,0,er*1.6);
  ag.addColorStop(0,'rgba(60,130,255,.12)');ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(0,0,er*1.6,0,TAU);ctx.fillStyle=ag;ctx.fill();

  // Ocean
  const og=ctx.createRadialGradient(-er*.2,-er*.2,0,0,0,er);
  og.addColorStop(0,'#1565b8');og.addColorStop(.5,'#0d47a1');og.addColorStop(1,'#061c50');
  ctx.beginPath();ctx.arc(0,0,er,0,TAU);ctx.fillStyle=og;ctx.fill();

  // Continents (simplified blobs)
  ctx.fillStyle='rgba(40,140,55,.85)';
  [[-.3,-.25,.38],[.22,-.1,.26],[-.08,.28,.2]].forEach(([ox,oy,r])=>{
    ctx.beginPath();ctx.arc(ox*er,oy*er,r*er,0,TAU);ctx.fill();
  });

  // Cloud wisps
  ctx.globalAlpha=.35;ctx.fillStyle='rgba(255,255,255,.7)';
  [[-.12,-.35,.3],[.3,.1,.22],[-.26,.22,.18]].forEach(([ox,oy,r])=>{
    ctx.beginPath();ctx.arc(ox*er,oy*er,r*er,0,TAU);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Terminator shadow
  const sh=ctx.createRadialGradient(er*.45,er*.35,er*.15,0,0,er);
  sh.addColorStop(0,'rgba(0,0,0,0)');sh.addColorStop(.55,'rgba(0,0,0,.2)');sh.addColorStop(1,'rgba(0,0,0,.65)');
  ctx.beginPath();ctx.arc(0,0,er,0,TAU);ctx.fillStyle=sh;ctx.fill();

  ctx.restore();
}

/* ── PARTICLE THRUSTER PUFF (occasional) ── */
let puffs=[];
function maybeSpawnPuff(){
  if(Math.random()<.006){
    const ang=ast.rot+Math.PI+rand(-.3,.3);
    for(let i=0;i<8;i++) puffs.push({
      x:ast.x+Math.cos(ast.rot)*10,
      y:ast.y+Math.sin(ast.rot)*10,
      vx:Math.cos(ang)*rand(15,40)+ast.vx,
      vy:Math.sin(ang)*rand(15,40)+ast.vy,
      r:rand(1.5,4),life:1,decay:rand(.6,1.4),
    });
  }
}
function updatePuffs(dt){
  puffs=puffs.filter(p=>p.life>0);
  for(const p of puffs){
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=p.decay*dt;
    const pr=mxr(p.r*p.life);if(!pr)continue;
    ctx.beginPath();ctx.arc(p.x,p.y,pr,0,TAU);
    ctx.fillStyle=`rgba(200,220,255,${p.life*.35})`;ctx.fill();
  }
}

/* ── MAIN LOOP ── */
let last=performance.now();
function tick(now){
  const dt=Math.min((now-last)/1000,.05);last=now;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // Stars
  const nt=now/1000;
  for(const s of stars){
    s.phase+=s.speed*.4*dt;
    const op=s.baseOp*(.72+.28*Math.sin(s.phase));
    if(s.r>1.4){
      const hl=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,mxr(s.r*5));
      hl.addColorStop(0,s.sat>0?`hsla(${s.hue},60%,80%,${op*.4})`:`rgba(200,215,255,${op*.3})`);
      hl.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(s.x,s.y,mxr(s.r*5),0,TAU);ctx.fillStyle=hl;ctx.fill();
      if(s.r>2){
        ctx.save();ctx.globalAlpha=op*.22;ctx.strokeStyle='#cde';ctx.lineWidth=.4;
        ctx.beginPath();
        ctx.moveTo(s.x-s.r*8,s.y);ctx.lineTo(s.x+s.r*8,s.y);
        ctx.moveTo(s.x,s.y-s.r*8);ctx.lineTo(s.x,s.y+s.r*8);
        ctx.stroke();ctx.restore();
      }
    }
    ctx.beginPath();ctx.arc(s.x,s.y,mxr(s.r),0,TAU);
    ctx.fillStyle=s.sat>0?`hsla(${s.hue},${s.sat}%,88%,${op})`:`rgba(255,255,255,${op})`;
    ctx.fill();
  }

  // Shooting stars
  shootSec-=dt;
  if(shootSec<=0){spawnShooter();shootSec=rand(2.5,6);}
  shooters=shooters.filter(s=>s.life>0);
  for(const s of shooters){
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=s.decay*dt;
    const ang=Math.atan2(s.vy,s.vx);
    const tx=s.x-Math.cos(ang)*s.len*s.life,ty=s.y-Math.sin(ang)*s.len*s.life;
    const sg=ctx.createLinearGradient(tx,ty,s.x,s.y);
    sg.addColorStop(0,'rgba(255,255,255,0)');
    sg.addColorStop(.55,`rgba(210,228,255,${s.life*.32})`);
    sg.addColorStop(1,`rgba(255,255,255,${s.life*.9})`);
    ctx.save();ctx.globalCompositeOperation='screen';
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);
    ctx.strokeStyle=sg;ctx.lineWidth=mxr(s.w*s.life);ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.arc(s.x,s.y,mxr(1.6*s.life),0,TAU);
    ctx.fillStyle=`rgba(255,255,255,${s.life*.88})`;ctx.fill();
    ctx.restore();
  }

  drawEarth(nt);
  updateAstronaut(dt);
  maybeSpawnPuff();
  updatePuffs(dt);
  drawAstronaut(ast.x,ast.y,ast.rot,nt);

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
