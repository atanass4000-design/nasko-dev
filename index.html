<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nasko Dev — Developer & Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:           hsl(0 0% 0%);
      --fg:           hsl(0 0% 100%);
      --muted:        hsl(0 0% 55%);
      --discord:      hsl(235 86% 65%);
      --discord-glow: hsla(235 86% 65% / .45);
      --title-glow1:  hsla(0 0% 100% / .15);
      --title-glow2:  hsla(0 0% 100% / .05);
      --btn-bg:       hsla(0 0% 100% / .07);
      --btn-hover:    hsla(0 0% 100% / .13);
      --particle-rgb: 255,255,255;
    }

    body.light {
      --bg:           hsl(0 0% 97%);
      --fg:           hsl(0 0% 5%);
      --muted:        hsl(0 0% 40%);
      --title-glow1:  hsla(0 0% 0% / .08);
      --title-glow2:  hsla(0 0% 0% / .03);
      --btn-bg:       hsla(0 0% 0% / .06);
      --btn-hover:    hsla(0 0% 0% / .11);
      --particle-rgb: 0,0,0;
    }

    html {
      scroll-behavior: smooth;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s ease, color 0.4s ease;
      cursor: none;
    }

    /* ── Custom Cursor ── */
    #cursor-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Greeting ── */
    .greeting {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: hsl(220 90% 70%);
      opacity: 0;
      animation: fadeIn 0.6s ease 0.05s forwards;
    }

    /* ── Theme Toggle ── */
    .theme-btn {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      z-index: 50;
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 0.5rem;
      border: 1px solid hsla(0 0% 50% / .2);
      background: var(--btn-bg);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: background 0.2s, color 0.2s, transform 0.2s cubic-bezier(.22,1,.36,1), border-color 0.3s;
      opacity: 0;
      animation: fadeIn 0.5s ease 1s forwards;
    }
    .theme-btn:hover {
      background: var(--btn-hover);
      color: var(--fg);
      transform: scale(1.1);
    }
    .theme-btn svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      transition: opacity 0.2s;
    }
    /* show/hide icons based on theme */
    .icon-moon { display: block; }
    .icon-sun  { display: none; }
    body.light .icon-moon { display: none; }
    body.light .icon-sun  { display: block; }

    /* ── Particles ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Stage ── */
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }

    /* ── Avatar ── */
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid hsla(0 0% 100% / .15);
      box-shadow: 0 0 30px hsla(0 0% 100% / .08);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0s forwards;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
    }
    .avatar:hover {
      box-shadow: 0 0 40px hsla(235 86% 65% / .4);
    }
    @keyframes wobble {
      0%   { transform: rotate(0deg) scale(1); }
      15%  { transform: rotate(-8deg) scale(1.08); }
      30%  { transform: rotate(7deg) scale(1.08); }
      45%  { transform: rotate(-5deg) scale(1.04); }
      60%  { transform: rotate(4deg) scale(1.04); }
      75%  { transform: rotate(-2deg) scale(1.01); }
      100% { transform: rotate(0deg) scale(1); }
    }
    .avatar.wobbling {
      animation: wobble 0.6s cubic-bezier(.22,1,.36,1) forwards !important;
    }

    /* ── Title ── */
    .title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3.5rem, 10vw, 6rem);
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--fg);
      text-shadow:
        0 0 40px var(--title-glow1),
        0 0 80px var(--title-glow2);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.1s forwards;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.3s forwards;
    }

    /* ── Discord Button ── */
    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: var(--discord);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 0.5rem;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(.22,1,.36,1), box-shadow 0.2s ease;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.5s forwards;
    }
    .discord-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px var(--discord-glow), 0 0 60px var(--discord-glow);
    }
    .discord-btn:active { transform: scale(0.97); }
    .discord-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* ── Social Icons ── */
    .socials {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      opacity: 0;
      animation: fadeIn 0.7s ease 0.7s forwards;
    }
    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.4rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s, background 0.2s, transform 0.2s cubic-bezier(.22,1,.36,1);
    }
    .social-link:hover {
      color: var(--fg);
      background: hsla(0 0% 100% / .08);
      transform: scale(1.1);
    }
    .social-link svg {
      width: 20px; height: 20px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Visitor Counter ── */
    .visitor-counter {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: hsla(0 0% 100% / .3);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeIn 0.7s ease 0.9s forwards;
    }
    .visitor-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      flex-shrink: 0;
      animation: dotpulse 2s ease-in-out infinite;
    }
    @keyframes dotpulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Welcome note ── */
    .deploy-note {
      font-size: 0.72rem;
      color: hsla(0 0% 100% / .22);
      letter-spacing: 0.18em;
      opacity: 0;
      animation: fadeIn 0.7s ease 0.9s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>

  <script>
    /* ── Theme Toggle ── */
    (function () {
      const btn  = document.getElementById('themeBtn');
      const body = document.body;
      const saved = localStorage.getItem('naskodev_theme');
      if (saved === 'light') body.classList.add('light');
      btn.addEventListener('click', () => {
        body.classList.toggle('light');
        localStorage.setItem('naskodev_theme', body.classList.contains('light') ? 'light' : 'dark');
      });
    })();

    /* ── Visitor Counter ── */
    (function () {
      const key = 'naskodev_visits';
      let visits = parseInt(localStorage.getItem(key) || '0', 10) + 1;
      localStorage.setItem(key, visits);
      const el = document.getElementById('visit-text');
      if (visits === 1) {
        el.textContent = 'First time here — welcome!';
      } else {
        el.textContent = `You've visited ${visits} times`;
      }
    })();

    /* ── Time-of-Day Greeting ── */
    (function () {
      const h = new Date().getHours();
      const greet = h < 5  ? '🌙 Good Night'
                  : h < 12 ? '🌅 Good Morning'
                  : h < 17 ? '☀️ Good Afternoon'
                  : h < 21 ? '🌆 Good Evening'
                  :          '🌙 Good Night';
      document.getElementById('greeting').textContent = greet;
    })();

    /* ── Custom Cursor (Glowing Blue Ring + Sparks) ── */
    (function () {
      const canvas = document.getElementById('cursor-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      let mx = -200, my = -200;
      let tx = -200, ty = -200; // lerp target
      let isHover = false;
      let sparks  = [];

      document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
      });

      // detect hover over interactive elements
      document.addEventListener('mouseover', e => {
        if (e.target.closest('a, button, [role="button"]')) {
          isHover = true;
        }
      });
      document.addEventListener('mouseout', e => {
        if (e.target.closest('a, button, [role="button"]')) {
          isHover = false;
        }
      });

      // spawn sparks on click
      document.addEventListener('click', () => spawnSparks(tx, ty, 14));
      // continuous sparks on hover
      let hoverSparkTimer = 0;

      function spawnSparks(x, y, count) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1.2 + Math.random() * 3;
          sparks.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: 0.03 + Math.random() * 0.04,
            r: 1.2 + Math.random() * 2,
          });
        }
      }

      let last = performance.now();
      function tick(now) {
        const dt = Math.min((now - last) / 16.67, 3); last = now;

        // lerp cursor position — silky smooth
        tx += (mx - tx) * 0.18;
        ty += (my - ty) * 0.18;

        ctx.clearRect(0, 0, W, H);

        // continuous hover sparks
        if (isHover) {
          hoverSparkTimer += dt;
          if (hoverSparkTimer > 3) { spawnSparks(tx, ty, 2); hoverSparkTimer = 0; }
        }

        // draw sparks
        sparks = sparks.filter(s => s.life > 0);
        for (const s of sparks) {
          s.x  += s.vx * dt;
          s.y  += s.vy * dt;
          s.vy += 0.08 * dt; // gravity
          s.life -= s.decay * dt;
          const sr = Math.max(0, s.r * s.life); // clamp — never negative
          if (sr <= 0) continue;
          ctx.beginPath();
          ctx.arc(s.x, s.y, sr, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(220, 100%, 75%, ${Math.max(0, s.life * 0.9)})`;
          ctx.fill();
        }

        // ring size — bigger on hover
        const targetR = isHover ? 22 : 14;
        const ringR   = targetR;

        // outer glow
        const grd = ctx.createRadialGradient(tx, ty, ringR - 6, tx, ty, ringR + 14);
        grd.addColorStop(0, `hsla(220, 100%, 70%, ${isHover ? 0.55 : 0.38})`);
        grd.addColorStop(1, 'hsla(220, 100%, 70%, 0)');
        ctx.beginPath();
        ctx.arc(tx, ty, ringR + 14, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // ring stroke
        ctx.beginPath();
        ctx.arc(tx, ty, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = isHover ? 'hsla(200, 100%, 88%, 1)' : 'hsla(220, 100%, 82%, 0.95)';
        ctx.lineWidth   = isHover ? 3 : 2.2;
        ctx.shadowColor = 'hsl(220 100% 70%)';
        ctx.shadowBlur  = isHover ? 24 : 16;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // tiny center dot
        ctx.beginPath();
        ctx.arc(tx, ty, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(210, 100%, 95%, 0.9)';
        ctx.fill();

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();

    /* ── Avatar Wobble on Click ── */
    (function () {
      const avatar = document.getElementById('avatar');
      avatar.addEventListener('click', () => {
        avatar.classList.remove('wobbling');
        void avatar.offsetWidth; // reflow to restart animation
        avatar.classList.add('wobbling');
        avatar.addEventListener('animationend', () => {
          avatar.classList.remove('wobbling');
        }, { once: true });
      });
    })();

    /* ── Nebula Background ── */
    (function () {
      const canvas = document.getElementById('particles');
      const ctx    = canvas.getContext('2d');
      let W, H;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', () => { resize(); init(); });

      const rand  = (a, b) => a + Math.random() * (b - a);
      const randI = (a, b) => Math.floor(rand(a, b));

      /* ── 1. Stars ── */
      let stars = [];
      function makeStars() {
        stars = [];
        const count = Math.floor((W * H) / 2200);
        for (let i = 0; i < count; i++) {
          const tier = Math.random();
          stars.push({
            x:       rand(0, W),
            y:       rand(0, H),
            r:       tier < 0.75 ? rand(0.3, 0.9)   // tiny
                   : tier < 0.94 ? rand(0.9, 1.8)   // medium
                   :               rand(1.8, 3.2),   // bright
            baseOp:  tier < 0.75 ? rand(0.25, 0.55)
                   : tier < 0.94 ? rand(0.45, 0.75)
                   :               rand(0.7,  1.0),
            phase:   rand(0, Math.PI * 2),
            speed:   rand(0.3, 1.2),
            // colour: mostly white, some blue-tinted, few purple
            hue:     Math.random() < 0.6 ? 0
                   : Math.random() < 0.7 ? randI(210, 240)
                   :                       randI(260, 280),
            sat:     Math.random() < 0.6 ? 0 : rand(40, 80),
          });
        }
      }

      /* ── 2. Nebula Clouds ── */
      let clouds = [];
      function makeClouds() {
        clouds = [];
        const defs = [
          // [cx%, cy%, rx, ry, hue, sat, baseAlpha, speed]
          [0.38, 0.28, W*0.38, H*0.30, 225, 85, 0.13, 0.00012],
          [0.65, 0.55, W*0.30, H*0.28, 240, 90, 0.10, 0.00009],
          [0.22, 0.62, W*0.25, H*0.22, 260, 80, 0.08, 0.00014],
          [0.75, 0.20, W*0.20, H*0.18, 210, 75, 0.07, 0.00011],
          [0.50, 0.72, W*0.35, H*0.20, 235, 88, 0.06, 0.00010],
        ];
        defs.forEach(([cxR, cyR, rx, ry, hue, sat, alpha, spd]) => {
          clouds.push({
            cx: cxR * W, cy: cyR * H,
            rx, ry,
            hue, sat, alpha,
            phaseX: rand(0, Math.PI*2),
            phaseY: rand(0, Math.PI*2),
            speed: spd,
            driftAmpX: W * rand(0.02, 0.06),
            driftAmpY: H * rand(0.015, 0.04),
          });
        });
      }

      /* ── 3. Shooting Stars ── */
      let shooters = [];
      let shootTimer = 0;
      function spawnShooter() {
        const startX = rand(W * 0.1, W * 0.9);
        const angle  = rand(Math.PI * 0.1, Math.PI * 0.4);
        shooters.push({
          x: startX, y: rand(0, H * 0.4),
          vx: Math.cos(angle) * rand(8, 14),
          vy: Math.sin(angle) * rand(4, 8),
          len: rand(60, 140),
          life: 1, decay: rand(0.012, 0.025),
        });
      }

      function init() { makeStars(); makeClouds(); }
      init();

      /* ── Render ── */
      let t = 0;
      let last = performance.now();

      function tick(now) {
        const dt = Math.min((now - last) / 16.67, 3);
        last = now;
        t   += dt;

        // deep space gradient base
        const bg = ctx.createLinearGradient(0, 0, W * 0.6, H);
        bg.addColorStop(0,   '#00000f');
        bg.addColorStop(0.4, '#03001a');
        bg.addColorStop(0.7, '#050022');
        bg.addColorStop(1,   '#000008');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        /* -- nebula clouds -- */
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (const c of clouds) {
          const cx = c.cx + Math.sin(t * c.speed * 0.7 + c.phaseX) * c.driftAmpX;
          const cy = c.cy + Math.cos(t * c.speed       + c.phaseY) * c.driftAmpY;
          const pulse = 1 + 0.06 * Math.sin(t * c.speed * 2 + c.phaseX);

          // layered ellipse — multiple passes for depth
          for (let pass = 0; pass < 3; pass++) {
            const scale = 1 - pass * 0.22;
            const a     = c.alpha * (1 - pass * 0.28) * pulse;
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(c.rx * scale / 100, c.ry * scale / 100);
            const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, 100);
            grd.addColorStop(0,   `hsla(${c.hue},${c.sat}%,65%,${a})`);
            grd.addColorStop(0.4, `hsla(${c.hue+10},${c.sat-10}%,50%,${a*0.6})`);
            grd.addColorStop(0.75,`hsla(${c.hue+20},${c.sat-20}%,40%,${a*0.25})`);
            grd.addColorStop(1,   `hsla(${c.hue},${c.sat}%,30%,0)`);
            ctx.beginPath();
            ctx.arc(0, 0, 100, 0, Math.PI * 2);
            ctx.fillStyle = grd;
            ctx.fill();
            ctx.restore();
          }
        }
        ctx.restore();

        /* -- stars -- */
        for (const s of stars) {
          s.phase += s.speed * 0.01 * dt;
          const op = s.baseOp * (0.7 + 0.3 * Math.sin(s.phase));
          const col = s.sat > 0
            ? `hsla(${s.hue},${s.sat}%,85%,${op})`
            : `rgba(255,255,255,${op})`;

          // halo for bright stars
          if (s.r > 1.8) {
            const halo = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5);
            halo.addColorStop(0,   s.sat > 0 ? `hsla(${s.hue},80%,80%,${op*0.5})` : `rgba(200,220,255,${op*0.4})`);
            halo.addColorStop(1,   'transparent');
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r * 5, 0, Math.PI * 2);
            ctx.fillStyle = halo;
            ctx.fill();

            // cross-flare on the very brightest
            if (s.r > 2.5) {
              ctx.save();
              ctx.globalAlpha = op * 0.35;
              ctx.strokeStyle = s.sat > 0 ? `hsl(${s.hue},70%,90%)` : '#cce0ff';
              ctx.lineWidth = 0.6;
              ctx.beginPath();
              ctx.moveTo(s.x - s.r*8, s.y); ctx.lineTo(s.x + s.r*8, s.y);
              ctx.moveTo(s.x, s.y - s.r*8); ctx.lineTo(s.x, s.y + s.r*8);
              ctx.stroke();
              ctx.restore();
            }
          }

          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = col;
          ctx.fill();
        }

        /* -- shooting stars -- */
        shootTimer += dt;
        if (shootTimer > rand(180, 400)) { spawnShooter(); shootTimer = 0; }

        shooters = shooters.filter(s => s.life > 0);
        for (const s of shooters) {
          s.x += s.vx * dt;
          s.y += s.vy * dt;
          s.life -= s.decay * dt;

          const tailX = s.x - Math.cos(Math.atan2(s.vy, s.vx)) * s.len * s.life;
          const tailY = s.y - Math.sin(Math.atan2(s.vy, s.vx)) * s.len * s.life;

          const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
          grad.addColorStop(0, 'rgba(255,255,255,0)');
          grad.addColorStop(0.6, `rgba(180,210,255,${s.life * 0.4})`);
          grad.addColorStop(1,   `rgba(255,255,255,${s.life * 0.9})`);

          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          ctx.beginPath();
          ctx.moveTo(tailX, tailY);
          ctx.lineTo(s.x, s.y);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 1.5 * s.life;
          ctx.lineCap = 'round';
          ctx.stroke();
          ctx.restore();
        }

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>

</body>
</html>
